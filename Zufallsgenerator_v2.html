/* ═══════════════════════════════════════════════════════
   VORTEX PORTAL GROUP MODE
   ═══════════════════════════════════════════════════════ */
function VortexPortalMode(props){
  var names=props.names;var onDone=props.onDone;var onResult=props.onResult||function(){};
  var _ph=useState('pick');var phase=_ph[0];var setPhase=_ph[1];
  var _ng=useState(2);var numGroups=_ng[0];var setNumGroups=_ng[1];
  var _gr=useState([]);var groups=_gr[0];var setGroups=_gr[1];
  var _cf=useState(false);var showConfetti=_cf[0];var setShowConfetti=_cf[1];
  var _st=useState('');var statusText=_st[0];var setStatusText=_st[1];
  var _ab=useState(0);var absorbed=_ab[0];var setAbsorbed=_ab[1];
  var canvasRef=useRef(null);
  var gRef=useRef(null);
  var rafRef=useRef(null);
  var timers=useRef([]);
  var audioRef=useRef(null);

  var AW=600;var AH=500;
  var CX=AW/2;var CY=AH/2;

  var PORTAL_COLORS=['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4','#84cc16','#f97316','#e11d48'];
  var PORTAL_NAMES=['Violett','Blau','Gr\u00FCn','Gold','Rot','Pink','Cyan','Lime','Orange','Karmin'];

  var maxGroups=Math.min(10,Math.floor(names.length/2));

  useEffect(function(){return function(){doCleanup();}},[]);

  function doCleanup(){
    timers.current.forEach(clearTimeout);timers.current=[];
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
    stopAH(audioRef.current);audioRef.current=null;
  }
  function later(fn,ms){timers.current.push(setTimeout(fn,ms));}

  /* ── AUDIO ── */
  function startAudio(){
    try{
      var ah=createAudioCtx();if(!ah)return;audioRef.current=ah;
      var ctx=ah.ctx;var master=ah.master;master.gain.value=0.4;
      // Ethereal pad
      var pad=ctx.createOscillator();pad.type='sine';pad.frequency.value=130.81;
      var pad2=ctx.createOscillator();pad2.type='sine';pad2.frequency.value=196;
      var pg=ctx.createGain();pg.gain.value=0.15;
      var pf=ctx.createBiquadFilter();pf.type='lowpass';pf.frequency.value=400;
      pad.connect(pf);pad2.connect(pf);pf.connect(pg);pg.connect(master);pad.start();pad2.start();
      // LFO wobble
      var lfo=ctx.createOscillator();lfo.frequency.value=0.5;
      var lfoG=ctx.createGain();lfoG.gain.value=15;
      lfo.connect(lfoG);lfoG.connect(pad.frequency);lfo.start();
      // Rhythmic pings
      var now=ctx.currentTime;
      for(var i=0;i<60;i++){
        var t=now+i*0.4;
        if(i%4===0)aT(ctx,master,523.25,t,0.2,0.06,'sine');
        if(i%4===2)aT(ctx,master,659.25,t,0.15,0.04,'sine');
        if(i%8===0&&i>0)aC(ctx,master,t,[261.63,329.63,392],0.05,0.6,'triangle');
      }
    }catch(e){}
  }
  function playAbsorbSound(idx){
    try{
      var ah=audioRef.current;if(!ah)return;var ctx=ah.ctx;var dest=ah.master;var now=ctx.currentTime;
      var baseFreq=300+idx*40;
      aT(ctx,dest,baseFreq,now,0.15,0.15,'sine');
      aT(ctx,dest,baseFreq*1.5,now+0.05,0.1,0.1,'triangle');
    }catch(e){}
  }
  function playCompleteSound(){
    try{
      var ah=audioRef.current;if(!ah)return;var ctx=ah.ctx;var dest=ah.master;var now=ctx.currentTime;
      var fanfare=[392,493.88,587.33,783.99];
      for(var i=0;i<fanfare.length;i++)aT(ctx,dest,fanfare[i],now+i*0.12,0.35,0.2,'triangle');
      aC(ctx,dest,now+0.6,[392,493.88,587.33,783.99],0.15,1.5,'triangle');
    }catch(e){}
  }

  /* ── ASSIGN GROUPS (equal size) ── */
  function assignGroups(ng){
    var shuffled=shuffle(names.slice());
    var result=[];
    for(var i=0;i<ng;i++)result.push([]);
    for(var j=0;j<shuffled.length;j++){
      result[j%ng].push(shuffled[j]);
    }
    return result;
  }

  /* ── START ── */
  function startVortex(){
    doCleanup();
    var ng=numGroups;
    var assigned=assignGroups(ng);
    setGroups(assigned);setShowConfetti(false);setAbsorbed(0);
    setStatusText('\u{1F300} Vortex \u00F6ffnet sich...');

    // Build player data with group assignments
    var players=[];var pidx=0;
    for(var gi=0;gi<assigned.length;gi++){
      for(var pi=0;pi<assigned[gi].length;pi++){
        var ang=Math.random()*Math.PI*2;
        var orbitR=80+Math.random()*50;
        players.push({id:pidx,name:assigned[gi][pi],group:gi,
          color:BALL_COLORS[pidx%BALL_COLORS.length],
          angle:ang,orbitR:orbitR,orbitSpeed:0.3+Math.random()*0.4,
          phase:'orbit',absorbT:0,absorbDur:0,
          startX:0,startY:0,trail:[]});
        pidx++;
      }
    }

    // Portal positions in a circle
    var portals=[];
    var portalR=Math.min(AW,AH)*0.42;
    for(var k=0;k<ng;k++){
      var pa=-Math.PI/2+k*(Math.PI*2/ng);
      portals.push({x:CX+Math.cos(pa)*portalR,y:CY+Math.sin(pa)*portalR,
        angle:pa,color:PORTAL_COLORS[k%PORTAL_COLORS.length],
        name:PORTAL_NAMES[k%PORTAL_NAMES.length],
        pulsePhase:Math.random()*Math.PI*2,members:0,targetMembers:assigned[k].length});
    }

    var g={players:players,portals:portals,vortexAngle:0,vortexPulse:0,
      particles:[],absorbQueue:[],absorbIdx:0,done:false,startT:performance.now()};
    gRef.current=g;

    setPhase('running');
    startAudio();

    // Build absorb schedule: stagger players being sucked into portals
    var order=shuffle(players.slice());
    var delay=1500; // initial orbit time
    var stagger=Math.max(100,Math.min(350,6000/names.length));
    for(var oi=0;oi<order.length;oi++){
      (function(p,t){
        later(function(){
          if(g.done)return;
          // Calculate current position
          var elapsed=(performance.now()-g.startT)/1000;
          p.startX=CX+Math.cos(p.angle+elapsed*p.orbitSpeed)*p.orbitR;
          p.startY=CY+Math.sin(p.angle+elapsed*p.orbitSpeed)*p.orbitR;
          p.phase='absorb';p.absorbT=0;
          p.absorbDur=25+Math.random()*15; // frames
          playAbsorbSound(oi);
          setAbsorbed(function(prev){return prev+1;});
          setStatusText('\u{1F300} '+p.name+' \u2192 Portal '+(p.group+1));
        },t);
      })(order[oi],delay+oi*stagger);
    }

    // Finish
    var finishT=delay+order.length*stagger+800;
    later(function(){
      g.done=true;
      setPhase('done');setStatusText('\u2728 Alle Gruppen gebildet!');onResult(numGroups+' Gruppen');
      playCompleteSound();
      later(function(){setShowConfetti(true);},300);
    },finishT);

    // Animation loop
    var last=performance.now();
    function loop(now){
      var dt=Math.min((now-last)/16.67,3);last=now;
      updateVortex(g,dt,now);drawVortex(g,now);
      rafRef.current=requestAnimationFrame(loop);
    }
    rafRef.current=requestAnimationFrame(loop);
  }

  /* ── UPDATE ── */
  function updateVortex(g,dt,now){
    g.vortexAngle+=0.02*dt;
    g.vortexPulse=Math.sin(now*0.003)*0.15;
    var elapsed=(now-g.startT)/1000;

    // Spawn particles
    if(Math.random()<0.3*dt){
      var pa=Math.random()*Math.PI*2;var pr=10+Math.random()*30;
      g.particles.push({x:CX+Math.cos(pa)*pr,y:CY+Math.sin(pa)*pr,
        vx:Math.cos(pa+Math.PI/2)*1.5,vy:Math.sin(pa+Math.PI/2)*1.5,
        life:30+Math.random()*20,maxLife:30+Math.random()*20,
        color:PORTAL_COLORS[Math.floor(Math.random()*g.portals.length)]});
    }
    // Update particles
    g.particles.forEach(function(pt){
      pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.life-=dt;
      // Spiral outward
      var dx=pt.x-CX;var dy=pt.y-CY;var d=Math.sqrt(dx*dx+dy*dy);
      if(d>0){pt.x+=dx/d*0.3*dt;pt.y+=dy/d*0.3*dt;}
    });
    g.particles=g.particles.filter(function(pt){return pt.life>0;});

    // Update players
    g.players.forEach(function(p){
      if(p.phase==='orbit'){
        // Orbit around center
        var cx=CX+Math.cos(p.angle+elapsed*p.orbitSpeed)*p.orbitR;
        var cy=CY+Math.sin(p.angle+elapsed*p.orbitSpeed)*p.orbitR;
        p.trail.push({x:cx,y:cy,t:now});
        if(p.trail.length>12)p.trail.shift();
      }else if(p.phase==='absorb'){
        p.absorbT+=dt;
        var prog=Math.min(1,p.absorbT/p.absorbDur);
        // Ease in-out
        var ease=prog<0.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;
        var portal=g.portals[p.group];
        var cx2=p.startX+(portal.x-p.startX)*ease;
        var cy2=p.startY+(portal.y-p.startY)*ease;
        p.trail.push({x:cx2,y:cy2,t:now});
        if(p.trail.length>15)p.trail.shift();
        if(prog>=1){
          p.phase='done';
          portal.members++;
          // Spawn burst particles at portal
          for(var bi=0;bi<6;bi++){
            var ba=Math.random()*Math.PI*2;
            g.particles.push({x:portal.x+Math.cos(ba)*15,y:portal.y+Math.sin(ba)*15,
              vx:Math.cos(ba)*2,vy:Math.sin(ba)*2,life:20,maxLife:20,color:portal.color});
          }
        }
      }
    });
  }

  /* ── DRAW ── */
  function drawVortex(g,now){
    var cv=canvasRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');
    var elapsed=(now-g.startT)/1000;

    // Background
    ctx.fillStyle='#060918';ctx.fillRect(0,0,AW,AH);

    // Starfield
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(var si=0;si<40;si++){
      var sx=(si*137.5+now*0.005*((si%3)+1))%AW;
      var sy=(si*241.3+now*0.003*((si%2)+1))%AH;
      var sr=0.5+Math.sin(now*0.005+si)*0.5;
      ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
    }

    // Central vortex glow
    var vGrad=ctx.createRadialGradient(CX,CY,5,CX,CY,100+g.vortexPulse*30);
    vGrad.addColorStop(0,'rgba(139,92,246,0.35)');
    vGrad.addColorStop(0.4,'rgba(99,102,241,0.15)');
    vGrad.addColorStop(1,'transparent');
    ctx.fillStyle=vGrad;ctx.beginPath();ctx.arc(CX,CY,120,0,Math.PI*2);ctx.fill();

    // Vortex spiral arms
    ctx.lineWidth=2;
    for(var arm=0;arm<4;arm++){
      ctx.beginPath();
      ctx.strokeStyle='rgba(139,92,246,'+(0.15+g.vortexPulse*0.3)+')';
      for(var r=8;r<90;r+=2){
        var a=g.vortexAngle+arm*(Math.PI/2)+r*0.08;
        var x=CX+Math.cos(a)*r;var y=CY+Math.sin(a)*r;
        if(r===8)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    // Vortex center orb
    var cGrad=ctx.createRadialGradient(CX-3,CY-3,2,CX,CY,18);
    cGrad.addColorStop(0,'rgba(255,255,255,0.6)');
    cGrad.addColorStop(0.5,'rgba(167,139,250,0.5)');
    cGrad.addColorStop(1,'rgba(99,102,241,0.1)');
    ctx.fillStyle=cGrad;ctx.beginPath();ctx.arc(CX,CY,18,0,Math.PI*2);ctx.fill();

    // Connection lines from center to portals (faint)
    g.portals.forEach(function(portal){
      ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(portal.x,portal.y);
      ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.stroke();
    });

    // Particles
    g.particles.forEach(function(pt){
      var alpha=(pt.life/pt.maxLife)*0.6;
      ctx.beginPath();ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
      ctx.fillStyle=pt.color.replace(')',','+alpha+')').replace('rgb','rgba');
      // Simpler: use global alpha
      ctx.globalAlpha=alpha;ctx.fillStyle=pt.color;ctx.fill();ctx.globalAlpha=1;
    });

    // Portals
    g.portals.forEach(function(portal,pi){
      var pulse=Math.sin(now*0.004+portal.pulsePhase)*0.2;
      var portalSize=22+pulse*8;
      // Outer glow
      var pGrad=ctx.createRadialGradient(portal.x,portal.y,portalSize*0.3,portal.x,portal.y,portalSize*2.5);
      pGrad.addColorStop(0,portal.color);
      pGrad.addColorStop(0.5,portal.color+'66');
      pGrad.addColorStop(1,'transparent');
      ctx.fillStyle=pGrad;ctx.beginPath();ctx.arc(portal.x,portal.y,portalSize*2.5,0,Math.PI*2);ctx.fill();
      // Inner ring
      ctx.beginPath();ctx.arc(portal.x,portal.y,portalSize,0,Math.PI*2);
      ctx.strokeStyle=portal.color;ctx.lineWidth=3;ctx.stroke();
      // Inner fill

/* ═══════════════════════════════════════════════════════

function WheelMode(props){
  var names=props.names;var onDone=props.onDone;var onResult=props.onResult||function(){};

  var _spinMsg=useState('');var spinMsg=_spinMsg[0];var setSpinMsg=_spinMsg[1];

      ctx.beginPath();

      ctx.lineTo(cx+Math.cos(ta)*(tickR+2),cy+Math.sin(ta)*(tickR+2));
      ctx.strokeStyle=isMajor?'rgba(251,191,36,0.85)':'rgba(200,180,100,0.4)';
      ctx.lineWidth=isMajor?2:1;ctx.stroke();
    }
    // Outer border ring
    ctx.beginPath();ctx.arc(cx,cy,tickR+4,0,Math.PI*2);
    ctx.strokeStyle='rgba(109,40,217,0.35)';ctx.lineWidth=6;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,tickR+6,0,Math.PI*2);
    ctx.strokeStyle='rgba(251,191,36,0.25)';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();

    ctx.translate(cx,cy);ctx.rotate(angle);
    for(var i=0;i<N;i++){
      var sa=i*segAngle-Math.PI/2;var ea=sa+segAngle;
      var col=BALL_COLORS[i%BALL_COLORS.length];
      // Highlight winner segment when stopped
      var isWinner=(phase==='winner'&&i===winIdx);
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,sa,ea);ctx.closePath();
      if(isWinner){
        ctx.shadowBlur=30;ctx.shadowColor='rgba(251,191,36,0.9)';
        ctx.fillStyle=col;ctx.fill();
        ctx.shadowBlur=0;
        // Bright overlay
        ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,sa,ea);ctx.closePath();
        ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fill();
      }else{

      }
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=2;ctx.stroke();
      ctx.save();
      ctx.rotate(sa+segAngle/2);
      ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,0.95)';
      var fs=Math.max(8,Math.min(14,R*0.14-N*0.16));
      ctx.font='bold '+Math.round(fs)+'px Inter,sans-serif';
      ctx.shadowBlur=4;ctx.shadowColor='rgba(0,0,0,0.8)';
      ctx.fillText(truncName(names[i],10),R-12,4);
      ctx.restore();
    }
    ctx.restore();

    // Center knob
    ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);
    var grad=ctx.createRadialGradient(cx-5,cy-5,2,cx,cy,22);
    grad.addColorStop(0,'#4c1d95');grad.addColorStop(1,'#1e1b4b');
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle='rgba(251,191,36,0.7)';ctx.lineWidth=3;ctx.stroke();
    ctx.beginPath();ctx.arc(cx-5,cy-5,6,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fill();

    // Pointer (top) — bigger and more visible
    ctx.save();ctx.translate(cx,cy-R-2);
    ctx.beginPath();ctx.moveTo(0,20);ctx.lineTo(-13,-8);ctx.lineTo(13,-8);ctx.closePath();
    ctx.fillStyle='#fbbf24';
    ctx.shadowBlur=16;ctx.shadowColor='rgba(251,191,36,0.9)';
    ctx.fill();

    ctx.restore();
  },[angle,N,names,phase,winIdx]);

  function wheelCenter(){
    var c=canvasRef.current;if(!c)return{x:200,y:200};

  }
  function handleDragEnd(){
    if(!dragRef.current)return;

  }

  function spin(){
    if(phase==='spinning')return;
    setPhase('spinning');setWinner(null);setShowConfetti(false);setWinIdx(-1);setSpinMsg('\u{1F4AB} Dreht sich...');
    var dur=(7000+Math.random()*5000);
    var wi=Math.floor(Math.random()*N);
    setWinIdx(wi);
    var extraSpins=7+Math.floor(Math.random()*5);
    var winCenter=wi*segAngle+segAngle/2;
    var startA=angle%(2*Math.PI);
    // endA must satisfy: (-endA) mod 2π = winCenter mod 2π
    // i.e. endA ≡ -winCenter (mod 2π)
    var targetA=(2*Math.PI-winCenter%(2*Math.PI))%(2*Math.PI);
    var needed=(targetA-startA+2*Math.PI)%(2*Math.PI);
    var totalRot=extraSpins*2*Math.PI+needed;
    var endA=startA+totalRot;
    var t0=null;
    var ah=createAudioCtx();var lastTick=0;var slowMsgShown=false;var verySlowMsgShown=false;

        setWinner(names[wi]);setPhase('winner');setShowConfetti(true);setSpinMsg('');onResult(names[wi]);
        if(ah){

          var ctx2=ah.ctx;var m=ah.master;var now=ctx2.currentTime;

          setTimeout(function(){stopAH(ah);},1500);

    <h2 className="text-lg font-bold text-gray-800 mb-4">\u{1F3A1} Gl\u00FCcksrad</h2>
    <div className="relative mb-4" style=${{filter:phase==='winner'?'drop-shadow(0 0 20px rgba(251,191,36,0.5))':'none',transition:'filter 0.5s'}}>

    <div className="flex gap-3 mt-2 flex-wrap justify-center">
      ${phase==='idle'&&html`<button onClick=${spin} className="px-8 py-3 rounded-xl font-bold bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-400 hover:to-yellow-400 text-black shadow-lg transition-all active:scale-95">\u{1F3A1} Drehen!</button>`}

    </div>

}

/* ═══════════════════════════════════════════════════════

  var VEHICLES=['\u{1F680}','\u{1F6F8}','\u{1F6E9}\uFE0F','\u{1F388}','\u2708\uFE0F','\u{1F681}','\u{1FA81}','\u{1F985}','\u{1F98B}','\u{1F409}','\u{1F984}','\u{1F47D}','\u{1F383}','\u{1F31F}'];

  function playBeep(freq){try{var ah=audioRef.current;if(!ah)return;aT(ah.ctx,ah.master,freq,ah.ctx.currentTime,0.15,0.2,'sine');}catch(e){}}
  function playExplosion(){try{var ah=audioRef.current;if(!ah)return;var ctx=ah.ctx;var d=ah.master;var now=ctx.currentTime;aT(ctx,d,90,now,0.25,0.3,'sawtooth');aT(ctx,d,140,now+0.02,0.2,0.25,'square');aT(ctx,d,40,now+0.1,0.15,0.2,'triangle');}catch(e){}}
  function playWin(){try{var ah=audioRef.current;if(!ah)return;var ctx=ah.ctx;var d=ah.master;var now=ctx.currentTime;[523.25,659.25,783.99,1046.5].forEach(function(f,fi){aT(ctx,d,f,now+fi*0.12,0.3,0.25,'triangle');});}catch(e){}}
  function playEngineHum(){
    try{
      var ah=audioRef.current;if(!ah)return;
      var ctx=ah.ctx;var m=ah.master;
      var osc=ctx.createOscillator();osc.type='sawtooth';osc.frequency.value=55;
      var f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=200;
      var g=ctx.createGain();g.gain.value=0.05;
      osc.connect(f);f.connect(g);g.connect(m);osc.start();
      if(ah.oscs)ah.oscs.push(osc);
    }catch(e){}
  }

  function startRace(){
    clearT();if(animRef.current)cancelAnimationFrame(animRef.current);
    stopAH(audioRef.current);
    var ah=createAudioCtx();audioRef.current=ah;
    setWinner(null);setShowConfetti(false);setCommentary('');
    setPhase('countdown');
    var winnerIdx=Math.floor(Math.random()*names.length);

    var ships=names.map(function(n,i){
      return {
        id:i,name:n,
        color:BALL_COLORS[i%BALL_COLORS.length],
        emoji:VEHICLES[i%VEHICLES.length],
        x:82+Math.random()*16,y:0,
        vx:0,vy:0,
        alive:true,exploding:false,explodeT:0,
        trail:[],wobble:Math.random()*Math.PI*2,
        laneY:0,
        wobbleSpd:0.055+Math.random()*0.07,
        wobbleAmp:0.18+Math.random()*0.45
      };
    });
    var count=ships.length;
    for(var iy=0;iy<count;iy++){
      var tt=count===1?0.5:iy/(count-1);
      ships[iy].y=58+tt*(AH-116)+(Math.random()-0.5)*10;
      ships[iy].laneY=ships[iy].y; // each ship prefers its own vertical lane
    }

    var stars=[];
    for(var si=0;si<160;si++){
      stars.push({x:Math.random()*AW,y:Math.random()*AH,r:Math.random()*1.4+0.3,vx:-(0.4+Math.random()*1.8),alpha:0.25+Math.random()*0.7});
    }

    // Schedule staggered eliminations — winner is last alive
    // Spread eliminations from 3 s to 22 s so the race always lasts ~25 s
    var elimOrder=[];for(var eo=0;eo<names.length;eo++){if(eo!==winnerIdx)elimOrder.push(eo);}
    elimOrder=shuffle(elimOrder);
    var elimStart=3000;var elimEnd=22000;
    var elimN=elimOrder.length;
    var elimSchedule=elimOrder.map(function(idx,i){
      var at=elimN<=1?elimEnd:(elimStart+i*(elimEnd-elimStart)/(elimN-1));
      return {victim:idx,at:at};
    });

    gRef.current={
      ships:ships,obstacles:[],particles:[],stars:stars,
      elimSchedule:elimSchedule,winnerIdx:winnerIdx,
      startT:0,obstacleTimer:0,done:false,lastAlive:ships.length
    };
    setAliveCount(ships.length);

    setCountdown(3);
    later(function(){playBeep(440);},0);
    later(function(){setCountdown(2);playBeep(440);},900);
    later(function(){setCountdown(1);playBeep(440);},1800);
    later(function(){setCountdown('ABFLUG! \u{1F680}');playBeep(880);},2700);
    later(function(){setCountdown(null);setPhase('racing');playEngineHum();startLoop();},3500);
  }

  function startLoop(){
    var g=gRef.current;if(!g)return;
    g.startT=performance.now();
    var lastT=g.startT;
    function loop(now){
      var gg=gRef.current;if(!gg)return;
      var dt=Math.min(3,(now-lastT)/16.67);lastT=now;
      update(gg,dt);draw(gg);
      animRef.current=requestAnimationFrame(loop);
    }
    animRef.current=requestAnimationFrame(loop);
  }

  function update(g,dt){
    var elapsed=performance.now()-g.startT;

    // Scrolling stars
    for(var si=0;si<g.stars.length;si++){
      var s=g.stars[si];s.x+=s.vx*dt;
      if(s.x<-2){s.x=AW+2;s.y=Math.random()*AH;}
    }

    if(!g.done){
      g.obstacleTimer+=dt;
      if(g.obstacleTimer>9){g.obstacleTimer=0;spawnRandomObstacle(g);}
      while(g.elimSchedule.length&&g.elimSchedule[0].at<=elapsed){
        var ev=g.elimSchedule.shift();
        var victim=g.ships[ev.victim];
        if(victim&&victim.alive&&!victim.exploding){spawnHomingObstacle(g,ev.victim);}
      }
    }

    // Update ships
    var aliveShips=0;
    for(var i=0;i<g.ships.length;i++){
      var sh=g.ships[i];
      if(sh.exploding){
        sh.explodeT+=dt;
        if(sh.explodeT<5){
          for(var pp=0;pp<2;pp++){
            g.particles.push({x:sh.x+(Math.random()-0.5)*18,y:sh.y+(Math.random()-0.5)*18,vx:(Math.random()-0.5)*2.5,vy:(Math.random()-0.5)*2.5,life:18,maxLife:18,color:pp%2?'#FFB84D':'#FF3B30',size:2+Math.random()*2});
          }
        }
        if(sh.explodeT>12){sh.alive=false;sh.exploding=false;}
        continue;
      }
      if(!sh.alive)continue;
      aliveShips++;

      // AI dodge — scan for closest obstacle ahead (ignore mines targeting other ships)
      var dodge=0;var closest=null;var cd=99999;
      for(var oi=0;oi<g.obstacles.length;oi++){
        var o=g.obstacles[oi];if(o.consumed)continue;
        if(o.homing&&o.target!==i)continue; // ignore mines meant for others
        var dxo=o.x-sh.x;if(dxo<-30||dxo>220)continue;
        var dyo=o.y-sh.y;
        var dd=Math.sqrt(dxo*dxo+dyo*dyo);
        if(dd<cd){cd=dd;closest=o;}
      }
      if(closest&&cd<90){
        var ddy=closest.y-sh.y;
        dodge=ddy>0?-1:1;
        if(Math.abs(ddy)<6)dodge=Math.sin(sh.wobble)>0?-1:1;
      }else{
        dodge=(sh.laneY-sh.y)*0.005; // return to own lane, not shared center
      }
      sh.wobble+=sh.wobbleSpd*dt;
      sh.vy+=dodge*0.75*dt;
      sh.vy*=0.88;
      sh.y+=sh.vy*dt;
      sh.y+=Math.sin(sh.wobble)*sh.wobbleAmp*dt;
      if(sh.y<36){sh.y=36;sh.vy=Math.abs(sh.vy)*0.3;}
      if(sh.y>AH-36){sh.y=AH-36;sh.vy=-Math.abs(sh.vy)*0.3;}
      sh.x+=Math.sin(sh.wobble*1.3)*0.18*dt;
      if(sh.x<62)sh.x=62;
      if(sh.x>150)sh.x=150;

      sh.trail.push({x:sh.x,y:sh.y});
      if(sh.trail.length>9)sh.trail.shift();

      // Any obstacle eliminates on collision — homing mines only hit their target
      for(var oj=0;oj<g.obstacles.length;oj++){
        var obj=g.obstacles[oj];
        if(obj.consumed)continue;
        if(obj.homing&&obj.target!==i)continue; // homing mine targets specific ship only
        if(!obj.homing&&i===g.winnerIdx)continue; // winner is immune to random obstacles
        var cdx=obj.x-sh.x;var cdy=obj.y-sh.y;
        var cdd=Math.sqrt(cdx*cdx+cdy*cdy);
        var hitR=obj.homing?obj.r+15:obj.r+10;
        if(cdd<hitR){
          sh.exploding=true;sh.explodeT=0;
          obj.consumed=true;
          // Remove from pending elim schedule
          g.elimSchedule=g.elimSchedule.filter(function(ev){return ev.victim!==i;});
          playExplosion();
          for(var bp=0;bp<20;bp++){
            g.particles.push({x:sh.x,y:sh.y,vx:(Math.random()-0.5)*5.5,vy:(Math.random()-0.5)*5.5,life:24,maxLife:24,color:bp%3===0?'#FF3B30':(bp%3===1?'#FFB84D':'#FFEA00'),size:2.5+Math.random()*2.5});
          }
          (function(nm){
            setCommentary('\u{1F4A5} '+nm+' ausgeschieden!');
            later(function(){setCommentary('');},1100);
          })(sh.name);
          break;
        }
      }
    }

    if(g.lastAlive!==aliveShips){g.lastAlive=aliveShips;setAliveCount(aliveShips);}

    // Update obstacles
    for(var ok=g.obstacles.length-1;ok>=0;ok--){
      var ob=g.obstacles[ok];
      if(ob.homing&&!ob.consumed){
        var vs=g.ships[ob.target];
        if(vs&&vs.alive&&!vs.exploding){
          var tdx=vs.x-ob.x;var tdy=vs.y-ob.y;
          var tdd=Math.sqrt(tdx*tdx+tdy*tdy);
          if(tdd>0.1){
            var sp=5.5;
            ob.vx+=(tdx/tdd*sp-ob.vx)*0.2;
            ob.vy+=(tdy/tdd*sp-ob.vy)*0.2;
          }
        }
      }
      ob.x+=ob.vx*dt;ob.y+=ob.vy*dt;
      ob.rot+=ob.rotV*dt;
      if(ob.x<-70||ob.x>AW+80||ob.y<-80||ob.y>AH+80){g.obstacles.splice(ok,1);}
    }

    // Particles
    for(var pk=g.particles.length-1;pk>=0;pk--){
      var pt=g.particles[pk];
      pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;
      pt.vy+=0.04*dt;
      pt.life-=dt;
      if(pt.life<=0)g.particles.splice(pk,1);
    }

    // Winner detection — always use the predetermined winnerIdx
    if(!g.done&&aliveShips<=1&&elapsed>2200){
      g.done=true;
      var winName=g.ships[g.winnerIdx].name;
      (function(nm){
        later(function(){setPhase('winner');setWinner(nm);setShowConfetti(true);playWin();onResult(nm);},700);
      })(winName);
    }
    if(!g.done&&elapsed>26000){
      g.done=true;
      var _winNm=g.ships[g.winnerIdx].name;setPhase('winner');setWinner(_winNm);setShowConfetti(true);playWin();onResult(_winNm);
    }
  }

  function spawnRandomObstacle(g){
    var types=['asteroid','asteroid','asteroid','comet','debris'];
    var type=types[Math.floor(Math.random()*types.length)];
    var r=14+Math.random()*14;
    g.obstacles.push({
      type:type,x:AW+40,y:40+Math.random()*(AH-80),
      vx:-(1.8+Math.random()*1.7),vy:(Math.random()-0.5)*0.5,
      r:r,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.06,
      homing:false,consumed:false
    });
  }

  function spawnHomingObstacle(g,targetIdx){
    var ts=g.ships[targetIdx];if(!ts)return;
    g.obstacles.push({
      type:'mine',x:AW+30,y:ts.y+(Math.random()-0.5)*50,
      vx:-4,vy:0,r:19,rot:0,rotV:0.12,
      homing:true,target:targetIdx,consumed:false
    });
  }

  function draw(g){
    var cv=canvasRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');
    ctx.setTransform(2,0,0,2,0,0);

    // Deep space gradient
    var bg=ctx.createLinearGradient(0,0,0,AH);
    bg.addColorStop(0,'#030318');bg.addColorStop(0.5,'#0a0a28');bg.addColorStop(1,'#140828');
    ctx.fillStyle=bg;ctx.fillRect(0,0,AW,AH);

    // Nebulas
    var nb=ctx.createRadialGradient(AW*0.3,AH*0.35,10,AW*0.3,AH*0.35,320);
    nb.addColorStop(0,'rgba(139,92,246,0.18)');nb.addColorStop(1,'rgba(139,92,246,0)');
    ctx.fillStyle=nb;ctx.fillRect(0,0,AW,AH);
    var nb2=ctx.createRadialGradient(AW*0.78,AH*0.7,10,AW*0.78,AH*0.7,280);
    nb2.addColorStop(0,'rgba(236,72,153,0.13)');nb2.addColorStop(1,'rgba(236,72,153,0)');
    ctx.fillStyle=nb2;ctx.fillRect(0,0,AW,AH);

    // Stars
    for(var si=0;si<g.stars.length;si++){
      var s=g.stars[si];
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+s.alpha+')';ctx.fill();
    }

    // Obstacles
    for(var oi=0;oi<g.obstacles.length;oi++){
      var o=g.obstacles[oi];
      ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.rot);
      if(o.type==='asteroid'){
        var grd=ctx.createRadialGradient(-o.r*0.3,-o.r*0.3,o.r*0.1,0,0,o.r);
        grd.addColorStop(0,'#9B8466');grd.addColorStop(0.6,'#5D4A37');grd.addColorStop(1,'#2E2218');
        ctx.fillStyle=grd;
        ctx.beginPath();
        var pts=9;
        for(var pi2=0;pi2<pts;pi2++){
          var a=pi2*Math.PI*2/pts;
          var rr=o.r*(0.82+Math.sin(a*4+o.rotV*100)*0.18);
          var px=Math.cos(a)*rr;var py=Math.sin(a)*rr;
          if(pi2===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
        }
        ctx.closePath();ctx.fill();
        ctx.fillStyle='rgba(0,0,0,0.4)';
        ctx.beginPath();ctx.arc(-o.r*0.28,-o.r*0.15,o.r*0.22,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(o.r*0.22,o.r*0.28,o.r*0.15,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(o.r*0.15,-o.r*0.35,o.r*0.1,0,Math.PI*2);ctx.fill();
      }else if(o.type==='comet'){
        ctx.rotate(-o.rot);
        var tg=ctx.createLinearGradient(-o.r*3.2,0,0,0);
        tg.addColorStop(0,'rgba(100,200,255,0)');tg.addColorStop(1,'rgba(200,240,255,0.85)');
        ctx.fillStyle=tg;
        ctx.beginPath();
        ctx.moveTo(-o.r*3.2,-o.r*0.4);ctx.lineTo(0,-o.r);ctx.lineTo(0,o.r);ctx.lineTo(-o.r*3.2,o.r*0.4);
        ctx.closePath();ctx.fill();
        var hg=ctx.createRadialGradient(0,0,0,0,0,o.r);
        hg.addColorStop(0,'#ffffff');hg.addColorStop(0.4,'#9fdbff');hg.addColorStop(1,'#2a6bb0');
        ctx.fillStyle=hg;
        ctx.beginPath();ctx.arc(0,0,o.r,0,Math.PI*2);ctx.fill();
      }else if(o.type==='debris'){
        ctx.fillStyle='#4B5563';ctx.fillRect(-o.r,-o.r*0.35,o.r*2,o.r*0.7);
        ctx.fillStyle='#1F2937';ctx.fillRect(-o.r*0.9,-o.r*0.65,o.r*0.45,o.r*1.3);
        ctx.strokeStyle='#9CA3AF';ctx.lineWidth=1;
        ctx.strokeRect(-o.r,-o.r*0.35,o.r*2,o.r*0.7);
        ctx.fillStyle='#FBBF24';ctx.fillRect(-o.r*0.2,-o.r*0.1,o.r*0.12,o.r*0.2);
      }else if(o.type==='mine'){
        var mg=ctx.createRadialGradient(0,0,2,0,0,o.r);
        mg.addColorStop(0,'#ff8080');mg.addColorStop(0.65,'#a01818');mg.addColorStop(1,'#300000');
        ctx.fillStyle=mg;
        ctx.beginPath();ctx.arc(0,0,o.r*0.72,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#b91c1c';
        for(var k=0;k<8;k++){
          ctx.save();ctx.rotate(k*Math.PI/4);
          ctx.beginPath();
          ctx.moveTo(o.r*0.7,-3.2);ctx.lineTo(o.r*1.25,0);ctx.lineTo(o.r*0.7,3.2);
          ctx.closePath();ctx.fill();
          ctx.restore();
        }
        var pulse=0.5+0.5*Math.sin(performance.now()*0.018);
        ctx.fillStyle='rgba(255,220,120,'+pulse+')';
        ctx.beginPath();ctx.arc(0,0,o.r*0.28,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }

    // Particles
    for(var pi3=0;pi3<g.particles.length;pi3++){
      var p=g.particles[pi3];
      ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
      ctx.beginPath();ctx.arc(p.x,p.y,p.size||2,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();
    }
    ctx.globalAlpha=1;

    // Ships
    for(var shi=0;shi<g.ships.length;shi++){
      var sh=g.ships[shi];
      if(!sh.alive&&!sh.exploding)continue;

      if(!sh.exploding&&sh.trail.length>1){
        ctx.strokeStyle=sh.color+'55';
        ctx.lineWidth=3;ctx.lineCap='round';
        ctx.beginPath();
        for(var ti=0;ti<sh.trail.length;ti++){
          var tp=sh.trail[ti];
          if(ti===0)ctx.moveTo(tp.x-10,tp.y);
          else ctx.lineTo(tp.x-10,tp.y);
        }
        ctx.stroke();
      }

      var alpha=sh.exploding?Math.max(0,1-sh.explodeT/10):1;
      ctx.globalAlpha=alpha;

      if(!sh.exploding){
        var fl=4+Math.sin(performance.now()*0.02+shi)*1.8;
        var fg=ctx.createRadialGradient(sh.x-14,sh.y,0,sh.x-14,sh.y,12);
        fg.addColorStop(0,'rgba(255,240,100,0.92)');
        fg.addColorStop(0.4,'rgba(255,120,50,0.7)');
        fg.addColorStop(1,'rgba(255,50,0,0)');
        ctx.fillStyle=fg;
        ctx.beginPath();
        ctx.ellipse(sh.x-14-fl*0.5,sh.y,11+fl,4.5,0,0,Math.PI*2);
        ctx.fill();
      }

      ctx.font='22px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(sh.emoji,sh.x,sh.y);

      if(!sh.exploding){
        ctx.font='bold 10px Inter,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='top';
        ctx.strokeStyle='rgba(0,0,0,0.85)';
        ctx.lineWidth=3;ctx.lineJoin='round';
        var nm=truncName(sh.name,9);
        ctx.strokeText(nm,sh.x,sh.y+15);
        ctx.fillStyle=sh.color;
        ctx.fillText(nm,sh.x,sh.y+15);
      }

      ctx.globalAlpha=1;
    }
  }

  return html`<div className="flex flex-col items-center w-full max-w-5xl">
    ${showConfetti&&html`<${Confetti}/>`}
    ${countdown!==null&&html`<div style=${{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:65,pointerEvents:'none'}}>
      <div className="countdown-pop text-7xl font-black text-white" style=${{textShadow:'0 0 50px rgba(59,130,246,0.9)'}}>${countdown}</div>
    </div>`}
    <h2 className="text-lg font-bold text-gray-800 mb-1">\u{1F680} Space Race</h2>
    <p className="text-gray-500 text-xs mb-3">Weiche den Asteroiden aus \u2014 wer überlebt, gewinnt!</p>
    ${commentary&&html`<div role="status" aria-live="polite" className="text-center mb-2 px-4 py-1.5 rounded-full font-bold text-sm fade-in" style=${{background:'linear-gradient(135deg,rgba(239,68,68,0.18),rgba(249,115,22,0.18))',border:'1px solid rgba(249,115,22,0.35)',color:'#c2410c'}}>${commentary}</div>`}
    ${phase==='racing'&&!commentary&&html`<div className="text-xs text-indigo-500 font-bold mb-2">\u{1F6F8} ${aliveCount} / ${names.length} noch im All</div>`}
    <div className="w-full rounded-2xl p-2 mb-4 relative overflow-hidden" style=${{background:'rgba(3,3,20,0.85)',border:'1px solid rgba(99,102,241,0.35)',boxShadow:'0 0 35px rgba(99,102,241,0.25)'}}>
      <canvas ref=${canvasRef} width=${AW*2} height=${AH*2} style=${{width:'100%',height:'auto',display:'block',borderRadius:'0.75rem'}}/>
    </div>
    ${winner&&html`<div className="winner-enter mb-4 w-full max-w-sm text-center">
      <div className="winner-card rounded-2xl px-8 py-5 text-white shadow-2xl border-2 border-amber-400/40" style=${{background:'linear-gradient(135deg,#0f2027,#1e3a5f)'}}>
        <div className="text-amber-200 text-xs font-semibold tracking-widest uppercase mb-1">\u{1F680} Space Race \u2014 Sieger</div>
        <div className="text-3xl font-black">${winner}</div>
        <div className="mt-2 text-xl">\u{1F389}\u{1F3C6}\u{1F680}</div>
        <${CopyButton} modeName="Space Race" winner=${winner}/>
      </div>
    </div>`}
    <div className="flex gap-3 mt-2 flex-wrap justify-center">
      ${phase==='idle'&&html`<button onClick=${startRace} className="px-8 py-3 rounded-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white shadow-lg transition-all active:scale-95">\u{1F680} Abheben!</button>`}
      ${(phase==='countdown'||phase==='racing')&&html`<button onClick=${function(){clearT();if(animRef.current)cancelAnimationFrame(animRef.current);stopAH(audioRef.current);onDone();}} className="px-5 py-2 rounded-xl font-semibold bg-gray-100 text-gray-500 border border-gray-200 hover:bg-gray-200 transition-all text-sm">\u2715 Abbrechen</button>`}
      ${phase==='winner'&&html`<span className="flex gap-3">
        <button onClick=${startRace} className="px-6 py-3 rounded-xl font-semibold bg-blue-100 text-blue-700 border border-blue-200 hover:bg-blue-200 transition-all">Nochmal</button>

    </div>

}

function CopyButton(props){
  var modeName=props.modeName||'Generator';
  var winner=props.winner||'';
  var _copied=React.useState(false);var copied=_copied[0];var setCopied=_copied[1];
  function doCopy(){
    var text=modeName+': '+winner+' hat gewonnen! — Beneschgenerator';
    navigator.clipboard&&navigator.clipboard.writeText(text).then(function(){
      setCopied(true);setTimeout(function(){setCopied(false);},1500);
    }).catch(function(){setCopied(true);setTimeout(function(){setCopied(false);},1500);});
  }
  return html`<button onClick=${doCopy} className="mt-2 px-4 py-1.5 rounded-lg text-xs font-semibold border border-gray-600 text-gray-300 hover:bg-gray-700 transition-all">${copied?'✓ Kopiert!':'📋 Ergebnis kopieren'}</button>`;
}

                  <p className="text-sm text-white/90 leading-relaxed">Kugeln werden nacheinander aus der Trommel gezogen.</p>
                </button>

                <button onClick=${function(){launchMode('battle')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-amber-500 to-orange-600 border-transparent cursor-pointer shadow-lg shadow-amber-200":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(245,158,11,0.15)'}}>
                  <div className="text-2xl mb-2">\u2694\uFE0F</div>
                  <div className="text-base font-bold text-white mb-1">Turnier</div>
                  <p className="text-sm text-white/90 leading-relaxed">K.O.-Turnier mit HP-Balken. Zwei Duelle gleichzeitig!</p>
                </button>

                <button onClick=${function(){launchMode('spielplatz')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-orange-500 to-red-500 border-transparent cursor-pointer shadow-lg shadow-orange-200":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(249,115,22,0.15)'}}>
                  <div className="flex items-start justify-between mb-2">
                    <div className="text-2xl">\u{1F3D7}\uFE0F</div>
                    <span className="badge-new">NEU</span>
                  </div>
                  <div className="text-base font-bold text-white mb-1">Spielplatz</div>
                  <p className="text-sm text-white/90 leading-relaxed">Alle rasen horizontal durch 4 Gefahrenzonen — nur einer gewinnt!</p>
                </button>

                <button onClick=${function(){launchMode('wheel')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-yellow-400 to-amber-500 border-transparent cursor-pointer shadow-lg shadow-yellow-200 text-gray-900":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(251,191,36,0.15)'}}>
                  <div className="flex items-start justify-between mb-2">
                    <div className="text-2xl">\u{1F3A1}</div>
                    <span className="badge-new">NEU</span>
                  </div>
                  <div className="text-base font-bold text-white mb-1">Gl\u00FCcksrad</div>
                  <p className="text-sm text-white/90 leading-relaxed">SVG-Rad dreht sich — wer landet oben am Zeiger?</p>
                </button>

                <button onClick=${function(){launchMode('spacerace')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-blue-500 to-indigo-600 border-transparent cursor-pointer shadow-lg shadow-blue-200":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(59,130,246,0.15)'}}>
                  <div className="flex items-start justify-between mb-2">
                    <div className="text-2xl">\u{1F680}</div>
                    <span className="badge-new">NEU</span>
                  </div>
                  <div className="text-base font-bold text-white mb-1">Space Race</div>
                  <p className="text-sm text-white/90 leading-relaxed">Raketen rasen zum Ziel — Kopf-an-Kopf Slow-Mo!</p>
                </button>
              </div>

              <div className="flex items-center justify-center gap-3 mb-5">
                <div className="section-divider flex-1"/>
                <h2 className="category-label category-label-green">\u{1F465} Gruppen</h2>
                <div className="section-divider flex-1"/>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <button onClick=${function(){launchMode('groupquick')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-teal-500 to-cyan-500 border-transparent cursor-pointer shadow-lg shadow-teal-200":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(20,184,166,0.15)'}}>
                  <div className="text-2xl mb-2">\u26A1</div>
                  <div className="text-base font-bold text-white mb-1">Gruppen sofort</div>
                  <p className="text-sm text-white/90 leading-relaxed">Zuf\u00E4llige Gruppen werden sofort angezeigt.</p>
                </button>

                <button onClick=${function(){launchMode('groupanim')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-pink-500 to-fuchsia-600 border-transparent cursor-pointer shadow-lg shadow-pink-200":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(236,72,153,0.15)'}}>
                  <div className="text-2xl mb-2">\u{1F3AE}</div>
                  <div className="text-base font-bold text-white mb-1">Super Mario</div>
                  <p className="text-sm text-white/90 leading-relaxed">Kugeln laufen durchs Level in Gruppen-Pipes!</p>
                </button>

                <button onClick=${function(){launchMode('maze')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-amber-400 to-yellow-500 border-transparent cursor-pointer shadow-lg shadow-amber-200 text-gray-900":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(180,140,50,0.15)'}}>
                  <div className="text-2xl mb-2">\u{1F3B2}</div>
                  <div className="text-base font-bold text-white mb-1">Labyrinth</div>
                  <p className="text-sm text-white/90 leading-relaxed">Murmeln rollen durch ein Holz-Labyrinth in L\u00F6cher 1\u20134!</p>
                </button>

                <button onClick=${function(){launchMode('vortex')}} disabled=${checkedNames.length<2} onMouseMove=${trackMouse}
                  className=${"mode-card group rounded-2xl p-5 text-left border "+(checkedNames.length>=2?"bg-gradient-to-br bg-gradient-to-br from-indigo-500 to-violet-600 border-transparent cursor-pointer shadow-lg shadow-indigo-200":"bg-gray-100 border-gray-200 cursor-not-allowed opacity-40")}
                  style=${{['--card-glow']:'rgba(139,92,246,0.15)'}}>
                  <div className="flex items-start justify-between mb-2">
                    <div className="text-2xl">\u{1F300}</div>
                    <span className="badge-new">NEU</span>
                  </div>
                  <div className="text-base font-bold text-white mb-1">Dimensions-Portal</div>
                  <p className="text-sm text-white/90 leading-relaxed">Wirbel saugt alle in farbige Portale \u2014 gleich gro\u00DFe Gruppen!</p>
                </button>
              </div>
            </section>
          </div>`
        )}
        <${ErrorBoundary} onReset=${function(){setScreen('input')}}>
          ${screen==='lotto'&&html`<${LottoMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Lotto',w)}}/>`}
          ${screen==='battle'&&html`<${BattleMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Turnier',w)}}/>`}
          ${screen==='groupquick'&&html`<${GroupQuickMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Gruppen',w)}}/>`}
          ${screen==='groupanim'&&html`<${GroupAnimMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Mario',w)}}/>`}
          ${screen==='chaos'&&html`<${ChaosArenaMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Chaos',w)}}/>`}
          ${screen==='maze'&&html`<${MarbleMazeMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Labyrinth',w)}}/>`}
          ${screen==='battleroyale'&&html`<${BattleRoyaleMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('BattleRoyale',w)}}/>`}
          ${screen==='vortex'&&html`<${VortexPortalMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Vortex',w)}}/>`}
          ${screen==='wheel'&&html`<${WheelMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Glücksrad',w)}}/>`}
          ${screen==='spacerace'&&html`<${SpaceRaceMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('SpaceRace',w)}}/>`}
          ${screen==='spielplatz'&&html`<${SpielplatzMode} names=${gameNames} onDone=${function(){setScreen('input')}} onResult=${function(w){recordResult('Spielplatz',w)}}/>`}
        </${ErrorBoundary}>
      </main>
      <footer className="footer-glass text-center py-5 relative" style=${{zIndex:1}}>
        <div className="text-gray-700 text-sm font-bold tracking-widest uppercase mb-1">🎲 Beneschgenerator</div>
        <div className="text-gray-400 text-xs">12 Modi \u00B7 Bis zu 50 Teilnehmer \u00B7 Zufall entscheidet</div>
        <div className="text-gray-300 text-xs mt-2">\u00A9 2026 Beneschgenerator</div>
      </footer>
    </div>`
  );
}

var root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
