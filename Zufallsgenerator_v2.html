  useEffect(function(){
    function onKey(e){if((e.code==='Space'||e.key===' ')&&phase==='idle'){e.preventDefault();startChaos();}}
    window.addEventListener('keydown',onKey);return function(){window.removeEventListener('keydown',onKey);};
  },[phase]);

  function doCleanup(){
    timers.current.forEach(clearTimeout);timers.current=[];
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
    stopAH(audioRef.current);audioRef.current=null;
  }
  function later(fn,ms){timers.current.push(setTimeout(fn,ms));}

  var KILL_COMMENTS=['\u{1F4A5} Brutal!','\u{1F525} Erwischt!','\u26A1 Zap!','\u{1F480} RIP!','\u{1F631} Oh nein!','\u2620 Aus!','\u{1F4A8} Weg!','\u{1F92F} Krass!','\u{1F62D} Tsch\u00FCss!','\u{1F3AF} Volltreffer!'];
  var CLOSE_COMMENTS=['\u{1F4A5} Knapp!','\u{1F525} Gerade so!','\u26A1 Haarscharf!','\u{1F62C} Fast geschafft!'];
  function addKill(name,cause,aliveLeft){
    var comment=aliveLeft<=2?CLOSE_COMMENTS[Math.floor(Math.random()*CLOSE_COMMENTS.length)]:KILL_COMMENTS[Math.floor(Math.random()*KILL_COMMENTS.length)];
    var causeEmoji={dangerZone:'\u{1F534}',shockwave:'\u26A1',magnet:'\u{1F9F2}',cut:'\u2702',gravityFlip:'\u{1F300}'};
    var entry={text:(causeEmoji[cause]||'\u{1F4A5}')+' '+name+' - '+comment,time:Date.now()};
    setKillFeed(function(prev){var next=prev.concat(entry);return next.slice(-5);});
  }

  /* ── AUDIO (uses shared helpers aT/aC/createAudioCtx/stopAH) ── */
  function startAudio(){
    try{
      var ah=createAudioCtx();if(!ah)return;audioRef.current=ah;
      var ctx=ah.ctx;var master=ah.master;
      master.gain.value=0.5;
      // Low bass drone
      var drone=ctx.createOscillator();drone.type='sawtooth';drone.frequency.value=55;
      var dg=ctx.createGain();dg.gain.value=0.35;
      var df=ctx.createBiquadFilter();df.type='lowpass';df.frequency.value=200;
      drone.connect(df);df.connect(dg);dg.connect(master);drone.start();
      if(ah.oscs)ah.oscs.push(drone);
      // Rhythm + chords
      var now=ctx.currentTime;var b=60/120;
      for(var i=0;i<90;i++){
        var t=now+i*b*0.5;
        if(i%4===0){aT(ctx,master,60,t,0.35,0.7);aT(ctx,master,45,t+0.01,0.2,0.5);}
        if(i%4===2){aT(ctx,master,80,t,0.15,0.35);}
        if(i%16===0&&i>0){aC(ctx,master,t,[220,261.6,329.6],0.18,0.5);}
        if(i%8===6){aT(ctx,master,110,t,0.25,0.25);}
        if(i%32===0&&i>0){aC(ctx,master,t,[440,523.25,659.25],0.1,1.2);}
      }
      master.gain.linearRampToValueAtTime(0.7,ctx.currentTime+6);
      master.gain.linearRampToValueAtTime(0.85,ctx.currentTime+14);
      master.gain.linearRampToValueAtTime(0.5,ctx.currentTime+21);
    }catch(e){}
  }
  function playHit(){
    try{
      var ah=audioRef.current;if(!ah)return;var ctx=ah.ctx;var dest=ah.master;
      var now=ctx.currentTime;
      aT(ctx,dest,110,now,0.1,0.9);aT(ctx,dest,165,now+0.02,0.08,0.6);
      var buf=ctx.createBuffer(1,ctx.sampleRate*0.12,ctx.sampleRate);
      var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.4;
      var src=ctx.createBufferSource();src.buffer=buf;
      var ng=ctx.createGain();ng.gain.setValueAtTime(0.5,now);ng.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      var nf=ctx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=800;nf.Q.value=1;
      src.connect(nf);nf.connect(ng);ng.connect(dest);src.start(now);
    }catch(e){}
  }

  /* ── INIT ── */
  function initBalls(){
    var balls=[];var margin=BR*3;
    for(var i=0;i<names.length;i++){
      var attempts=0,x,y;
      do{x=margin+Math.random()*(AW-margin*2);y=margin+Math.random()*(AH-margin*2);attempts++;}
      while(attempts<80&&balls.some(function(b){return Math.sqrt(Math.pow(b.x-x,2)+Math.pow(b.y-y,2))<BR*2.5}));
      var ang=Math.random()*Math.PI*2,spd=1.5+Math.random()*1.5;
      balls.push({id:i,name:names[i],color:BALL_COLORS[i%BALL_COLORS.length],
        x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
        alive:true,elimT:0,elimFlash:0,elimCause:'',fakeDanger:0,targeting:0,targetCause:''});
    }
    return balls;
  }

  /* ── START ── */
  function startChaos(){
    doCleanup();
    var g={balls:initBalls(),events:[],gravity:{x:0,y:0},elimList:[],particles:[],floaters:[],done:false};
    gRef.current=g;
    setEliminated([]);setWinner(null);setShowConfetti(false);setSurviving(names.length);setKillFeed([]);
    setPhase('running');setStatusText('\u26A1 Chaos beginnt!');
    startAudio();
    scheduleDrama(g);
    var last=performance.now();
    function loop(now){
      var dt=Math.min((now-last)/16.67,3);last=now;
      var alive=g.balls.filter(function(b){return b.alive}).length;
      if(alive<=3&&alive>0)dt*=0.5;
      physicsStep(g,dt);drawFrame();
      if(!g.done)rafRef.current=requestAnimationFrame(loop);
    }
    rafRef.current=requestAnimationFrame(loop);
  }

  /* ── DRAMA SCHEDULER (max 20s) ── */
  function scheduleDrama(g){
    var n=names.length;
    var seq=[];var t=600;
    var rem=n-1;

    // Phase 1: 0-2.5s fast chaos — eliminate ~50%
    var p1=Math.min(Math.max(1,Math.floor(n*0.5)),rem-1);
    var p1types=['dangerZone','shockwave','cut','dangerZone','shockwave'];
    for(var i=0;i<p1&&t<2500;){
      var e=Math.min(Math.floor(Math.random()*2)+1,p1-i);
      seq.push({t:t,type:p1types[i%p1types.length],elim:e});
      i+=e;t+=400+Math.floor(Math.random()*200);
    }
    rem-=p1;
    seq.push({t:Math.min(t+200,3000),type:'_s',text:'\u{1F441} Wer bleibt \u00FCbrig?'});

    // Phase 2: 3-7s mixed events — eliminate ~25%
    t=Math.max(t+400,3200);
    var p2=Math.min(Math.max(0,Math.floor(n*0.2)),rem-1);
    var p2types=['magnet','gravityFlip','dangerZone','shockwave','cut'];
    for(var j=0;j<p2&&t<7000;j++){
      seq.push({t:t,type:p2types[j%p2types.length],elim:1});
      t+=800+Math.floor(Math.random()*400);
    }
    rem-=p2;

    // Phase 3: 7-12s slow + fake drama
    t=Math.max(t+500,7500);
    seq.push({t:t,type:'_s',text:'\u{1F480} Noch wenige...'});t+=500;
    var p3=Math.max(0,rem-(n>3?2:1));
    var p3types=['dangerZone','cut','magnet'];
    for(var k=0;k<p3&&t<12000;k++){
      seq.push({t:t,type:'_f',text:''});t+=500;
      seq.push({t:t,type:p3types[k%p3types.length],elim:1});t+=1200+Math.floor(Math.random()*300);
    }
    rem-=p3;

    // Phase 4: 12-18s final drama
    t=Math.max(t+200,12500);
    seq.push({t:t,type:'_s',text:'\u{1F631} JETZT passiert\'s...'});t+=400;
    seq.push({t:t,type:'_f',text:''});t+=800;
    seq.push({t:t,type:'_s',text:'...oder doch nicht?'});t+=800;
    seq.push({t:t,type:'_f',text:''});t+=600;

    if(rem>0){
      seq.push({t:Math.min(t,16500),type:'_s',text:'\u{1F525} JETZT!'});t=Math.min(t+200,16700);
      var fTypes=['cut','dangerZone','shockwave'];
      for(var fi=0;fi<rem;fi++){seq.push({t:t,type:fTypes[fi%fTypes.length],elim:1});t+=500;}
    }
    var endT=Math.min(t+1200,19500);

    seq.forEach(function(item){
      later(function(){
        if(g.done)return;
        var alive=g.balls.filter(function(b){return b.alive}).length;
        if(item.type==='_s'){setStatusText(item.text);}
        else if(item.type==='_f'){triggerFakeDanger(g);setStatusText(['\u{1F631} FAST!','\u{1F480} ACHTUNG!','\u{1F630} Knapp...'][Math.floor(Math.random()*3)]);}
        else if(alive>1){
          var re=Math.min(item.elim,alive-1);
          if(re>0){setStatusText(evText(item.type));showEventBanner(item.type);fireEvent(g,item.type,re);}
        }
      },item.t);
    });
    later(function(){if(!g.done)checkWinner(g);},endT);
  }

  var EVENT_BANNER_DATA={
    dangerZone:{text:'\u{1F534} GEFAHRENZONE!',color:'rgba(239,68,68,0.9)'},
    shockwave:{text:'\u26A1 SCHOCKWELLE!',color:'rgba(251,191,36,0.9)'},
    magnet:{text:'\u{1F9F2} MAGNETFELD!',color:'rgba(139,92,246,0.9)'},
    cut:{text:'\u{1FA93} CUT INCOMING!',color:'rgba(250,204,21,0.9)'},
    gravityFlip:{text:'\u{1F300} GRAVITY FLIP!',color:'rgba(99,102,241,0.9)'}
  };

  function showEventBanner(type){
    var d=EVENT_BANNER_DATA[type];if(!d)return;
    setEventBanner({text:d.text,color:d.color,id:Date.now()});
    later(function(){setEventBanner(null);},1800);

    // Add shockwave ring for shockwave events

  function evText(t){

  }

  function triggerFakeDanger(g){
    var alive=g.balls.filter(function(b){return b.alive});
    if(!alive.length)return;
    var ball=alive[Math.floor(Math.random()*alive.length)];

    later(function(){ball.fakeDanger=0;},1100);

  var CAUSE_COLORS={dangerZone:'#ef4444',shockwave:'#fbbf24',magnet:'#a855f7',cut:'#facc15',gravityFlip:'#818cf8'};
  var CAUSE_FLOATS={dangerZone:'🔴 ZONE!',shockwave:'⚡ WELLE!',magnet:'🧲 MAGNET!',cut:'✂️ CUT!',gravityFlip:'🌀 FLIP!'};

  function spawnParticles(g,x,y,ballColor,count,causeType){
    var c=CAUSE_COLORS[causeType]||ballColor;
    for(var i=0;i<count;i++){
      var ang=Math.random()*Math.PI*2;
      var spd=3+Math.random()*9;

      g.particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-(isSpark?2:0),
        life:1,decay:0.016+Math.random()*0.018,r:isSpark?1.5+Math.random()*1.5:2.5+Math.random()*3,
        color:isSpark?'#ffffff':c,isDebris:!isSpark});
    }
    // Shockring: large expanding circle
    g.particles.push({x:x,y:y,vx:0,vy:0,life:1,decay:0.035,r:BR,maxR:BR*6,isRing:true,color:c});
  }

  function spawnFloater(g,x,y,text,color){
    g.floaters.push({x:x,y:y,vy:-1.4,text:text,color:color,life:1,decay:0.013});

  /* ── Find cluster center of alive balls ── */
  function findCluster(g){
    var alive=g.balls.filter(function(b){return b.alive;});
    if(alive.length<2)return{x:AW/2,y:AH/2};
    // Find densest cluster: pick ball with most neighbors within radius
    var bestIdx=0;var bestCount=0;
    for(var i=0;i<alive.length;i++){
      var cnt=0;
      for(var j=0;j<alive.length;j++){
        if(i===j)continue;
        var d=Math.sqrt(Math.pow(alive[i].x-alive[j].x,2)+Math.pow(alive[i].y-alive[j].y,2));
        if(d<120)cnt++;
      }
      if(cnt>bestCount){bestCount=cnt;bestIdx=i;}
    }
    return{x:alive[bestIdx].x,y:alive[bestIdx].y};
  }

  /* ── FIRE EVENT (smart targeting) ── */
  function fireEvent(g,type,elimCount){
    var ev={type:type,life:0,elim:elimCount,elimsLeft:elimCount,done:false,active:false};
    var cluster=findCluster(g);
    if(type==='dangerZone'){
      ev.w=100+Math.random()*130;ev.h=85+Math.random()*100;
      // Center on cluster with some randomness
      ev.x=Math.max(10,Math.min(AW-ev.w-10,cluster.x-ev.w/2+(Math.random()-0.5)*60));
      ev.y=Math.max(10,Math.min(AH-ev.h-10,cluster.y-ev.h/2+(Math.random()-0.5)*40));
      ev.maxLife=180;
      later(function(){ev.active=true;},700);
      later(function(){ev.active=false;ev.done=true;forceRemElim(g,ev);g.events=g.events.filter(function(e){return e!==ev;});},2600);
    }else if(type==='shockwave'){
      // Center shockwave near cluster
      ev.cx=cluster.x+(Math.random()-0.5)*80;ev.cy=cluster.y+(Math.random()-0.5)*60;
      ev.cx=Math.max(40,Math.min(AW-40,ev.cx));ev.cy=Math.max(40,Math.min(AH-40,ev.cy));
      ev.r=0;ev.maxR=Math.max(AW,AH)*0.75;ev.maxLife=100;
      ev.active=true;
      later(function(){ev.done=true;forceRemElim(g,ev);g.events=g.events.filter(function(e){return e!==ev;});},2000);
    }else if(type==='magnet'){
      // Place magnet near cluster
      ev.x=cluster.x+(Math.random()-0.5)*100;ev.y=cluster.y+(Math.random()-0.5)*80;
      ev.x=Math.max(30,Math.min(AW-30,ev.x));ev.y=Math.max(30,Math.min(AH-30,ev.y));
      ev.maxLife=180;ev.active=true;
      later(function(){ev.done=true;forceRemElim(g,ev);g.events=g.events.filter(function(e){return e!==ev;});},2600);
    }else if(type==='cut'){
      // Cut through the cluster
      ev.axis=Math.random()>0.5?'h':'v';
      ev.pos=ev.axis==='h'?Math.max(BR*3,Math.min(AH-BR*3,cluster.y+(Math.random()-0.5)*30)):Math.max(BR*3,Math.min(AW-BR*3,cluster.x+(Math.random()-0.5)*30));
      ev.progress=0;ev.prevProgress=0;ev.maxLife=75;ev.active=true;
      later(function(){ev.done=true;forceRemElim(g,ev);g.events=g.events.filter(function(e){return e!==ev;});},2200);
    }else if(type==='gravityFlip'){
      var dirs=[{x:0,y:-0.14},{x:0.14,y:0},{x:-0.14,y:0},{x:0,y:0.14}];
      var d=dirs[Math.floor(Math.random()*dirs.length)];
      ev.oldGrav={x:g.gravity.x,y:g.gravity.y};g.gravity.x=d.x;g.gravity.y=d.y;
      ev.maxLife=120;ev.active=false;
      later(function(){g.gravity.x=ev.oldGrav.x;g.gravity.y=ev.oldGrav.y;ev.done=true;forceRemElim(g,ev);},1800);
      later(function(){g.events=g.events.filter(function(e){return e!==ev;});},2200);
    }
    g.events.push(ev);
  }

  /* ── FORCE REMAINING ELIMINATIONS (pre-targeting + particle burst) ── */
  function forceRemElim(g,ev){
    if(ev.elimsLeft<=0)return;
    var alive=g.balls.filter(function(b){return b.alive&&!b.condemned;});
    if(alive.length<=1)return;
    var count=Math.min(ev.elimsLeft,alive.length-1);
    var sorted=alive.slice();
    if(ev.type==='dangerZone'){var zx=ev.x+ev.w/2;var zy=ev.y+ev.h/2;sorted.sort(function(a,b){return Math.sqrt((a.x-zx)*(a.x-zx)+(a.y-zy)*(a.y-zy))-Math.sqrt((b.x-zx)*(b.x-zx)+(b.y-zy)*(b.y-zy));});}
    else if(ev.type==='magnet'){sorted.sort(function(a,b){return Math.sqrt((a.x-ev.x)*(a.x-ev.x)+(a.y-ev.y)*(a.y-ev.y))-Math.sqrt((b.x-ev.x)*(b.x-ev.x)+(b.y-ev.y)*(b.y-ev.y));});}
    else{for(var i=sorted.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sorted[i];sorted[i]=sorted[j];sorted[j]=t;}}
    ev.elimsLeft=0;
    var targets=sorted.slice(0,count);
    // Phase 1: mark targets with pre-targeting warning (680ms)
    targets.forEach(function(ball){
      ball.targeting=1;ball.targetCause=ev.type;ball.condemned=true;
      // Push ball toward event center for visual drama
      var cx=ev.cx!=null?ev.cx:(ev.x!=null?ev.x+ev.w/2:AW/2);
      var cy=ev.cy!=null?ev.cy:(ev.y!=null?ev.y+ev.h/2:AH/2);
      var dx=cx-ball.x;var dy=cy-ball.y;var dl=Math.sqrt(dx*dx+dy*dy)||1;
      ball.vx+=dx/dl*4.5;ball.vy+=dy/dl*4.5;
    });
    // Phase 2: 680ms later — explode targets
    later(function(){
      if(g.done)return;
      var killed=[];
      targets.forEach(function(ball){
        if(!ball.alive)return;
        ball.alive=false;ball.elimT=0;ball.elimFlash=1;ball.elimCause=ev.type;
        ball.targeting=0;ball.condemned=false;
        spawnParticles(g,ball.x,ball.y,ball.color,50,ev.type);
        spawnFloater(g,ball.x,ball.y-BR-8,CAUSE_FLOATS[ev.type]||'💥 OUT!',CAUSE_COLORS[ev.type]||'#fff');
        g.elimList.push({name:ball.name,color:ball.color});
        playHit();
        killed.push(ball);
      });
      var aliveNow=g.balls.filter(function(b){return b.alive}).length;
      killed.forEach(function(ball,bi){addKill(ball.name,ev.type,aliveNow+killed.length-bi);});
      setEliminated(g.elimList.slice());
      setSurviving(aliveNow);
    },680);
  }

  /* ── CHECK WINNER ── */
  function checkWinner(g){
    if(g.done)return;
    var alive=g.balls.filter(function(b){return b.alive});
    if(alive.length===1){
      g.done=true;
      var w=alive[0].name;
      setWinner(w);setPhase('winner');setShowConfetti(true);onResult(w);
      setStatusText('\u{1F3C6} '+w+' \u00DCBERLEBT!');stopAH(audioRef.current);audioRef.current=null;
    }else if(alive.length>1){
      setStatusText('\u{1F631} Noch '+alive.length+' \u00FCbrig...');
      later(function(){
        if(g.done)return;
        var al=g.balls.filter(function(b){return b.alive});
        if(al.length>1){
          var v=al[Math.floor(Math.random()*(al.length-1))];
          v.alive=false;v.elimT=0;v.elimFlash=1;v.elimCause='cut';
          playHit();
          spawnParticles(g,v.x,v.y,v.color,50,'cut');
          spawnFloater(g,v.x,v.y-BR-8,'✂️ FINISHER!','#facc15');
          g.elimList.push({name:v.name,color:v.color});
          addKill(v.name,'cut',al.length-1);
          setEliminated(g.elimList.slice());
          setSurviving(g.balls.filter(function(b){return b.alive}).length);
        }
        later(function(){checkWinner(g);},800);
      },800);
    }
  }

  /* ── PHYSICS ── */
  function physicsStep(g,dt){
    var balls=g.balls;
    // Update cut prevProgress before advancing
    for(var ep=0;ep<g.events.length;ep++){if(g.events[ep].type==='cut')g.events[ep].prevProgress=g.events[ep].progress;}
    // Advance event life
    for(var ei=0;ei<g.events.length;ei++){
      var ev=g.events[ei];ev.life+=dt;
      if(ev.type==='shockwave')ev.r=ev.maxR*(ev.life/ev.maxLife);
      if(ev.type==='cut')ev.progress=Math.min(1,ev.life/ev.maxLife);
    }
    // Ball updates
    for(var i=0;i<balls.length;i++){
      var b=balls[i];
      if(!b.alive){b.elimT=Math.min(1,b.elimT+0.04*dt);if(b.elimFlash>0)b.elimFlash=Math.max(0,b.elimFlash-0.055*dt);continue;}
      b.vx+=g.gravity.x*dt;b.vy+=g.gravity.y*dt;
      for(var ei2=0;ei2<g.events.length;ei2++){
        var ev2=g.events[ei2];
        if(ev2.type==='magnet'){
          var dx=ev2.x-b.x;var dy=ev2.y-b.y;
          var dist=Math.sqrt(dx*dx+dy*dy);
          if(dist>3){var f=Math.min(1.5,120/(dist*dist))*dt;b.vx+=dx/dist*f;b.vy+=dy/dist*f;}
        }else if(ev2.type==='shockwave'){
          var dx2=b.x-ev2.cx;var dy2=b.y-ev2.cy;
          var dist2=Math.sqrt(dx2*dx2+dy2*dy2);
          if(dist2>0&&Math.abs(dist2-ev2.r)<50){
            var pf=Math.max(0,1-Math.abs(dist2-ev2.r)/50)*5*dt;
            b.vx+=dx2/dist2*pf;b.vy+=dy2/dist2*pf;
          }
        }
      }
      // Damping + tiny random drift
      b.vx*=Math.pow(0.990,dt);b.vy*=Math.pow(0.990,dt);
      b.vx+=(Math.random()-0.5)*0.06*dt;b.vy+=(Math.random()-0.5)*0.06*dt;
      var spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      if(spd<0.3){var ra=Math.random()*Math.PI*2;b.vx+=Math.cos(ra)*0.5;b.vy+=Math.sin(ra)*0.5;} // keep moving
      if(spd>6){b.vx=b.vx/spd*6;b.vy=b.vy/spd*6;}
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      // Elastic wall bounce
      if(b.x-BR<0){b.x=BR;b.vx=Math.abs(b.vx)*0.8;}
      if(b.x+BR>AW){b.x=AW-BR;b.vx=-Math.abs(b.vx)*0.8;}
      if(b.y-BR<0){b.y=BR;b.vy=Math.abs(b.vy)*0.8;}
      if(b.y+BR>AH){b.y=AH-BR;b.vy=-Math.abs(b.vy)*0.8;}
      if(b.fakeDanger>0)b.fakeDanger=Math.max(0,b.fakeDanger-0.022*dt);
    }
    // Ball-ball collision
    for(var i2=0;i2<balls.length-1;i2++){
      for(var jj=i2+1;jj<balls.length;jj++){
        var ba=balls[i2];var bb=balls[jj];
        if(!ba.alive||!bb.alive)continue;
        var dx3=bb.x-ba.x;var dy3=bb.y-ba.y;
        var dist3=Math.sqrt(dx3*dx3+dy3*dy3);var minD=BR*2;
        if(dist3<minD&&dist3>0.01){
          var nx=dx3/dist3;var ny=dy3/dist3;var ov=(minD-dist3)/2;
          ba.x-=nx*ov;ba.y-=ny*ov;bb.x+=nx*ov;bb.y+=ny*ov;
          var rv=ba.vx-bb.vx;var rvy=ba.vy-bb.vy;var dot=rv*nx+rvy*ny;
          if(dot>0){ba.vx-=dot*nx*0.5;ba.vy-=dot*ny*0.5;bb.vx+=dot*nx*0.5;bb.vy+=dot*ny*0.5;}
        }
      }
    }
    // ── Event-based elimination detection ──
    var newElims=[];
    for(var bi3=0;bi3<balls.length;bi3++){
      var bchk=balls[bi3];
      if(!bchk.alive)continue;
      for(var ei3=0;ei3<g.events.length;ei3++){
        var evchk=g.events[ei3];
        if(!evchk.active||evchk.elimsLeft<=0||evchk.done)continue;
        var hit=false;
        if(evchk.type==='dangerZone'){
          hit=(bchk.x>=evchk.x&&bchk.x<=evchk.x+evchk.w&&bchk.y>=evchk.y&&bchk.y<=evchk.y+evchk.h);
        }else if(evchk.type==='cut'){
          var lineNow=(evchk.axis==='h')?evchk.progress*AH:evchk.progress*AW;
          var linePrev=(evchk.axis==='h')?evchk.prevProgress*AH:evchk.prevProgress*AW;
          var ballPos=(evchk.axis==='h')?bchk.y:bchk.x;
          hit=(ballPos>=Math.min(linePrev,lineNow)-BR&&ballPos<=Math.max(linePrev,lineNow)+BR);
        }else if(evchk.type==='magnet'){
          var dMag=Math.sqrt((bchk.x-evchk.x)*(bchk.x-evchk.x)+(bchk.y-evchk.y)*(bchk.y-evchk.y));
          hit=(dMag<BR*2);
        }else if(evchk.type==='shockwave'){
          var dWave=Math.sqrt((bchk.x-evchk.cx)*(bchk.x-evchk.cx)+(bchk.y-evchk.cy)*(bchk.y-evchk.cy));
          hit=(Math.abs(dWave-evchk.r)<BR*2.2&&!bchk.shockHit);
          if(hit)bchk.shockHit=true;
        }
        if(hit){
          bchk.alive=false;bchk.elimT=0;bchk.elimFlash=1;bchk.elimCause=evchk.type;
          evchk.elimsLeft--;
          newElims.push(bchk);
          break;
        }
      }
    }
    if(newElims.length>0){
      var aliveAfter=g.balls.filter(function(b){return b.alive}).length;
      newElims.forEach(function(b,bi){
        g.elimList.push({name:b.name,color:b.color});
        playHit();
        addKill(b.name,b.elimCause,aliveAfter+newElims.length-bi);
        spawnParticles(g,b.x,b.y,b.color,45,b.elimCause);
        spawnFloater(g,b.x,b.y-BR-8,CAUSE_FLOATS[b.elimCause]||'💥 OUT!',CAUSE_COLORS[b.elimCause]||'#fff');
      });
      setEliminated(g.elimList.slice());
      setSurviving(aliveAfter);
    }
    // Tick particles
    for(var pxi=g.particles.length-1;pxi>=0;pxi--){
      var pt=g.particles[pxi];
      if(!pt.isRing){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=0.12*dt;pt.vx*=Math.pow(0.93,dt);}
      else{pt.r=BR+(1-pt.life)*(pt.maxR-BR);}
      pt.life-=pt.decay*dt;
      if(pt.life<=0)g.particles.splice(pxi,1);
    }
    // Tick floaters
    for(var fxi=g.floaters.length-1;fxi>=0;fxi--){
      var fl=g.floaters[fxi];fl.y+=fl.vy*dt;fl.life-=fl.decay*dt;
      if(fl.life<=0)g.floaters.splice(fxi,1);
    }
    // Tick targeting
    for(var txi=0;txi<g.balls.length;txi++){var tb=g.balls[txi];if(tb.targeting>0)tb.targeting=Math.max(0,tb.targeting-0.015*dt);}
  }

  /* ── DRAW ── */
  function drawFrame(){
    var canvas=canvasRef.current;if(!canvas)return;
    var g=gRef.current;if(!g)return;
    var ctx=canvas.getContext('2d');
    // 2× resolution for crisp rendering
    ctx.setTransform(2,0,0,2,0,0);
    ctx.fillStyle='#080810';ctx.fillRect(0,0,AW,AH);
    ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=1;
    for(var gx=0;gx<AW;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,AH);ctx.stroke();}
    for(var gy=0;gy<AH;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(AW,gy);ctx.stroke();}

    for(var ei=0;ei<g.events.length;ei++){
      var ev=g.events[ei];
      if(ev.type==='dangerZone'){
        var pulse=0.5+0.5*Math.sin(ev.life*0.25);
        ctx.fillStyle='rgba(239,68,68,'+(0.12*pulse)+')';ctx.fillRect(ev.x,ev.y,ev.w,ev.h);
        ctx.strokeStyle='rgba(239,68,68,'+pulse+')';ctx.lineWidth=2+pulse;ctx.strokeRect(ev.x,ev.y,ev.w,ev.h);
        ctx.fillStyle='rgba(239,68,68,'+(0.65*pulse)+')';ctx.font='bold 10px Inter,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u26A0 DANGER',ev.x+ev.w/2,ev.y+ev.h/2);
      }else if(ev.type==='shockwave'){
        var swA=Math.max(0,1-ev.r/ev.maxR);
        ctx.beginPath();ctx.arc(ev.cx,ev.cy,Math.max(1,ev.r),0,Math.PI*2);
        ctx.strokeStyle='rgba(251,191,36,'+(swA*0.9)+')';ctx.lineWidth=3+swA*6;ctx.stroke();
        if(ev.r>15){ctx.beginPath();ctx.arc(ev.cx,ev.cy,Math.max(1,ev.r*0.65),0,Math.PI*2);ctx.strokeStyle='rgba(251,191,36,'+(swA*0.3)+')';ctx.lineWidth=1;ctx.stroke();}
      }else if(ev.type==='magnet'){
        var mp=1+0.15*Math.sin(ev.life*0.25);
        ctx.beginPath();ctx.arc(ev.x,ev.y,18*mp,0,Math.PI*2);
        ctx.fillStyle='rgba(139,92,246,0.22)';ctx.fill();
        ctx.strokeStyle='rgba(139,92,246,0.85)';ctx.lineWidth=2;ctx.stroke();
        for(var ai=0;ai<12;ai++){
          var ang=ai*Math.PI/6+ev.life*0.02;var fLen=35+10*mp;
          ctx.beginPath();ctx.moveTo(ev.x+Math.cos(ang)*20*mp,ev.y+Math.sin(ang)*20*mp);
          ctx.lineTo(ev.x+Math.cos(ang)*fLen,ev.y+Math.sin(ang)*fLen);
          ctx.strokeStyle='rgba(139,92,246,0.18)';ctx.lineWidth=1;ctx.stroke();
        }
        ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u{1F9F2}',ev.x,ev.y);
      }else if(ev.type==='cut'){
        ctx.fillStyle='#facc15';
        if(ev.axis==='h'){
          ctx.fillRect(0,ev.pos-2,ev.progress*AW,4);
          if(ev.progress<0.99){ctx.fillStyle='white';ctx.fillRect(ev.progress*AW-10,ev.pos-8,20,16);}
        }else{
          ctx.fillRect(ev.pos-2,0,4,ev.progress*AH);
          if(ev.progress<0.99){ctx.fillStyle='white';ctx.fillRect(ev.pos-8,ev.progress*AH-10,16,20);}
        }
        ctx.fillStyle='rgba(250,204,21,0.9)';ctx.font='bold 12px Inter,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='top';
        ctx.fillText('\u2702 CUT',ev.axis==='h'?AW*0.5:ev.pos+18,ev.axis==='h'?ev.pos-22:8);
      }else if(ev.type==='gravityFlip'){
        var ga=Math.min(0.55,ev.life/40)*0.6;
        var gAng=Math.atan2(g.gravity.y,g.gravity.x);
        for(var gxi=0;gxi<5;gxi++){for(var gyi=0;gyi<4;gyi++){
          var arx=AW/6*(gxi+1);var ary=AH/5*(gyi+1);
          ctx.save();ctx.translate(arx,ary);ctx.rotate(gAng);
          ctx.strokeStyle='rgba(99,102,241,'+ga+')';ctx.lineWidth=1.5;
          ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(7,0);ctx.lineTo(4,-3);ctx.moveTo(7,0);ctx.lineTo(4,3);
          ctx.stroke();ctx.restore();
        }}
        ctx.fillStyle='rgba(99,102,241,0.75)';ctx.font='bold 11px Inter,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('\u{1F300} GRAVITY FLIP',AW/2,6);
      }
    }

    // Particles
    for(var pdi=0;pdi<g.particles.length;pdi++){
      var pt=g.particles[pdi];
      ctx.save();ctx.globalAlpha=Math.max(0,pt.life);
      if(pt.isRing){
        ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(1,pt.r),0,Math.PI*2);
        ctx.strokeStyle=pt.color;ctx.lineWidth=3*pt.life;ctx.globalAlpha=pt.life*0.8;ctx.stroke();
      }else{
        ctx.shadowColor=pt.color;ctx.shadowBlur=pt.isDebris?6:3;
        ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(0.5,pt.r*pt.life+0.5),0,Math.PI*2);
        ctx.fillStyle=pt.color;ctx.fill();
      }
      ctx.restore();
    }
    ctx.shadowBlur=0;

    // Targeting rings (pre-elimination warning)
    for(var tdi=0;tdi<g.balls.length;tdi++){
      var tb=g.balls[tdi];if(!tb.alive||tb.targeting<=0)continue;
      var tc=CAUSE_COLORS[tb.targetCause]||'#ef4444';
      var pulse=0.5+0.5*Math.sin(Date.now()*0.018);
      ctx.save();
      ctx.strokeStyle=tc;ctx.lineWidth=2+pulse*2;ctx.globalAlpha=0.4+tb.targeting*0.6;
      ctx.shadowColor=tc;ctx.shadowBlur=16;
      ctx.beginPath();ctx.arc(tb.x,tb.y,BR*1.8+pulse*4,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(tb.x,tb.y,BR*2.6+pulse*3,0,Math.PI*2);ctx.lineWidth=1;ctx.globalAlpha=0.2+tb.targeting*0.4;ctx.stroke();
      // Crosshair lines
      ctx.globalAlpha=tb.targeting*0.9;ctx.lineWidth=1.5;
      var chl=BR*3.5;
      ctx.beginPath();ctx.moveTo(tb.x-chl,tb.y);ctx.lineTo(tb.x-BR*1.2,tb.y);ctx.moveTo(tb.x+BR*1.2,tb.y);ctx.lineTo(tb.x+chl,tb.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tb.x,tb.y-chl);ctx.lineTo(tb.x,tb.y-BR*1.2);ctx.moveTo(tb.x,tb.y+BR*1.2);ctx.lineTo(tb.x,tb.y+chl);ctx.stroke();
      ctx.restore();
    }
    ctx.shadowBlur=0;

    // Balls
    for(var pass=0;pass<2;pass++){
      for(var bi=0;bi<g.balls.length;bi++){
        var ball=g.balls[bi];var isAlive=ball.alive;
        if(pass===0&&isAlive)continue;if(pass===1&&!isAlive)continue;
        var alpha=isAlive?1:Math.max(0,1-ball.elimT);
        var scale=isAlive?1:(1+ball.elimT*0.6);
        ctx.save();ctx.globalAlpha=alpha;ctx.translate(ball.x,ball.y);ctx.scale(scale,scale);
        if(ball.fakeDanger>0){ctx.shadowColor='rgba(239,68,68,'+ball.fakeDanger+')';ctx.shadowBlur=22*ball.fakeDanger;}
        var bgrad=ctx.createRadialGradient(-BR*0.3,-BR*0.3,0,0,0,BR);
        var col=ball.fakeDanger>0.5?'#ef4444':ball.color;
        bgrad.addColorStop(0,col+'ff');bgrad.addColorStop(0.65,col+'cc');bgrad.addColorStop(1,col+'77');
        ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fillStyle=bgrad;ctx.fill();
        if(ball.fakeDanger>0){ctx.strokeStyle='rgba(239,68,68,'+ball.fakeDanger+')';ctx.lineWidth=3*ball.fakeDanger;ctx.stroke();}
        ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(-BR*0.28,-BR*0.28,BR*0.28,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();
        // Crisp text: stroke outline first, then fill
        var nameStr=ball.name.length>7?ball.name.slice(0,6)+'..':ball.name;
        ctx.font='bold '+FS+'px Inter,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.strokeStyle='rgba(0,0,0,0.95)';ctx.lineWidth=3;ctx.lineJoin='round';
        ctx.strokeText(nameStr,0,0);
        ctx.fillStyle='#fff';ctx.fillText(nameStr,0,0);
        if(!isAlive){
          ctx.strokeStyle='rgba(255,60,60,0.55)';ctx.lineWidth=2;ctx.lineJoin='miter';
          ctx.beginPath();ctx.moveTo(-BR*0.5,-BR*0.5);ctx.lineTo(BR*0.5,BR*0.5);ctx.stroke();
          ctx.beginPath();ctx.moveTo(BR*0.5,-BR*0.5);ctx.lineTo(-BR*0.5,BR*0.5);ctx.stroke();
          // Burst rings on fresh elimination
          if(ball.elimFlash>0){
            var burstR=BR*(1.5+(1-ball.elimFlash)*3.5);
            var causeColors={dangerZone:'239,68,68',shockwave:'251,191,36',magnet:'168,85,247',cut:'250,204,21',gravityFlip:'99,102,241'};
            var bc=causeColors[ball.elimCause]||'255,255,255';
            // 3 expanding rings
            for(var ri=0;ri<3;ri++){
              var rr=burstR*(0.4+ri*0.35);var ra=ball.elimFlash*Math.max(0,1-ri*0.28);
              ctx.beginPath();ctx.arc(0,0,rr,0,Math.PI*2);
              ctx.strokeStyle='rgba('+bc+','+ra+')';ctx.lineWidth=(3-ri)*ball.elimFlash;ctx.stroke();
            }
            ctx.globalAlpha=alpha;
          }
        }
        ctx.restore();
      }
    }
    ctx.globalAlpha=1;
    var aliveN=g.balls.filter(function(b){return b.alive}).length;
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='10px Inter,sans-serif';
    ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText(aliveN+' \u00FCbrig',AW-8,AH-6);

    // Floaters (cause labels rising from dead balls)
    for(var fdi=0;fdi<g.floaters.length;fdi++){
      var fl=g.floaters[fdi];
      ctx.save();ctx.globalAlpha=Math.max(0,fl.life);
      ctx.font='bold 15px Inter,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor=fl.color;ctx.shadowBlur=14;
      ctx.strokeStyle='rgba(0,0,0,0.95)';ctx.lineWidth=3.5;ctx.lineJoin='round';
      ctx.strokeText(fl.text,fl.x,fl.y);
      ctx.fillStyle=fl.color;ctx.fillText(fl.text,fl.x,fl.y);
      ctx.restore();
    }
    ctx.shadowBlur=0;
  }

  /* ── RESET ── */
  function resetChaos(){
    doCleanup();setPhase('idle');setWinner(null);setEliminated([]);setShowConfetti(false);
    setSurviving(0);setStatusText('Bereit f\u00FCr das Chaos!');setKillFeed([]);
    if(canvasRef.current){var c=canvasRef.current.getContext('2d');c.clearRect(0,0,AW,AH);}
  }

  return(
    html`<div className="flex flex-col items-center w-full max-w-3xl">
      ${showConfetti&&html`<${Confetti}/>`}
      ${eventBanner&&html`<div key=${eventBanner.id} className="event-banner" style=${{background:'rgba(10,10,20,0.85)',border:'2px solid '+eventBanner.color,color:eventBanner.color}}>${eventBanner.text}</div>`}
      ${shockRings.map(function(r){return html`<div key=${r.id} className="shockwave-ring" style=${{left:r.x+'%',top:r.y+'%',transform:'translate(-50%,-50%)'}}/>`;})}
      <div className="text-center mb-3">
        <p role="status" aria-live="polite" className="text-gray-800 text-base font-semibold mb-1">${statusText}</p>
        ${phase==='running'&&html`<p className="text-gray-500 text-xs">${surviving} Teilnehmer \u00FCbrig</p>`}
      </div>
      <div className=${"relative w-full mb-4 rounded-2xl overflow-hidden border border-gray-800/60 shadow-xl shadow-red-950/20"+(arenaShake?' grid-shake':'')}>
        <canvas ref=${canvasRef} width=${AW*2} height=${AH*2} style=${{display:'block',width:'100%',height:'auto'}} role="img" aria-label="Spielanimation"/>
        ${phase==='idle'&&html`<div className="absolute inset-0 flex items-center justify-center bg-gray-950/85 rounded-2xl"><div className="text-center"><div className="text-5xl mb-3">\u{1F4A5}</div><p className="text-white/50 text-sm">Chaos Arena wartet...</p></div></div>`}
        ${killFeed.length>0&&phase==='running'&&html`<div className="absolute top-2 left-2 z-20 pointer-events-none" style=${{maxWidth:'55%'}}>
          ${killFeed.map(function(kf,ki){return html`<div key=${kf.time+'_'+ki} className="text-xs font-bold mb-0.5 px-2 py-0.5 rounded bg-black/70 text-white/90 fade-in" style=${{textShadow:'0 1px 3px rgba(0,0,0,0.8)',fontSize:10}}>${kf.text}</div>`;})}
        </div>`}
      </div>
      ${eliminated.length>0&&html`<div className="w-full max-w-sm mb-4">
        <p className="text-gray-500 text-center mb-1.5" style=${{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em'}}>Eliminiert</p>
        <div className="flex flex-wrap gap-1.5 justify-center bg-gray-50 rounded-xl p-2.5 border border-gray-200">
          ${eliminated.map(function(e,i){return html`<div key=${i} className="tray-ball tray-pop" style=${{background:'radial-gradient(circle at 35% 30%,'+e.color+'88,'+e.color+'55)',animationDelay:(i*0.04)+'s'}}>${truncName(e.name,5)}</div>`;})}
        </div>
      </div>`}
      ${winner&&html`<div className="winner-enter mb-5">
        <div className=${"winner-card bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(winner)]+" rounded-2xl px-10 py-6 text-white text-center shadow-2xl border-2 border-amber-400/40"}>
          <div className="text-amber-200 text-sm font-semibold tracking-widest uppercase mb-1">\u00DCberlebender</div>
          <div className="text-4xl font-black tracking-tight">${winner}</div>
          <div className="mt-2 text-2xl">\u{1F3C6}\u{1F525}\u{1F3C6}</div>
          <${CopyButton} modeName="Chaos Arena" winner=${winner}/>
        </div>
      </div>`}
      <div className="flex gap-3 mt-2">
        ${phase==='idle'&&html`<button onClick=${startChaos} className="px-8 py-3 rounded-xl font-bold bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white shadow-lg shadow-red-500/20 transition-all">\u2620 Chaos starten</button>`}
        ${phase==='running'&&html`<button onClick=${function(){resetChaos();onDone();}} className="px-5 py-2 rounded-xl font-semibold bg-gray-100 text-gray-500 border border-gray-200 hover:bg-gray-200 transition-all text-sm">\u2715 Abbrechen</button>`}
        ${phase==='winner'&&html`<span>
          <button onClick=${resetChaos} className="px-6 py-3 rounded-xl font-semibold bg-red-50 text-red-700 border border-red-200 hover:bg-red-100 transition-all mr-3">Nochmal</button>
          <button onClick=${onDone} className="px-6 py-3 rounded-xl font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-200 transition-all">Zur\u00FCck</button>
        </span>`}
      </div>
    </div>`
  );
}


/* ═══════════════════════════════════════════════════════
   LABYRINTH GROUP MODE (Wooden Marble Maze)
   ═══════════════════════════════════════════════════════ */
function MarbleMazeMode(props){
  var names=props.names;var onDone=props.onDone;var onResult=props.onResult||function(){};
  var _ph=useState('pick');var phase=_ph[0];var setPhase=_ph[1];
  var _gr=useState([]);var groups=_gr[0];var setGroups=_gr[1];
  var _cf=useState(false);var showConfetti=_cf[0];var setShowConfetti=_cf[1];
  var _dr=useState(0);var dropped=_dr[0];var setDropped=_dr[1];
  var _ld=useState(0);var landed=_ld[0];var setLanded=_ld[1];
  var _tlt=useState(false);var isTilting=_tlt[0];var setIsTilting=_tlt[1];
  var canvasRef=useRef(null);
  var bgCanvasRef=useRef(null);
  var rafRef=useRef(null);
  var gRef=useRef(null);
  var timers=useRef([]);
  var audioRef=useRef(null);
  var mouseRef=useRef({x:0.5,y:0.5});
  var lastBounceRef=useRef({t:0,count:0});

  var AW=700;var AH=700;
  var FRAME=35;
  var FIELD_L=FRAME;var FIELD_R=AW-FRAME;var FIELD_T=FRAME;var FIELD_B=AH-FRAME;
  var HOLE_R=20;
  var TRAMP_L=FIELD_L+10;var TRAMP_R=FIELD_R-10;
  var TRAMP_TOP=FIELD_B-26;var TRAMP_BOTTOM=FIELD_B-4;
  var _ng=useState(4);var NUM_GROUPS=_ng[0];var setNumGroups=_ng[1];
  var GROUP_COLORS=['#C0392B','#2980B9','#27AE60','#F39C12','#8E44AD','#16A085'];

  /* ── BUILD MAZE ── */
  function buildMaze(ng){
    var S=1.25;
    // Pre-scale field: 28..532 (×1.25 → 35..665 canvas)
    var fl=28,fr=532;
    var laneW=(fr-fl)/ng; // e.g. 126 for 4 groups
    var lcx=[]; // pre-scale lane centres
    for(var i=0;i<ng;i++) lcx.push(fl+laneW*(i+0.5));
    // Gap at each lane centre — must be wider than ball diameter (BR≈11.2 pre-scale)
    var gapHW=Math.max(14,laneW*0.20); // gap = 2×gapHW, always passable

    // WALLS — 6 rows, beams between lane-centre gaps on every row.
    // Every lane centre has a clear vertical channel down the whole maze.
    var rawWalls=[];
    [80,148,218,290,360,428].forEach(function(wy){
      var cur=fl+2;
      lcx.forEach(function(cx){
        var end=cx-gapHW;
        if(end-cur>12) rawWalls.push({x:cur,y:wy,w:end-cur,h:8});
        cur=cx+gapHW;
      });
      if(fr-2-cur>12) rawWalls.push({x:cur,y:wy,w:fr-2-cur,h:8});
    });
    var walls=rawWalls.map(function(w){
      return{x:Math.round(w.x*S),y:Math.round(w.y*S),w:Math.round(w.w*S),h:Math.round(w.h*S),
        tilt:(Math.random()>0.5?1:-1)*(0.05+Math.random()*0.06),
        wobPhase:Math.random()*Math.PI*2,wobFreq:0.10+Math.random()*0.09,wobAmp:3.5+Math.random()*3.5,
        ox:0,oy:0,oTilt:0};
    });

    // HOLES — 2 per group, at their lane centre, well below the row-gap above them.
    // y=330: 40px below wall row 290 → clear; y=470: 42px below wall row 428 → clear.
    var holes=[];
    [330,470].forEach(function(hy){
      for(var g=0;g<ng;g++){
        holes.push({x:Math.round(lcx[g]*S),y:Math.round(hy*S),num:g+1,nearT:0});
      }
    });

    // PINS — staggered rows between wall rows; lane-boundary pegs deflect balls
    // sideways (random-looking paths) without ever blocking the channel.
    var pins=[];
    [112,182,252,322,392,462,532].forEach(function(py,ri){
      // Lane-boundary pegs
      for(var i=0;i<=ng;i++){
        var px=fl+laneW*i;
        if(px>fl+6&&px<fr-6)
          pins.push({x:Math.round(px*S),y:Math.round(py*S),r:Math.round(6*S),hitT:0});
      }
      // Mid-lane pegs on alternating rows (skip rows near hole y-values)
      if(ri%2===0){
        var nearHole=Math.abs(py-330)<20||Math.abs(py-470)<20;
        if(!nearHole){
          lcx.forEach(function(cx){
            pins.push({x:Math.round(cx*S),y:Math.round(py*S),r:Math.round(5*S),hitT:0});
          });
        }
      }
    });
    var seen={};
    pins=pins.filter(function(p){var k=p.x+'|'+p.y;return seen[k]?false:(seen[k]=true);});

    return{walls:walls,holes:holes,pins:pins};
  }

  /* ── BALL-RECT COLLISION ── */
  function ballRect(bx,by,br,rx,ry,rw,rh){
    var cx=Math.max(rx,Math.min(bx,rx+rw));
    var cy=Math.max(ry,Math.min(by,ry+rh));
    var dx=bx-cx;var dy=by-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<br&&dist>0.01){return{nx:dx/dist,ny:dy/dist,overlap:br-dist};}
    return null;
  }

  /* ── CACHE STATIC BACKGROUND ── */
  function cacheBg(maze){
    var off=document.createElement('canvas');off.width=AW*2;off.height=AH*2;
    var c=off.getContext('2d');c.setTransform(2,0,0,2,0,0);

    // Outer frame (golden wood)
    var fg=c.createLinearGradient(0,0,AW,AH);
    fg.addColorStop(0,'#BFA04B');fg.addColorStop(0.3,'#A08530');fg.addColorStop(0.6,'#C4A84E');fg.addColorStop(1,'#8B6914');
    c.fillStyle=fg;c.fillRect(0,0,AW,AH);
    // Frame inner bevel
    c.fillStyle='#705E1A';c.fillRect(6,6,AW-12,AH-12);
    c.fillStyle='#9B7E2A';c.fillRect(10,10,AW-20,AH-20);
    c.fillStyle='#BFA04B';c.fillRect(14,14,AW-28,AH-28);
    c.fillStyle='#8B6914';c.fillRect(18,18,AW-36,AH-36);

    // Playing field (light wood surface)
    var wg=c.createLinearGradient(FRAME,FRAME,FRAME,FIELD_B);
    wg.addColorStop(0,'#E8C88A');wg.addColorStop(0.2,'#DEB887');wg.addColorStop(0.5,'#D4A574');
    wg.addColorStop(0.7,'#DEB887');wg.addColorStop(1,'#CCa06A');
    c.fillStyle=wg;c.fillRect(FRAME,FRAME,FIELD_R-FIELD_L,FIELD_B-FIELD_T);

    // Wood grain
    c.save();c.globalAlpha=0.04;c.strokeStyle='#8B5A2B';c.lineWidth=1;
    for(var gy=FRAME;gy<FIELD_B;gy+=5){
      c.beginPath();c.moveTo(FRAME,gy);
      for(var gx=FRAME;gx<FIELD_R;gx+=15){c.lineTo(gx+8,gy+Math.sin(gx*0.04+gy*0.02)*2.5);}
      c.stroke();
    }
    c.restore();

    // Entry gap at top center
    c.fillStyle=wg;c.fillRect(AW/2-28,6,56,FRAME-4);
    c.fillStyle='#705E1A';c.font='bold 13px Inter,sans-serif';c.textAlign='center';
    c.fillText('\u25BC',AW/2,22);

    // Walls are drawn dynamically per-frame (wobble) — see drawMaze

    // Draw holes
    maze.holes.forEach(function(h){
      c.beginPath();c.arc(h.x+1,h.y+1,HOLE_R+2,0,Math.PI*2);
      c.fillStyle='rgba(0,0,0,0.25)';c.fill();
      var hg=c.createRadialGradient(h.x,h.y,2,h.x,h.y,HOLE_R);
      hg.addColorStop(0,'#050505');hg.addColorStop(0.6,'#151515');hg.addColorStop(1,'#2A2015');
      c.beginPath();c.arc(h.x,h.y,HOLE_R,0,Math.PI*2);c.fillStyle=hg;c.fill();
      c.strokeStyle='#3D2B1F';c.lineWidth=1.5;c.stroke();
      // Hole inner ring
      c.beginPath();c.arc(h.x,h.y,HOLE_R-2,0,Math.PI*2);
      c.strokeStyle='rgba(0,0,0,0.3)';c.lineWidth=0.5;c.stroke();
      // Number label
      c.font='bold 14px Inter,sans-serif';c.textAlign='left';c.textBaseline='top';
      c.fillStyle=GROUP_COLORS[h.num-1];
      c.strokeStyle='rgba(0,0,0,0.3)';c.lineWidth=2.5;c.lineJoin='round';
      c.strokeText(h.num,h.x+HOLE_R+4,h.y-HOLE_R-3);
      c.fillText(h.num,h.x+HOLE_R+4,h.y-HOLE_R-3);
    });

    // Draw pins (metallic pegs)
    maze.pins.forEach(function(p){
      c.beginPath();c.arc(p.x+1,p.y+1,p.r+1,0,Math.PI*2);
      c.fillStyle='rgba(0,0,0,0.18)';c.fill();
      var pg=c.createRadialGradient(p.x-1.5,p.y-1.5,0.5,p.x,p.y,p.r);
      pg.addColorStop(0,'#C8C8C8');pg.addColorStop(0.4,'#909090');pg.addColorStop(1,'#505050');
      c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fillStyle=pg;c.fill();
      c.beginPath();c.arc(p.x-1.2,p.y-1.2,1.2,0,Math.PI*2);
      c.fillStyle='rgba(255,255,255,0.35)';c.fill();
    });

    // Inner frame shadow
    c.strokeStyle='rgba(0,0,0,0.18)';c.lineWidth=2;
    c.strokeRect(FRAME+1,FRAME+1,FIELD_R-FIELD_L-2,FIELD_B-FIELD_T-2);

    bgCanvasRef.current=off;
  }

  /* ── ASSIGN GROUPS (round-robin shuffle → guaranteed equal sizes) ── */
  function assignGroups(ng){
    var sh=shuffle(names.slice());
    // Round-robin: name[0]→group1, name[1]→group2, …, name[ng]→group1, …
    return sh.map(function(name,i){return{name:name,targetGroup:(i%ng)+1};});
  }

  /* ── SPAWN X PER GROUP (each group gets its own lane of the field) ── */
  function spawnXForGroup(groupNum,ng){
    // Each group spawns in its own lane centre ±small jitter.
    // Jitter kept ≤ gapHW so the ball reliably passes through the first wall gap.
    var fieldW=FIELD_R-FIELD_L;
    var laneW=fieldW/ng;
    var laneCenter=FIELD_L+laneW*(groupNum-1)+laneW*0.5;
    var maxJitter=Math.min(10, laneW*0.08); // never wider than 8% of lane
    return laneCenter+(Math.random()-0.5)*2*maxJitter;
  }

  /* ── START ── */
  function startPlinko(){
    var ng=NUM_GROUPS;
    doCleanup();
    var maze=buildMaze(ng);
    cacheBg(maze,ng);

    var assignments=assignGroups(ng);
    var balls=assignments.map(function(a,bidx){
      return{id:bidx,name:a.name,targetGroup:a.targetGroup,
        color:BALL_COLORS[bidx%BALL_COLORS.length],
        x:AW/2,y:FRAME+6,vx:0,vy:0,active:false,done:false,
        fallingIn:false,fallTimer:0,fallHole:null,trail:[],angle:0};
    });
    var dropOrder=shuffle(balls.slice());
    var ballR=names.length>30?12:14;

    var g={maze:maze,balls:balls,dropOrder:dropOrder,
      particles:[],dropIdx:0,dropTimer:0,done:false,
      ballR:ballR,startT:performance.now(),
      tiltX:0,tiltY:0,wobT:0,trampFlex:0,landedCount:0,numGroups:ng};
    gRef.current=g;

    setGroups(Array.from({length:ng},function(){return [];}));
    setPhase('tilting');setIsTilting(true);setDropped(0);setLanded(0);setShowConfetti(false);
    later(function(){setIsTilting(false);setPhase('running');startAudio();},800);

    var last=performance.now();
    function loop(now){
      var dt=Math.min((now-last)/16.67,3);last=now;
      g.tiltX=(mouseRef.current.x-0.5)*0.28;
      g.tiltY=(mouseRef.current.y-0.5)*0.12;
      updateMaze(g,dt);drawMaze(g);
      if(!g.done)rafRef.current=requestAnimationFrame(loop);
    }
    rafRef.current=requestAnimationFrame(loop);
  }

  /* ── PHYSICS ── */
  function updateMaze(g,dt){
    if(g.done)return;
    var BR=g.ballR;
    g.dropTimer+=dt;
    var interval=Math.max(2,Math.min(5,50/names.length));
    if(g.dropIdx<g.dropOrder.length&&g.dropTimer>=interval){
      g.dropTimer=0;
      var b=g.dropOrder[g.dropIdx];
      b.active=true;
      // Spawn in the lane of ball's target group + small jitter
      b.x=Math.max(FIELD_L+BR,Math.min(FIELD_R-BR,spawnXForGroup(b.targetGroup,g.numGroups)));
      b.y=FRAME+8;
      b.vx=(Math.random()-0.5)*0.8;b.vy=1.2+Math.random()*1.0;
      g.dropIdx++;
      setDropped(g.dropIdx);
    }

    // Pure downward gravity — no horizontal tilt (it caused all balls to drift the same way)
    var GRAV_MAG=0.32;
    var GRAV_X=0;
    var GRAV_Y=GRAV_MAG;
    var FRIC=0.986;var BOUNCE=0.45;

    // Minimal wall micro-wobble — just enough for anti-stick, not visible
    g.wobT+=dt;
    g.maze.walls.forEach(function(w){
      var ang=g.wobT*w.wobFreq+w.wobPhase;
      w.ox=Math.sin(ang)*w.wobAmp;
      w.oy=Math.cos(ang*0.73+w.wobPhase*0.5)*w.wobAmp*0.7;
      w.oTilt=Math.sin(ang*0.9)*0.07;
    });
    g.trampFlex=Math.max(0,g.trampFlex-0.045*dt);

    var elapsed=(performance.now()-g.startT)/1000;
    // Decay hole proximity glow
    g.maze.holes.forEach(function(h){h.nearT=Math.max(0,h.nearT-0.04*dt);});

    // Build active list for O(n) collision optimization
    var activeBalls=[];
    g.balls.forEach(function(b){if(b.active&&!b.done&&!b.fallingIn)activeBalls.push(b);});

    g.balls.forEach(function(b){
      if(!b.active||b.done)return;

      if(b.fallingIn){
        b.fallTimer+=dt;
        var h=b.fallHole;
        b.x+=(h.x-b.x)*0.22;b.y+=(h.y-b.y)*0.22;
        b.angle+=(b.vx||0)*0.1;
        if(b.fallTimer>5){
          b.done=true;
          var grpIdx=h.num-1;
          playHoleFall();
          g.landedCount++;
          setLanded(g.landedCount);
          setGroups(function(prev){return prev.map(function(gr,gi){return gi===grpIdx?gr.concat([b.name]):gr;});});
          for(var li=0;li<6;li++){
            g.particles.push({x:h.x,y:h.y,vx:(Math.random()-0.5)*2,vy:-Math.random()*1.8-0.5,life:18,maxLife:18,color:GROUP_COLORS[grpIdx]});
          }
          var allDone=g.balls.every(function(bb){return bb.done||!bb.active;});
          if(allDone&&g.dropIdx>=g.dropOrder.length){
            g.done=true;
            later(function(){setPhase('done');onResult(g.numGroups+' Gruppen');playComplete();later(function(){setShowConfetti(true);},300);},600);
          }
        }
        return;
      }

      b.vy+=GRAV_Y*dt;b.vx+=GRAV_X*dt;b.vx*=FRIC;
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      b.angle+=(b.vx/BR)*dt*0.5;

      // ── Horizontal steering toward nearest hole of targetGroup ──
      // X-only so vertical path stays chaotic; each ball has a different target X → diverse paths
      if(b.targetGroup&&!b.fallingIn){
        var nearH=null;var nearD=Infinity;
        g.maze.holes.forEach(function(h){
          if(h.num!==b.targetGroup)return;
          var d=Math.abs(h.x-b.x);if(d<nearD){nearD=d;nearH=h;}
        });
        if(nearH){
          var hStr=0.00035+Math.min(0.0012,elapsed*0.00007);
          b.vx+=(nearH.x-b.x)*hStr*dt;
        }
      }

      // ── Anti-stuck timer ──
      var spd2=b.vx*b.vx+b.vy*b.vy;
      if(spd2<1.5){
        b.stuckT=(b.stuckT||0)+dt;
        if(b.stuckT>14){
          b.vx+=(Math.random()-0.5)*7;
          b.vy-=Math.random()*4+3;  // launch upward to escape wall/edge traps
          b.stuckT=0;
        }
      }else{b.stuckT=0;}

      b.trail.push({x:b.x,y:b.y});if(b.trail.length>10)b.trail.shift();

      // Wall collisions
      g.maze.walls.forEach(function(w){
        var hit=ballRect(b.x,b.y,BR,w.x+w.ox,w.y+w.oy,w.w,w.h);
        if(hit){
          b.x+=hit.nx*hit.overlap;b.y+=hit.ny*hit.overlap;
          var dot=b.vx*hit.nx+b.vy*hit.ny;
          var spd=Math.abs(dot);
          b.vx-=2*dot*hit.nx*BOUNCE;b.vy-=2*dot*hit.ny*BOUNCE;
          b.vx+=(Math.random()-0.5)*0.8;
          if(w.tilt&&hit.ny<-0.3){b.vx+=(w.tilt+w.oTilt)*12;}
          playBounceThrottled('wall',spd);
        }
      });

      // Pin collisions
      g.maze.pins.forEach(function(p){
        var dx=b.x-p.x;var dy=b.y-p.y;var dist=Math.sqrt(dx*dx+dy*dy);
        var minD=p.r+BR;
        if(dist<minD&&dist>0.1){
          var nx=dx/dist;var ny=dy/dist;
          b.x=p.x+nx*minD;b.y=p.y+ny*minD;
          var dot=b.vx*nx+b.vy*ny;
          b.vx-=2*dot*nx*BOUNCE;b.vy-=2*dot*ny*BOUNCE;
          b.vx+=(Math.random()-0.5)*1.0;
          p.hitT=1;
          playBounceThrottled('pin',Math.abs(dot));
          g.particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:10,maxLife:10,color:'#DEB887'});
        }
      });

      // Trampoline
      if(b.y+BR>=TRAMP_TOP&&b.x>TRAMP_L-4&&b.x<TRAMP_R+4){
        b.y=TRAMP_TOP-BR;
        var impact=Math.abs(b.vy);
        b.vy=-Math.max(impact*0.92,7.2)-2.5;
        b.vx+=(Math.random()-0.5)*2.0;
        g.trampFlex=Math.min(1,0.45+impact*0.09);
        for(var tpi=0;tpi<6;tpi++){
          g.particles.push({x:b.x+(Math.random()-0.5)*22,y:TRAMP_TOP,vx:(Math.random()-0.5)*2.6,vy:-Math.random()*2-0.6,life:14,maxLife:14,color:tpi%2?'#FF6B6B':'#FFE066'});
        }
        playBounceThrottled('tramp',impact);
      }

      // Frame boundary — hard kick inward + upward to break edge traps
      if(b.x<FIELD_L+BR){
        b.x=FIELD_L+BR;
        b.vx=Math.abs(b.vx)*0.5+2.5+Math.random()*2.0;
        b.vy-=Math.random()*2.5;  // upward kick prevents sliding down the wall
      }
      if(b.x>FIELD_R-BR){
        b.x=FIELD_R-BR;
        b.vx=-Math.abs(b.vx)*0.5-2.5-Math.random()*2.0;
        b.vy-=Math.random()*2.5;
      }
      if(b.y<FIELD_T+BR){b.y=FIELD_T+BR;b.vy=Math.abs(b.vy)*0.3+0.5;}
      if(b.y>FIELD_B-BR){b.y=FIELD_B-BR;b.vy=-Math.abs(b.vy)*0.3-0.8;b.vx+=(Math.random()-0.5)*1.5;}

      // Hole detection — any hole of ball's targetGroup; ignore if moving strongly upward
      if(!b.fallingIn&&b.targetGroup&&b.vy>-2){
        g.maze.holes.forEach(function(h){
          if(b.fallingIn||h.num!==b.targetGroup)return;
          var hdx=b.x-h.x;var hdy=b.y-h.y;
          var hdist=Math.sqrt(hdx*hdx+hdy*hdy);
          if(hdist<HOLE_R*3)h.nearT=Math.min(1,h.nearT+0.18);
          if(hdist<HOLE_R+BR*0.7){b.fallingIn=true;b.fallTimer=0;b.fallHole=h;b.vx=0;b.vy=0;}
        });
      }

      // Late-game: stronger X+Y pull toward nearest group hole, grows after 12s
      if(elapsed>12&&!b.fallingIn&&b.targetGroup){
        var urgH=null;var urgD=Infinity;
        g.maze.holes.forEach(function(h){
          if(h.num!==b.targetGroup)return;
          var dd=Math.sqrt((h.x-b.x)*(h.x-b.x)+(h.y-b.y)*(h.y-b.y));
          if(dd<urgD){urgD=dd;urgH=h;}
        });
        if(urgH){
          var urgF=Math.min(0.003,(elapsed-12)*0.00022);
          b.vx+=(urgH.x-b.x)*urgF*dt;
          b.vy+=(urgH.y-b.y)*urgF*dt;
          var urgSpd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
          if(urgSpd>11){b.vx=b.vx/urgSpd*11;b.vy=b.vy/urgSpd*11;}
        }
      }

      // Bottom safety
      if(b.y>FIELD_B-BR-3&&!b.fallingIn){b.vy=-Math.abs(b.vy)*0.5-1.2;}
    });

    // Ball-ball collisions — active list only (O(k²) not O(n²))
    for(var i=0;i<activeBalls.length;i++){
      var a=activeBalls[i];

      ctx.fillRect(TRAMP_R,TRAMP_TOP-4,1,TRAMP_BOTTOM-TRAMP_TOP+6);

      ctx.beginPath();

      ctx.quadraticCurveTo(midX,sagY+1,TRAMP_R-3,TRAMP_TOP+1);
      ctx.stroke();
      // Stitched seam
      ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=0.8;
      ctx.setLineDash([3,3]);
      ctx.beginPath();

  function handleMouseMove(e){

      ${phase==='done'&&html`<span className="inline-flex gap-3">
        <button onClick=${reset} className="px-6 py-3 rounded-xl font-semibold text-white border border-amber-700/40 hover:opacity-80 transition-all mr-3" style=${{background:'linear-gradient(135deg,#8B6914,#BFA04B)'}}>Nochmal</button>

      </span>`}
      ${phase==='running'&&html`<p className="text-gray-500 text-xs mt-2">Maus \u00FCber das Brett bewegen zum Kippen!</p>`}
    </div>
  </div>`;
}

function BattleRoyaleMode(props){

  var KILL_MSGS=['\u2620 Eliminated!','\u{1F4A5} Knocked out!','\u{1F525} Taken down!','\u{1F480} Gone!','\u{1F32A} Swept away!','\u26A1 Zapped!','\u{1F4A8} Storm got them!','\u{1F631} Too slow!'];
  var CLOSE_MSGS=['\u{1F3C6} So close!','\u{1F62D} Almost made it!','\u{1F62C} Last second!'];

  function addKill(name,cause,aliveLeft){
    var msgs=aliveLeft<=2?CLOSE_MSGS:KILL_MSGS;
    var comment=msgs[Math.floor(Math.random()*msgs.length)];
    var causeEmoji={storm:'\u{1F32A}',redzone:'\u{1F4A3}',airstrike:'\u{1F4A5}',finalzone:'\u26A1'};
    var entry={text:(causeEmoji[cause]||'\u{1F32A}')+' '+name+' \u2014 '+comment,time:Date.now()};

  /* ── AUDIO ── */
  function startAudio(){

      master.gain.value=0.45;
      // Wind drone

      var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.15;
      var wind=ctx.createBufferSource();wind.buffer=buf;wind.loop=true;
      var wf=ctx.createBiquadFilter();wf.type='lowpass';wf.frequency.value=300;
      var wg=ctx.createGain();wg.gain.value=0.3;
      wind.connect(wf);wf.connect(wg);wg.connect(master);wind.start();

      var dg=ctx.createGain();dg.gain.value=0.25;
      var df=ctx.createBiquadFilter();df.type='lowpass';df.frequency.value=150;
      drone.connect(df);df.connect(dg);dg.connect(master);drone.start();
      if(ah.oscs)ah.oscs.push(drone);
      // Rhythmic tension
      var now=ctx.currentTime;var b=60/110;
      for(var si=0;si<80;si++){
        var t=now+si*b*0.5;
        if(si%4===0){aT(ctx,master,50,t,0.25,0.5);aT(ctx,master,37,t+0.01,0.15,0.35);}
        if(si%4===2){aT(ctx,master,70,t,0.1,0.3);}
        if(si%8===0&&si>8){aC(ctx,master,t,[196,246.94,293.66],0.12,0.6,'triangle');}
        if(si%16===0&&si>16){aC(ctx,master,t,[392,493.88,587.33],0.08,1.0,'triangle');}
        if(si>50){aT(ctx,master,55+si*0.5,t,0.15,0.15+((si-50)/30)*0.3,'triangle');}
      }
      master.gain.linearRampToValueAtTime(0.65,ctx.currentTime+8);
      master.gain.linearRampToValueAtTime(0.85,ctx.currentTime+15);
    }catch(e){}
  }
  function playElimSound(){
    try{
      var ah=audioRef.current;if(!ah)return;var ctx=ah.ctx;var dest=ah.master;var now=ctx.currentTime;
      aT(ctx,dest,90,now,0.12,0.8);aT(ctx,dest,140,now+0.02,0.08,0.5,'square');
      var buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
      var dd=buf.getChannelData(0);for(var i=0;i<dd.length;i++)dd[i]=(Math.random()*2-1)*0.5;
      var src=ctx.createBufferSource();src.buffer=buf;
      var ng=ctx.createGain();ng.gain.setValueAtTime(0.6,now);ng.gain.exponentialRampToValueAtTime(0.001,now+0.1);
      src.connect(ng);ng.connect(dest);src.start(now);
    }catch(e){}
  }
  function playVictorySound(){
    try{
      var ah=audioRef.current;if(!ah)return;var ctx=ah.ctx;var dest=ah.master;var now=ctx.currentTime;
      var fanfare=[523.25,659.25,783.99,1046.5];
      for(var i=0;i<fanfare.length;i++){aT(ctx,dest,fanfare[i],now+i*0.15,0.4,0.3,'triangle');}
      aC(ctx,dest,now+0.7,[523.25,659.25,783.99,1046.5],0.25,1.5,'triangle');
    }catch(e){}
  }

  /* ── INIT ── */
  function initPlayers(){
    var players=[];var margin=BR*3;
    for(var i=0;i<names.length;i++){
      var attempts=0,x,y;
      do{x=margin+Math.random()*(AW-margin*2);y=margin+Math.random()*(AH-margin*2);attempts++;}
      while(attempts<80&&players.some(function(p){return Math.sqrt(Math.pow(p.x-x,2)+Math.pow(p.y-y,2))<BR*2.8}));
      var ang=Math.random()*Math.PI*2;var spd=0.8+Math.random()*1.2;
      players.push({id:i,name:names[i],color:BALL_COLORS[i%BALL_COLORS.length],
        x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
        hp:100,alive:true,elimT:0,dropY:-60-Math.random()*80,dropped:false,
        stormDmgAcc:0,shieldT:0});
    }
    return players;
  }

  /* ── ZONE ── */
  function makeZone(){
    return{cx:AW/2,cy:AH/2,r:Math.max(AW,AH)*0.7,
      targetCx:AW/2,targetCy:AH/2,targetR:Math.max(AW,AH)*0.7,
      shrinking:false,phase:0};
  }

  /* ── START ── */
  function startBR(){
    doCleanup();
    var g={players:initPlayers(),zone:makeZone(),events:[],dmgNums:[],elimFlashes:[],done:false,
      startT:performance.now(),dropPhase:true,redZones:[],airdrops:[]};
    gRef.current=g;
    setEliminated([]);setWinner(null);setShowConfetti(false);setSurviving(names.length);setKillFeed([]);setZonePhase(0);
    setPhase('running');setStatusText('\u{1FA82} Absprung!');
    startAudio();
    scheduleGame(g);
    var last=performance.now();
    function loop(now){
      var dt=Math.min((now-last)/16.67,3);last=now;
      var alive=g.players.filter(function(p){return p.alive}).length;
      if(alive<=3&&alive>0)dt*=0.55;
      updateGame(g,dt,now);drawFrame(g,now);
      if(!g.done)rafRef.current=requestAnimationFrame(loop);
    }
    rafRef.current=requestAnimationFrame(loop);
  }

  /* ── GAME SCHEDULE ── */
  function scheduleGame(g){
    var n=names.length;var t=0;

    // Drop phase: 1.5s
    later(function(){
      g.dropPhase=false;
      setStatusText('\u{1F30D} Zone aktiv \u2014 Phase 1');setZonePhase(1);
    },1500);

    // Phase 1: Zone shrinks to 60%, 3s
    t=1800;
    later(function(){
      if(g.done)return;
      var cx=AW*0.3+Math.random()*AW*0.4;var cy=AH*0.3+Math.random()*AH*0.4;
      g.zone.targetCx=cx;g.zone.targetCy=cy;
      g.zone.targetR=Math.max(AW,AH)*0.42;g.zone.shrinking=true;g.zone.phase=1;
    },t);
    // Red zone event
    later(function(){
      if(g.done)return;
      setStatusText('\u{1F4A3} Bombardement!');
      spawnRedZone(g);
    },t+1200);

    // Phase 2: Zone shrinks to 35%, 3s
    t=5500;
    later(function(){
      if(g.done)return;
      setStatusText('\u26A0 Zone schrumpft \u2014 Phase 2');setZonePhase(2);
      var cx=g.zone.cx+(-0.15+Math.random()*0.3)*(AW*0.2);
      var cy=g.zone.cy+(-0.15+Math.random()*0.3)*(AH*0.2);
      cx=Math.max(AW*0.2,Math.min(AW*0.8,cx));cy=Math.max(AH*0.2,Math.min(AH*0.8,cy));
      g.zone.targetCx=cx;g.zone.targetCy=cy;
      g.zone.targetR=Math.max(AW,AH)*0.28;g.zone.phase=2;
    },t);
    later(function(){if(g.done)return;spawnRedZone(g);setStatusText('\u{1F4A5} Luftangriff!');},t+1500);
    later(function(){if(g.done)return;spawnAirdrop(g);},t+800);
    later(function(){if(g.done)return;spawnMeteorShower(g);setStatusText('\u2604\uFE0F Meteorregen!');},t+2200);
    later(function(){if(g.done)return;spawnHealingStation(g);},t+3200);

    // Phase 3: Zone shrinks to 18%
    t=9000;
    later(function(){
      if(g.done)return;
      setStatusText('\u{1F525} Endgame \u2014 Phase 3!');setZonePhase(3);
      g.zone.targetR=Math.max(AW,AH)*0.15;g.zone.phase=3;
    },t);
    later(function(){if(g.done)return;spawnRedZone(g);},t+1000);

    // Phase 4: Final zone
    t=12500;
    later(function(){
      if(g.done)return;
      setStatusText('\u26A1 FINALE!');setZonePhase(4);
      g.zone.targetR=Math.max(AW,AH)*0.06;g.zone.phase=4;
    },t);

    // Force end
    later(function(){if(!g.done)forceWinner(g);},18000);
  }

  function spawnRedZone(g){
    var alive=g.players.filter(function(p){return p.alive});
    if(alive.length<2)return;
    var target=alive[Math.floor(Math.random()*alive.length)];
    var rz={x:target.x+(-30+Math.random()*60),y:target.y+(-30+Math.random()*60),
      r:40+Math.random()*30,t:0,maxT:80,active:true};
    g.redZones.push(rz);
  }

  function spawnAirdrop(g){
    var alive=g.players.filter(function(p){return p.alive});
    if(alive.length<2)return;
    var lucky=alive[Math.floor(Math.random()*alive.length)];
    lucky.shieldT=120;
    g.airdrops.push({x:lucky.x,y:lucky.y,t:0,maxT:40,name:lucky.name});
    setStatusText('\u{1F4E6} Airdrop f\u00FCr '+lucky.name+'!');
  }

  function spawnMeteorShower(g){
    var alive=g.players.filter(function(p){return p.alive});
    if(!alive.length)return;
    var numMeteors=5+Math.floor(Math.random()*4);
    var targets=[];
    for(var i=0;i<Math.min(numMeteors,alive.length+2);i++){
      var tx=50+Math.random()*300;var ty=80+Math.random()*200;
      targets.push({x:tx,y:ty});
    }
    // Damage 2-4 random players
    var hitCount=2+Math.floor(Math.random()*3);
    var shuffled=shuffle(alive);
    for(var j=0;j<Math.min(hitCount,shuffled.length);j++){
      var dmg=15+Math.floor(Math.random()*11);
      shuffled[j].hp=Math.max(0,shuffled[j].hp-dmg);
      if(shuffled[j].hp<=0){shuffled[j].alive=false;shuffled[j].elimFlash=1;}
    }
    // React overlay: set meteor state
    setMeteors(targets.map(function(t,i){return{id:Date.now()+i,x:t.x,y:t.y,dx:-40+Math.random()*80};}));
    later(function(){setMeteors([]);},1500);
  }

  function spawnHealingStation(g){
    var alive=g.players.filter(function(p){return p.alive});
    if(!alive.length)return;
    var lucky=alive[Math.floor(Math.random()*alive.length)];
    var oldHp=lucky.hp;
    lucky.hp=Math.min(100,Math.max(lucky.hp,50));
    var healed=lucky.hp-oldHp;
    if(healed>0){
      var healId=Date.now();
      setHealFloats(function(prev){return prev.concat([{id:healId,name:lucky.name,amount:healed,x:lucky.x,y:lucky.y}]);});
      later(function(){setHealFloats(function(prev){return prev.filter(function(h){return h.id!==healId;});});},1200);
      setStatusText('\u{1F49A} '+lucky.name+' wird geheilt!');
    }
  }

  /* ── PHYSICS + DAMAGE ── */
  function updateGame(g,dt,now){
    if(g.done)return;
    var z=g.zone;
    // Smooth zone shrink
    var zSpeed=0.012*dt;
    z.cx+=(z.targetCx-z.cx)*zSpeed;z.cy+=(z.targetCy-z.cy)*zSpeed;
    z.r+=(z.targetR-z.r)*zSpeed*0.8;

    // Drop animation
    if(g.dropPhase){
      g.players.forEach(function(p){
        if(!p.dropped){p.dropY+=4*dt;if(p.dropY>=0){p.dropY=0;p.dropped=true;}}
      });
      return;
    }

    var alive=g.players.filter(function(p){return p.alive});

    // Move players
    g.players.forEach(function(p){
      if(!p.alive)return;
      // Random direction changes
      if(Math.random()<0.02*dt){var ang=Math.random()*Math.PI*2;var spd=0.8+Math.random()*1.2;p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;}
      // Gravitate toward zone center when outside
      var dx=p.x-z.cx;var dy=p.y-z.cy;var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>z.r*0.5){
        var pull=0.03*dt*(dist/(z.r+1));
        p.vx-=dx/dist*pull;p.vy-=dy/dist*pull;
      }
      // Flee from red zones
      g.redZones.forEach(function(rz){
        if(!rz.active)return;
        var rdx=p.x-rz.x;var rdy=p.y-rz.y;var rd=Math.sqrt(rdx*rdx+rdy*rdy);
        if(rd<rz.r*1.5&&rd>0&&p.shieldT<=0){
          p.vx+=rdx/rd*0.5*dt;p.vy+=rdy/rd*0.5*dt;
        }
      });
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      // Bounce walls
      if(p.x<BR){p.x=BR;p.vx=Math.abs(p.vx)*0.8;}
      if(p.x>AW-BR){p.x=AW-BR;p.vx=-Math.abs(p.vx)*0.8;}
      if(p.y<BR){p.y=BR;p.vy=Math.abs(p.vy)*0.8;}
      if(p.y>AH-BR){p.y=AH-BR;p.vy=-Math.abs(p.vy)*0.8;}
      // Ball-ball collision
      g.players.forEach(function(q){
        if(q.id<=p.id||!q.alive)return;
        var cdx=p.x-q.x;var cdy=p.y-q.y;var cd=Math.sqrt(cdx*cdx+cdy*cdy);
        if(cd<BR*2&&cd>0){
          var nx=cdx/cd;var ny=cdy/cd;var overlap=(BR*2-cd)/2;
          p.x+=nx*overlap;p.y+=ny*overlap;q.x-=nx*overlap;q.y-=ny*overlap;
          var dvx=p.vx-q.vx;var dvy=p.vy-q.vy;var dot=dvx*nx+dvy*ny;
          if(dot>0){p.vx-=dot*nx*0.5;p.vy-=dot*ny*0.5;q.vx+=dot*nx*0.5;q.vy+=dot*ny*0.5;}
        }
      });
      // Shield countdown
      if(p.shieldT>0)p.shieldT-=dt;
      // Storm damage
      if(dist>z.r&&p.shieldT<=0){
        var dmgRate=z.phase>=3?2.5:z.phase>=2?1.5:0.8;
        var overflow=Math.max(0,(dist-z.r)/50);
        p.hp-=(dmgRate+overflow*0.5)*dt;
        p.stormDmgAcc+=dt;
        if(p.stormDmgAcc>8){
          p.stormDmgAcc=0;
          g.dmgNums.push({x:p.x,y:p.y-BR,val:Math.round(dmgRate*8),t:0,maxT:30});
        }
      }else{
        p.stormDmgAcc=0;
      }
    });

    // Red zone damage
    g.redZones.forEach(function(rz){
      if(!rz.active)return;
      rz.t+=dt;
      if(rz.t>rz.maxT){rz.active=false;return;}
      if(rz.t>15){
        g.players.forEach(function(p){
          if(!p.alive||p.shieldT>0)return;
          var rdx=p.x-rz.x;var rdy=p.y-rz.y;
          if(Math.sqrt(rdx*rdx+rdy*rdy)<rz.r){
            p.hp-=3*dt;
            if(Math.random()<0.05*dt)g.dmgNums.push({x:p.x+(-10+Math.random()*20),y:p.y-BR,val:Math.round(3*dt*10),t:0,maxT:30});
          }
        });
      }
    });

    // Airdrop animations
    g.airdrops.forEach(function(ad){ad.t+=dt;});

    // Damage number cleanup
    g.dmgNums.forEach(function(dn){dn.t+=dt;});
    g.dmgNums=g.dmgNums.filter(function(dn){return dn.t<dn.maxT;});

    // Elim flash cleanup
    g.elimFlashes.forEach(function(ef){ef.t+=dt;});
    g.elimFlashes=g.elimFlashes.filter(function(ef){return ef.t<20;});

    // Check eliminations
    g.players.forEach(function(p){
      if(!p.alive||p.hp>0)return;
      p.alive=false;p.elimT=now;
      var aliveNow=g.players.filter(function(q){return q.alive}).length;
      var cause=g.redZones.some(function(rz){return rz.active&&Math.sqrt(Math.pow(p.x-rz.x,2)+Math.pow(p.y-rz.y,2))<rz.r})?'redzone':'storm';
      addKill(p.name,cause,aliveNow);
      playElimSound();
      g.elimFlashes.push({x:p.x,y:p.y,t:0});
      setSurviving(aliveNow);
      setEliminated(function(prev){return prev.concat(p.name);});
      if(aliveNow===1){
        var w=g.players.filter(function(q){return q.alive})[0];
        g.done=true;
        later(function(){
          setWinner(w.name);setPhase('done');setStatusText('\u{1F3C6} VICTORY ROYALE!');onResult(w.name);
          playVictorySound();
          later(function(){setShowConfetti(true);},300);
        },800);
      }
    });
  }

  function forceWinner(g){
    if(g.done)return;
    var alive=g.players.filter(function(p){return p.alive});
    if(alive.length===0)return;
    // Sort by HP, kill all except highest
    alive.sort(function(a,b){return b.hp-a.hp;});
    for(var i=1;i<alive.length;i++){
      alive[i].alive=false;alive[i].hp=0;
      addKill(alive[i].name,'finalzone',alive.length-i);
      g.elimFlashes.push({x:alive[i].x,y:alive[i].y,t:0});
    }
    g.done=true;
    setEliminated(function(prev){return prev.concat(alive.slice(1).map(function(p){return p.name}));});
    setSurviving(1);
    later(function(){
      setWinner(alive[0].name);setPhase('done');setStatusText('\u{1F3C6} VICTORY ROYALE!');onResult(alive[0].name);
      playVictorySound();
      later(function(){setShowConfetti(true);},300);
    },800);
  }

  /* ── DRAW ── */
  function drawFrame(g,now){
    var cv=canvasRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');
    ctx.setTransform(2,0,0,2,0,0);
    var z=g.zone;

    // Background — dark terrain
    ctx.fillStyle='#0a1628';ctx.fillRect(0,0,AW,AH);

    // Grid lines (subtle terrain)
    ctx.strokeStyle='rgba(30,60,90,0.3)';ctx.lineWidth=1;
    for(var gx=0;gx<AW;gx+=30){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,AH);ctx.stroke();}
    for(var gy=0;gy<AH;gy+=30){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(AW,gy);ctx.stroke();}

    // Terrain elements (decorative)
    ctx.globalAlpha=0.15;
    var treePosns=[[80,60],[180,300],[400,80],[520,320],[300,200],[50,250],[500,150],[150,150],[450,250],[250,350]];
    ctx.fillStyle='#22c55e';
    treePosns.forEach(function(tp){
      if(tp[0]<AW&&tp[1]<AH){
        ctx.beginPath();ctx.arc(tp[0],tp[1],8,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(tp[0]-4,tp[1]-3,6,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(tp[0]+4,tp[1]-3,6,0,Math.PI*2);ctx.fill();
      }
    });
    var rockPosns=[[250,100],[130,220],[480,200],[350,330],[60,140]];
    ctx.fillStyle='#64748b';
    rockPosns.forEach(function(rp){
      if(rp[0]<AW&&rp[1]<AH){
        ctx.beginPath();ctx.ellipse(rp[0],rp[1],10,7,0.3,0,Math.PI*2);ctx.fill();
      }
    });
    ctx.globalAlpha=1;

    // Storm overlay (outside zone = purple fog)
    ctx.save();
    ctx.beginPath();ctx.rect(0,0,AW,AH);
    ctx.arc(z.cx,z.cy,Math.max(0,z.r),0,Math.PI*2,true);
    ctx.closePath();
    var stormPulse=0.35+Math.sin(now*0.003)*0.08;
    ctx.fillStyle='rgba(88,28,135,'+stormPulse+')';ctx.fill();
    // Storm particles
    ctx.strokeStyle='rgba(139,92,246,0.3)';ctx.lineWidth=1.5;
    for(var sp=0;sp<12;sp++){
      var sa=now*0.001+sp*0.524;var sr=z.r+5+Math.sin(now*0.005+sp)*10;
      var sx=z.cx+Math.cos(sa)*sr;var sy=z.cy+Math.sin(sa)*sr;
      ctx.beginPath();ctx.moveTo(sx,sy);
      ctx.lineTo(sx+Math.cos(sa+0.5)*8,sy+Math.sin(sa+0.5)*8);ctx.stroke();
    }
    ctx.restore();

    // Zone circle border
    ctx.beginPath();ctx.arc(z.cx,z.cy,Math.max(0,z.r),0,Math.PI*2);
    ctx.strokeStyle='rgba(139,92,246,0.6)';ctx.lineWidth=2.5;ctx.stroke();
    // Inner glow
    ctx.beginPath();ctx.arc(z.cx,z.cy,Math.max(0,z.r-2),0,Math.PI*2);
    ctx.strokeStyle='rgba(167,139,250,0.2)';ctx.lineWidth=6;ctx.stroke();

    // White safe zone border
    ctx.beginPath();ctx.arc(z.cx,z.cy,Math.max(0,z.targetR),0,Math.PI*2);
    ctx.setLineDash([6,4]);ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.setLineDash([]);

    // Red zones
    g.redZones.forEach(function(rz){
      if(!rz.active)return;
      var progress=rz.t/rz.maxT;
      var alpha=rz.t<15?0.15+progress*0.4:0.3+Math.sin(rz.t*0.5)*0.15;
      ctx.beginPath();ctx.arc(rz.x,rz.y,rz.r,0,Math.PI*2);
      ctx.fillStyle='rgba(239,68,68,'+alpha+')';ctx.fill();
      ctx.strokeStyle='rgba(239,68,68,0.6)';ctx.lineWidth=2;ctx.stroke();
      if(rz.t>15&&rz.t%6<3){
        // Explosion particles
        for(var ei=0;ei<3;ei++){
          var ea=Math.random()*Math.PI*2;var er=Math.random()*rz.r;
          ctx.beginPath();ctx.arc(rz.x+Math.cos(ea)*er,rz.y+Math.sin(ea)*er,2,0,Math.PI*2);
          ctx.fillStyle='rgba(251,191,36,0.7)';ctx.fill();
        }
      }
    });

    // Airdrops
    g.airdrops.forEach(function(ad){
      if(ad.t>ad.maxT)return;
      var scale=Math.min(1,ad.t/10);
      ctx.globalAlpha=Math.max(0,1-ad.t/ad.maxT);
      ctx.fillStyle='#fbbf24';
      ctx.beginPath();ctx.rect(ad.x-8*scale,ad.y-8*scale,16*scale,16*scale);ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
      ctx.globalAlpha=1;
    });

    // Players
    g.players.forEach(function(p){
      if(!p.alive&&(!p.elimT||now-p.elimT>1500))return;
      var drawY=p.y+(g.dropPhase?p.dropY:0);
      var alpha=p.alive?1:Math.max(0,1-(now-p.elimT)/1000);
      var scale=p.alive?1:Math.max(0.3,1-(now-p.elimT)/800);
      ctx.globalAlpha=alpha;
      ctx.save();ctx.translate(p.x,drawY);ctx.scale(scale,scale);
      // Shield glow
      if(p.shieldT>0&&p.alive){
        ctx.beginPath();ctx.arc(0,0,BR+5,0,Math.PI*2);
        ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=2;ctx.stroke();
      }
      // Ball
      var grad=ctx.createRadialGradient(-BR*0.3,-BR*0.3,BR*0.1,0,0,BR);
      grad.addColorStop(0,'rgba(255,255,255,0.3)');grad.addColorStop(1,p.color);
      ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      // HP bar
      if(p.alive&&p.hp<100){
        var barW=BR*2;var barH=3;var barY=BR+4;
        ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(-barW/2,barY,barW,barH);

    ctx.fillStyle='#fff';ctx.font='bold 13px Inter,sans-serif';ctx.textAlign='right';
    var aliveCount=g.players.filter(function(p){return p.alive}).length;

    // Minimap

    // Mini zone

    ctx.beginPath();ctx.arc(mzx,mzy,Math.max(1,mzr),0,Math.PI*2);

  function reset(){doCleanup();setPhase('idle');setStatusText('Bereit zum Absprung!');setEliminated([]);setWinner(null);setShowConfetti(false);setSurviving(0);setKillFeed([]);setZonePhase(0);}
