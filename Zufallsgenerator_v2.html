    <style>
      @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}
      .gradient-text{background:linear-gradient(90deg,#6d28d9,#4f46e5,#0284c7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
      @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.fade-in-up{animation:fadeInUp .5s ease forwards}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}.fade-in{animation:fadeIn .4s ease forwards}
      .cb-present{accent-color:#8b5cf6;width:18px;height:18px;cursor:pointer}
      @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
      .confetti-piece{position:fixed;top:-20px;z-index:50;pointer-events:none;animation:confettiFall linear forwards}
      @keyframes winnerPulse{0%,100%{transform:scale(1);box-shadow:0 8px 40px rgba(109,40,217,0.25)}50%{transform:scale(1.03);box-shadow:0 12px 60px rgba(109,40,217,0.40)}}.winner-card{animation:winnerPulse 1.8s ease-in-out infinite}
      @keyframes winnerEnter{0%{opacity:0;transform:scale(.3)}60%{transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}.winner-enter{animation:winnerEnter .6s cubic-bezier(.34,1.56,.64,1) forwards}

      /* LOTTO */
      .drum-ring{border-radius:50%;border:3px solid rgba(139,92,246,.12);background:radial-gradient(circle at 38% 38%,#1e1b4b,#0c0820 75%);box-shadow:inset 0 0 50px rgba(139,92,246,.08),0 0 60px rgba(139,92,246,.06);overflow:hidden;position:relative}
      .lotto-ball{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);user-select:none;text-align:center;line-height:1.1;padding:0 3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:box-shadow .3s,filter .3s}
      .lotto-ball.glow{box-shadow:0 0 24px rgba(251,191,36,.6),0 0 48px rgba(251,191,36,.3)!important;filter:brightness(1.3);z-index:30!important}
      @keyframes ballFloat{0%,100%{transform:translate(0,0)}25%{transform:translate(5px,-4px)}50%{transform:translate(-3px,5px)}75%{transform:translate(4px,2px)}}
      @keyframes ballEject{0%{opacity:1;transform:scale(1)}40%{opacity:1;transform:scale(1.4) translateY(-30px)}100%{opacity:0;transform:scale(.4) translateY(-120px)}}
      .ball-eject{animation:ballEject .5s cubic-bezier(.4,0,.2,1) forwards}
      .tray-ball{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:rgba(255,255,255,.7);opacity:.5;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 2px;text-align:center;line-height:1.1}
      @keyframes trayPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:.5}}.tray-pop{animation:trayPop .35s cubic-bezier(.34,1.56,.64,1) forwards}
      @keyframes lightBlink{0%,100%{opacity:.15}50%{opacity:.9}}

      /* BATTLE */
      @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}.shake{animation:shake .4s ease-in-out}
      @keyframes vsPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}.vs-pop{animation:vsPop .4s cubic-bezier(.34,1.56,.64,1) forwards}


      /* GROUP MODES */
      @keyframes namePop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
      .name-pop{animation:namePop .3s cubic-bezier(.34,1.56,.64,1) forwards}
      @keyframes coinPop{0%{transform:translateX(-50%) scale(0);opacity:1}50%{transform:translateX(-50%) translateY(-44px) scale(1.3);opacity:1}100%{transform:translateX(-50%) translateY(-88px) scale(0.6);opacity:0}}
      .mario-coin{position:absolute;font-size:20px;pointer-events:none;animation:coinPop 0.75s ease-out forwards;z-index:20}

      /* BATTLE ROYALE */
      @keyframes brDrop{0%{opacity:0;transform:translateY(-60px) scale(.5)}60%{opacity:1;transform:translateY(5px) scale(1.05)}100%{opacity:1;transform:translateY(0) scale(1)}}
      @keyframes brStormPulse{0%,100%{opacity:.55}50%{opacity:.75}}
      @keyframes brDmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-30px) scale(.7)}}
      .br-dmg{position:absolute;pointer-events:none;font-weight:800;color:#ef4444;text-shadow:0 0 6px rgba(239,68,68,.7);animation:brDmgFloat .8s ease-out forwards;z-index:40;font-size:13px}
      @keyframes brElimFlash{0%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(2.5)}}
      .br-elim-flash{position:absolute;pointer-events:none;border-radius:50%;background:radial-gradient(circle,rgba(239,68,68,.8),transparent 70%);animation:brElimFlash .5s ease-out forwards;z-index:35}
      @keyframes brVictoryBanner{0%{opacity:0;transform:scale(.3) rotate(-5deg)}50%{transform:scale(1.08) rotate(1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
      .br-victory{animation:brVictoryBanner .7s cubic-bezier(.34,1.56,.64,1) forwards}
      @keyframes brZonePulse{0%,100%{box-shadow:0 0 30px rgba(139,92,246,.3),inset 0 0 30px rgba(139,92,246,.1)}50%{box-shadow:0 0 50px rgba(139,92,246,.5),inset 0 0 50px rgba(139,92,246,.2)}}

      /* VORTEX PORTAL */
      @keyframes vortexResultPop{0%{opacity:0;transform:scale(.7) translateY(15px)}100%{opacity:1;transform:scale(1) translateY(0)}}
      .vortex-result-pop{animation:vortexResultPop .4s cubic-bezier(.34,1.56,.64,1) forwards}

      /* ═══════════════════════════════════════════
         LIGHT THEME — PROFESSIONELLES DESIGN
         ═══════════════════════════════════════════ */

      /* Heller, freundlicher Hintergrund */
      .mesh-bg{
        background: linear-gradient(160deg, #f0f4ff 0%, #faf8ff 40%, #f0f9ff 100%);
        min-height: 100vh;
      }
      /* Hero-Welle oben — dekorativ */
      .hero-glow{
        position:absolute;top:0;left:0;right:0;bottom:0;
        background:linear-gradient(180deg,rgba(109,40,217,0.06) 0%,transparent 100%);
        pointer-events:none;border-radius:0 0 60% 60%;
      }

      /* Floating ambient orbs */
      @keyframes orbDrift1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.15)}66%{transform:translate(-30px,50px) scale(0.9)}}
      @keyframes orbDrift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-60px) scale(1.1)}}
      @keyframes orbDrift3{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,30px)}66%{transform:translate(-20px,-40px)}}

      /* Weiße Karten — sauber und professionell */
      .glass{
        background:#ffffff!important;
        backdrop-filter:none;
        -webkit-backdrop-filter:none;
        border:1px solid rgba(0,0,0,0.08)!important;
        box-shadow:0 2px 12px rgba(0,0,0,0.06),0 8px 32px rgba(0,0,0,0.04)!important;
      }
      .glass-subtle{
        background:rgba(248,250,255,0.9)!important;
        backdrop-filter:none;
        border:1px solid rgba(0,0,0,0.06)!important;
      }

      /* Mode card system */
      .mode-card{
        position:relative;overflow:hidden;
        transition:transform 0.35s cubic-bezier(.4,0,.2,1),box-shadow 0.35s ease,border-color 0.35s ease;
      }
      .mode-card::before{
        content:'';position:absolute;inset:0;z-index:0;
        background:radial-gradient(circle 140px at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.20),transparent 70%);
        opacity:0;transition:opacity 0.35s;pointer-events:none;
      }
      .mode-card:not(:disabled):hover::before{opacity:1}
      .mode-card:not(:disabled):hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.15),0 0 0 2px var(--card-outline,rgba(109,40,217,0.3))}
      .mode-card:not(:disabled):active{transform:translateY(-2px) scale(0.99)}
      .mode-card>*{position:relative;z-index:1}

      /* Card shimmer on hover */
      @keyframes shimmer{0%{transform:translateX(-100%) rotate(15deg)}100%{transform:translateX(200%) rotate(15deg)}}
      .mode-card::after{
        content:'';position:absolute;top:-50%;left:-50%;width:50%;height:200%;z-index:1;
        background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);
        transform:translateX(-100%) rotate(15deg);pointer-events:none;
      }
      .mode-card:not(:disabled):hover::after{animation:shimmer 1s ease forwards}

      /* Featured card span */
      .mode-featured{grid-column:span 2}
      @media(max-width:768px){.mode-featured{grid-column:span 1}}

      /* Badge */
      .badge-new{
        display:inline-flex;align-items:center;gap:3px;
        padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;
        letter-spacing:0.5px;text-transform:uppercase;
        background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;
        box-shadow:0 2px 8px rgba(109,40,217,0.35);
      }
      .badge-hot{
        display:inline-flex;align-items:center;gap:3px;
        padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;
        letter-spacing:0.5px;text-transform:uppercase;
        background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;
        box-shadow:0 2px 8px rgba(239,68,68,0.30);
      }

      /* Section divider */
      .section-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(109,40,217,0.25),transparent);margin:4px 0}

      /* Category label — hell */
      .category-label{
        display:inline-flex;align-items:center;gap:6px;
        padding:4px 16px;border-radius:20px;
        background:rgba(109,40,217,0.08);border:1px solid rgba(109,40,217,0.20);
        font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#6d28d9;
      }
      .category-label-green{
        background:rgba(5,150,105,0.08);border-color:rgba(5,150,105,0.20);
        color:#047857;
      }

      /* Header title — maximal sichtbar auf hellem Hintergrund */
      .header-title{
        background:linear-gradient(135deg,#6d28d9 0%,#4f46e5 40%,#0284c7 80%,#6d28d9 100%);
        background-size:200% auto;
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        animation:gradientShift 5s ease infinite;
        letter-spacing:-1px;
        padding-bottom:0.12em;
      }
      @keyframes gradientShift{0%{background-position:0% center}50%{background-position:100% center}100%{background-position:0% center}}

      /* Subtitle typing feel */
      @keyframes subtitleFade{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
      .subtitle-anim{animation:subtitleFade 0.8s ease 0.3s both}

      /* Better scrollbar */
      ::-webkit-scrollbar{width:5px;height:5px}
      ::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:rgba(109,40,217,0.20);border-radius:10px}
      ::-webkit-scrollbar-thumb:hover{background:rgba(109,40,217,0.40)}

      /* Card mini-preview animations */
      @keyframes previewPulseRing{0%,100%{r:8;opacity:0.6}50%{r:14;opacity:0.2}}
      @keyframes previewBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
      @keyframes previewSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
      .preview-bounce{animation:previewBounce 1.5s ease-in-out infinite}
      .preview-spin{animation:previewSpin 3s linear infinite}

      /* Footer — hell */
      .footer-glass{
        background:#ffffff;
        border-top:1px solid rgba(0,0,0,0.07);
      }

      /* Input focus ring */
      input:focus,textarea:focus{
        box-shadow:0 0 0 3px rgba(109,40,217,0.15)!important;
        border-color:rgba(109,40,217,0.50)!important;
        outline:none;
      }

      /* Smooth page transitions */
      @keyframes screenSlideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
      .screen-enter{animation:screenSlideIn 0.5s cubic-bezier(.4,0,.2,1) forwards}

      /* ── V2: Sound Toggle ── */
      .sound-toggle{position:fixed;top:10px;right:10px;z-index:100;width:44px;height:44px;border-radius:50%;background:#ffffff;border:1px solid rgba(0,0,0,0.12);box-shadow:0 2px 8px rgba(0,0,0,0.10);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:18px;color:rgba(0,0,0,0.6);user-select:none}
      .sound-toggle:hover{background:rgba(109,40,217,0.08);border-color:rgba(109,40,217,0.30);color:#6d28d9}


      /* ── V2: ChaosArena ── */
      @keyframes shockwaveRing{0%{transform:translate(-50%,-50%) scale(0);opacity:.9;border-width:4px}100%{transform:translate(-50%,-50%) scale(5);opacity:0;border-width:1px}}
      @keyframes eventBannerAnim{0%{opacity:0;transform:translateX(-50%) scale(.6)}15%{opacity:1;transform:translateX(-50%) scale(1.05)}85%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(.85)}}
      .shockwave-ring{position:fixed;width:70px;height:70px;border-radius:50%;border:4px solid rgba(251,191,36,.85);pointer-events:none;z-index:60;animation:shockwaveRing .9s ease-out forwards}
      .event-banner{position:fixed;left:50%;top:38%;transform:translateX(-50%);z-index:70;font-size:26px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(139,92,246,.9);white-space:nowrap;pointer-events:none;animation:eventBannerAnim 2s ease forwards;padding:8px 20px;background:rgba(0,0,0,0.45);border-radius:14px;backdrop-filter:blur(8px)}

      /* ── V2: BattleRoyale neue Events ── */
      @keyframes meteorFall{0%{opacity:1;transform:translate(0,0) rotate(30deg)}100%{opacity:0;transform:translate(var(--mdx,80px),320px) rotate(30deg)}}
      @keyframes healFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-45px) scale(.7)}}
      .meteor-emoji{position:fixed;font-size:30px;pointer-events:none;z-index:55;animation:meteorFall 1.3s ease-in forwards}
      .heal-float-el{position:absolute;color:#4ade80;font-weight:800;font-size:13px;text-shadow:0 0 8px rgba(74,222,128,.7);pointer-events:none;z-index:40;animation:healFloat 1.1s ease-out forwards}

      /* ── V2: Glücksrad ── */
      @keyframes wheelPointerBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      .wheel-pointer{animation:wheelPointerBounce 1s ease-in-out infinite}

      /* ── V2: Space Race ── */
      @keyframes countdownPop{0%{opacity:0;transform:scale(.2)}55%{transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}
      @keyframes rocketBoost{0%,100%{filter:brightness(1)}50%{filter:brightness(1.6) drop-shadow(0 0 6px rgba(255,200,50,.8))}}
      .countdown-pop{animation:countdownPop .45s cubic-bezier(.34,1.56,.64,1) forwards}
      .rocket-boost{animation:rocketBoost .4s ease-in-out}

      /* ── V2: Labyrinth tilt intro ── */

@keyframes boardTiltIn{0%{transform:perspective(700px) rotateX(0deg) rotateY(0deg) scale(1)}20%{transform:perspective(700px) rotateX(10deg) rotateY(-8deg) scale(0.97)}50%{transform:perspective(700px) rotateX(-7deg) rotateY(6deg) scale(0.98)}75%{transform:perspective(700px) rotateX(5deg) rotateY(-3deg) scale(0.99)}100%{transform:perspective(700px) rotateX(0deg) rotateY(0deg) scale(1)}}
      .board-tilt{animation:boardTiltIn 0.75s cubic-bezier(.25,.46,.45,.94) forwards}

      /* Pulse — used by GroupQuickMode result cards */
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

      /* ── UX: Toggle-Switch (Anwesenheit) ── */
      .toggle-switch{position:relative;display:inline-flex;align-items:center;width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0;padding:0}
      .toggle-switch.ts-on{background:#8b5cf6}
      .toggle-switch.ts-off{background:#d1d5db}
      .toggle-knob{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s}
      .toggle-switch.ts-on .toggle-knob{left:18px}
      .toggle-switch.ts-off .toggle-knob{left:2px}

      /* ── UX: Drag-Handle ── */
      .drag-handle{display:flex;align-items:center;cursor:grab;color:#d1d5db;padding:0 4px;flex-shrink:0;user-select:none;touch-action:none}
      .drag-handle:active{cursor:grabbing}
      .drag-handle:hover{color:#8b5cf6}
      .name-row-dragging{opacity:0.4}
      .name-row-dragover{outline:2px solid rgba(139,92,246,.5);border-radius:8px}

      /* ── UX: Ergebnis-Historie ── */
      .history-entry{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:#f9fafb;border:1px solid #f3f4f6;font-size:12px}
      .history-mode-badge{flex-shrink:0;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(109,40,217,.1);color:#6d28d9}
      .history-winner{flex:1;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .history-time{flex-shrink:0;color:#9ca3af;font-size:10px}

      /* ── UX: Gruppen-Modus-Toggle ── */
      .group-mode-toggle{display:flex;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;align-self:center}
      .group-mode-btn{padding:6px 14px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
      .group-mode-btn.active{background:#6d28d9;color:#fff}
      .group-mode-btn.inactive{background:#f9fafb;color:#6b7280}
      .group-mode-btn.inactive:hover{background:#f3f4f6;color:#374151}
    </style>
</head>

<div id="root"></div>

<script>
var useState = React.useState;
var useRef = React.useRef;
var useCallback = React.useCallback;
var useEffect = React.useEffect;
var useMemo = React.useMemo;
var html = htm.bind(React.createElement);

var STORAGE_KEY = 'randomPicker_lists';
var HISTORY_KEY = 'bg_history_v1';

/* Mouse-tracking glow for mode cards */
function trackMouse(e){
  var rect=e.currentTarget.getBoundingClientRect();
  var x=((e.clientX-rect.left)/rect.width*100).toFixed(1);
  var y=((e.clientY-rect.top)/rect.height*100).toFixed(1);
  e.currentTarget.style.setProperty('--mx',x+'%');
  e.currentTarget.style.setProperty('--my',y+'%');
}

/* ═══ Shared Audio Helpers ═══ */
function createAudioCtx(){
  if(window._soundEnabled===false)return null;
  try{
    var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;
    var ctx=new AC();ctx.resume();
    var master=ctx.createGain();master.gain.value=0.45;master.connect(ctx.destination);
    return{ctx:ctx,master:master,oscs:[]};
  }catch(e){return null;}
}
function aT(ctx,dest,freq,t,dur,vol,type){
  if(!freq||!ctx||!dest)return;
  var o=ctx.createOscillator();o.type=type||'sine';o.frequency.value=freq;
  var g=ctx.createGain();g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(dest);o.start(t);o.stop(t+dur+0.05);
}
function aC(ctx,dest,t,freqs,vol,dur,type){freqs.forEach(function(f,fi){aT(ctx,dest,f,t+fi*0.02,dur,vol,type);});}
function stopAH(ah){
  if(!ah||!ah.ctx)return;
  try{
    ah.master.gain.setValueAtTime(ah.master.gain.value,ah.ctx.currentTime);
    ah.master.gain.linearRampToValueAtTime(0,ah.ctx.currentTime+0.6);
    if(ah.oscs){ah.oscs.forEach(function(o){try{o.stop();}catch(e){}});}
    setTimeout(function(){try{ah.ctx.close();}catch(e){}},700);
  }catch(e){}
}

function playLottoMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=0.5;
  for(var i=0;i<50;i++){
    var t=now+i*b;
    // Ticking clock bass
    aT(ctx,m,82.41,t,0.08,0.4); // E2
    if(i%2===1)aT(ctx,m,110,t,0.06,0.25); // A2 off-beat
    // Rising tension every 4 beats
    if(i%4===0){var rise=Math.min(1,i/40);aT(ctx,m,220+rise*220,t,0.3,0.12+rise*0.1,'triangle');}
    // Suspense chord every 8 beats
    if(i%8===0&&i>0){aC(ctx,m,t,[164.81,196,246.94],0.1,0.8,'triangle');} // Em
    // Dramatic build
    if(i>30){aT(ctx,m,55,t+0.25,0.1,0.2+((i-30)/20)*0.3);}
  }
}

function playBattleMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/140;
  for(var i=0;i<120;i++){
    var t=now+i*b*0.5;
    // Heavy kick drum
    if(i%4===0){aT(ctx,m,50,t,0.15,0.6);aT(ctx,m,35,t+0.01,0.1,0.4);}
    // Snare on 2 and 4
    if(i%4===2){
      var buf=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate);var d=buf.getChannelData(0);
      for(var si=0;si<d.length;si++)d[si]=(Math.random()*2-1)*0.3;
      var src=ctx.createBufferSource();src.buffer=buf;var ng=ctx.createGain();
      ng.gain.setValueAtTime(0.35,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      src.connect(ng);ng.connect(m);src.start(t);
    }
    // Power chord stabs Em (E-B-E)
    if(i%16===0){aC(ctx,m,t,[82.41,123.47,164.81],0.2,0.5,'sawtooth');}
    if(i%16===8){aC(ctx,m,t,[98,146.83,196],0.15,0.4,'sawtooth');} // G power
    // Aggressive bass line
    if(i%8===4){aT(ctx,m,55,t,0.2,0.35,'sawtooth');}
    if(i%8===6){aT(ctx,m,73.42,t,0.15,0.3,'sawtooth');}
  }
}

function playObstacleMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/150;
  for(var i=0;i<100;i++){
    var t=now+i*b*0.5;
    // Fast pulse bass
    if(i%2===0){aT(ctx,m,65.41,t,0.1,0.35);} // C2
    if(i%2===1){aT(ctx,m,73.42,t,0.08,0.25);} // D2
    // Staccato action hits
    if(i%8===0){aC(ctx,m,t,[261.63,329.63,392],0.12,0.2,'square');} // C major
    if(i%8===4){aC(ctx,m,t,[220,277.18,329.63],0.1,0.2,'square');} // Am
    // Rising danger arpeggios every 16 beats
    if(i%16===0&&i>0){
      for(var a=0;a<4;a++){aT(ctx,m,[523.25,659.25,783.99,1046.5][a],t+a*0.08,0.15,0.08,'triangle');}
    }
    // Snare rush on 4th beat
    if(i%4===3){aT(ctx,m,200,t,0.05,0.2,'square');}
  }
}

function playMarioMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/140;
  // Mario-style bouncy chiptune melody
  var melody=[659.25,659.25,0,659.25,0,523.25,659.25,0,783.99,0,0,0,392,0,0,0,
    523.25,0,0,392,0,0,329.63,0,0,440,0,493.88,0,466.16,440,0,
    392,659.25,783.99,880,0,698.46,783.99,0,659.25,0,523.25,587.33,493.88,0,0,0];
  for(var i=0;i<melody.length;i++){
    var t=now+i*b*0.25;
    if(melody[i]>0){aT(ctx,m,melody[i],t,0.12,0.18,'square');}
    // Bass on beats
    if(i%4===0){aT(ctx,m,i%8<4?130.81:98,t,0.15,0.25,'triangle');}
  }
  // Loop second part with different notes
  var bass2=[130.81,0,164.81,0,196,0,164.81,0];
  for(var j=0;j<48;j++){
    var t2=now+melody.length*b*0.25+j*b*0.5;
    if(j%2===0){aT(ctx,m,392+Math.sin(j*0.5)*80,t2,0.1,0.12,'square');}
    aT(ctx,m,bass2[j%bass2.length]||130.81,t2,0.15,0.2,'triangle');
    if(j%4===0){aT(ctx,m,65.41,t2,0.08,0.3);}
  }
}

function playMazeMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/80;
  // Gentle ambient arpeggios
  var notes=[261.63,329.63,392,523.25,392,329.63]; // C major arp
  var notes2=[220,277.18,329.63,440,329.63,277.18]; // Am arp
  for(var i=0;i<60;i++){
    var t=now+i*b*0.25;
    var ns=i<30?notes:notes2;
    aT(ctx,m,ns[i%ns.length],t,0.5,0.1,'triangle');
    // Soft pad every 6 notes
    if(i%6===0){aC(ctx,m,t,[261.63,329.63,392],0.06,1.5,'sine');}
    // Gentle bass
    if(i%6===0){aT(ctx,m,i<30?65.41:55,t,0.8,0.15,'sine');}
  }
}

/* ═══════════════════════════════════════════════════════
   LOTTO MODE
   ═══════════════════════════════════════════════════════ */
function LottoMode(props){
  var names=props.names; var onDone=props.onDone; var onResult=props.onResult||function(){};
  var _ph=useState('idle');var phaseVal=_ph[0];var setPhase=_ph[1];
  var _bs=useState(function(){return names.map(function(){return 'in'})});var ballStates=_bs[0];var setBallStates=_bs[1];
  var _gi=useState(-1);var glowIdx=_gi[0];var setGlowIdx=_gi[1];
  var _el=useState([]);var eliminated=_el[0];var setEliminated=_el[1];
  var _wi=useState(-1);var winnerIdx=_wi[0];var setWinnerIdx=_wi[1];
  var _st=useState('Bereit zur Ziehung');var statusText=_st[0];var setStatusText=_st[1];
  var _rn=useState(0);var roundN=_rn[0];var setRoundN=_rn[1];
  var _cf=useState(false);var showConfetti=_cf[0];var setShowConfetti=_cf[1];
  var _wc=useState(1);var winnerCount=_wc[0];var setWinnerCount=_wc[1];
  var _wns=useState([]);var winners=_wns[0];var setWinners=_wns[1];
  var timers=useRef([]);
  var audioRef=useRef(null);
  function clearT(){timers.current.forEach(clearTimeout);timers.current=[]}
  function later(fn,ms){timers.current.push(setTimeout(fn,ms))}
  useEffect(function(){return function(){clearT();stopAH(audioRef.current);audioRef.current=null;}},[]);
  useEffect(function(){
    function onKey(e){if((e.code==='Space'||e.key===' ')&&phaseVal==='idle'){e.preventDefault();startDraw();}}
    window.addEventListener('keydown',onKey);return function(){window.removeEventListener('keydown',onKey);};
  },[phaseVal]);

  var drumSize=300;
  var ballSize=names.length>20?40:names.length>12?46:52;
  var fontSize=names.length>20?8:names.length>12?9:11;

  var ballPositions=useMemo(function(){
    var cx=drumSize/2;var cy=drumSize/2;var positions=[];
    if(names.length<=1)return[{x:cx-ballSize/2,y:cy-ballSize/2}];
    var placed=0;var ring=0;var rings=[];
    while(placed<names.length){var r=ring===0?0:42+ring*(ballSize+4);var cap=ring===0?1:Math.min(Math.floor(2*Math.PI*r/(ballSize+4)),names.length-placed);rings.push({r:r,cap:cap});placed+=cap;ring++}
    var idx=0;
    for(var ri=0;ri<rings.length;ri++){for(var i=0;i<rings[ri].cap&&idx<names.length;i++){var a=(2*Math.PI*i)/rings[ri].cap-Math.PI/2;var rr=rings[ri].r;positions.push({x:cx+(rr===0?0:rr*Math.cos(a))-ballSize/2,y:cy+(rr===0?0:rr*Math.sin(a))-ballSize/2});idx++}}
    return positions;
  },[names.length,ballSize]);

  function startDraw(){
    if(phaseVal==='running')return;clearT();stopAH(audioRef.current);
    var ah=createAudioCtx();audioRef.current=ah;playLottoMusic(ah);
    var wc=Math.max(1,Math.min(winnerCount,names.length-1));
    var states=names.map(function(){return 'in'});
    setBallStates(states.slice());setEliminated([]);setWinnerIdx(-1);setWinners([]);setGlowIdx(-1);setShowConfetti(false);setPhase('running');setRoundN(0);
    var total=names.length;var elimCount=total-wc;
    var perRound=Math.min(Math.max(700,12000/Math.max(1,elimCount)),2200);
    var remaining=[];for(var k=0;k<total;k++)remaining.push(k);
    var cumElim=[];var t=600;
    for(var step=0;step<elimCount;step++){
      (function(s,rem){
        var leftAfter=rem.length-1;
        var isFinal=leftAfter<=(3+wc-1);
        var isGrandFinale=(leftAfter===wc);
        var roundTime=isGrandFinale?perRound*3:isFinal?perRound*2:perRound;
        var scanCount=Math.min(rem.length,Math.max(3,Math.floor(rem.length/2)));
        if(isFinal)scanCount=Math.max(scanCount,Math.min(rem.length,6));
        var scanGap=Math.min(isFinal?140:90,roundTime*0.3/scanCount);
        var useSuspense=(scanCount>=5);
        for(var sc=0;sc<scanCount;sc++){(function(scIdx){
          var gap=useSuspense&&scIdx>=scanCount-5?scanGap*1.8:scanGap;
          var cumGap=useSuspense?
            (scIdx<scanCount-5?scIdx*scanGap:(scanCount-5)*scanGap+(scIdx-(scanCount-5))*scanGap*1.8):
            scIdx*scanGap;
          later(function(){var ri=Math.floor(Math.random()*rem.length);setGlowIdx(rem[ri])},t+cumGap);
        })(sc)}
        var scanEnd=scanCount*scanGap;
        if(isGrandFinale){later(function(){setStatusText('\u{1F3C6} GRAND FINALE — 3... 2... 1...')},t-400);}
        else if(leftAfter===wc+1){later(function(){setStatusText('\u{1F3C6} FINALE! Wer bleibt?')},t-200);}
        else if(leftAfter<=(wc+3)){later(function(){setStatusText('\u26A1 Nur noch '+(leftAfter+1)+'...')},t-100);}
        var rIdx=Math.floor(Math.random()*rem.length);var victim=rem[rIdx];
        later(function(){setGlowIdx(victim);setRoundN(s+1);setStatusText(names[victim]+' wird gezogen...')},t+scanEnd+100);
        later(function(){setGlowIdx(-1);states[victim]='eject';setBallStates(states.slice());setStatusText(names[victim]+' ist raus!')},t+scanEnd+100+roundTime*0.3);
        later(function(){states[victim]='out';setBallStates(states.slice());cumElim.push({name:names[victim],color:BALL_COLORS[victim%BALL_COLORS.length]});setEliminated(cumElim.slice())},t+scanEnd+100+roundTime*0.3+500);
        rem.splice(rIdx,1);t+=roundTime;
      })(step,remaining);
    }
    // remaining = the winner(s)
    var finalWinner=remaining[0];
    var allWinners=remaining.slice();
    later(function(){
      setGlowIdx(-1);setWinnerIdx(finalWinner);
      setWinners(allWinners.map(function(idx){return names[idx];}));
      setPhase('winner');setShowConfetti(true);
      var winText=wc===1?names[finalWinner]+' gewinnt!':wc+' Gewinner: '+allWinners.map(function(idx){return names[idx];}).join(', ');
      setStatusText(winText);

    },t+800);
  }

  function resetLotto(){clearT();stopAH(audioRef.current);audioRef.current=null;setPhase('idle');setBallStates(names.map(function(){return 'in'}));setEliminated([]);setWinnerIdx(-1);setWinners([]);setGlowIdx(-1);setShowConfetti(false);setRoundN(0);setStatusText('Bereit zur Ziehung')}

  var lights=useMemo(function(){var arr=[];for(var i=0;i<24;i++){var a=(360/24)*i*Math.PI/180;var r=drumSize/2+14;arr.push({id:i,x:drumSize/2+r*Math.cos(a),y:drumSize/2+r*Math.sin(a),color:i%3===0?'#fbbf24':i%3===1?'#8b5cf6':'#3b82f6',delay:i*0.07})}return arr},[]);
  var remainingCount=ballStates.filter(function(s){return s==='in'}).length;

  var posIdx=0;var ballEls=[];
  for(var i=0;i<names.length;i++){
    var st=ballStates[i];if(st==='out')continue;
    var pos=ballPositions[posIdx]||{x:drumSize/2-ballSize/2,y:drumSize/2-ballSize/2};posIdx++;
    var color=BALL_COLORS[i%BALL_COLORS.length];var isGlow=glowIdx===i;var isEject=st==='eject';
    var label=truncName(names[i],7);var animDur=(2.5+(i%5)*0.4)+'s';
    ballEls.push(html`<div key=${i} className=${"lotto-ball"+(isGlow?" glow":"")+(isEject?" ball-eject":"")} style=${{left:pos.x,top:pos.y,width:ballSize,height:ballSize,fontSize:fontSize,background:"radial-gradient(circle at 35% 30%,"+color+"dd,"+color+")",boxShadow:isGlow?undefined:"inset 0 -3px 6px rgba(0,0,0,.3),inset 0 2px 4px rgba(255,255,255,.15),0 2px 8px rgba(0,0,0,.3)",animation:(!isGlow&&!isEject&&st==='in')?("ballFloat "+animDur+" ease-in-out infinite"):undefined,zIndex:isGlow?30:5}}>${label}</div>`);
  }

  return(
    html`<div className="flex flex-col items-center w-full max-w-5xl">
      ${showConfetti&&html`<${Confetti}/>`}
      <div className="text-center mb-4">
        <p role="status" aria-live="polite" className="text-gray-700 text-base font-medium mb-1">${statusText}</p>
        ${phaseVal==='running'&&html`<p className="text-gray-500 text-xs">Runde ${roundN}/${names.length-1} \u00B7 ${remainingCount} in der Trommel</p>`}
      </div>
      <div className="relative mb-6" style=${{width:drumSize+30,height:drumSize+30}}>
        ${lights.map(function(l){return html`<div key=${l.id} className="absolute rounded-full" style=${{left:l.x+15,top:l.y+15,width:5,height:5,backgroundColor:l.color,transform:'translate(-50%,-50%)',opacity:phaseVal==='running'?undefined:0.15,animation:phaseVal==='running'?("lightBlink .5s ease "+l.delay+"s infinite"):"none"}}/>`})}
        <div className="drum-ring" style=${{position:'absolute',left:15,top:15,width:drumSize,height:drumSize}}>${ballEls}</div>
      </div>
      ${winners.length>1?(html`<div className="winner-enter mb-5 w-full max-w-sm">
        <div className="winner-card rounded-2xl px-6 py-5 text-white text-center shadow-2xl border-2 border-amber-400/40" style=${{background:'linear-gradient(135deg,#4c1d95,#1e40af)'}}>
          <div className="text-amber-200 text-sm font-semibold tracking-widest uppercase mb-3">\u{1F3C6} ${winners.length} Gewinner</div>
          <div className="flex flex-wrap gap-2 justify-center mb-2">
            ${winners.map(function(w,i){return html`<span key=${i} className="px-3 py-1 rounded-full font-bold text-sm" style=${{background:BALL_COLORS[i%BALL_COLORS.length]}}>${w}</span>`;})}
          </div>

        </div>
      </div>`):(winnerIdx>=0&&html`<div className="winner-enter mb-5"><div className="winner-card rounded-2xl px-10 py-6 text-white text-center shadow-2xl border-2 border-amber-400/40" style=${{background:"linear-gradient(135deg,"+BALL_COLORS[winnerIdx%BALL_COLORS.length]+"dd,"+BALL_COLORS[winnerIdx%BALL_COLORS.length]+")"}}><div className="text-amber-200 text-sm font-semibold tracking-widest uppercase mb-1">Gewinner</div><div className="text-4xl font-black tracking-tight">${names[winnerIdx]}</div><div className="mt-2 text-2xl">\u{1F389}\u{1F3C6}\u{1F389}</div><${CopyButton} modeName="Lotto-Ziehung" winner=${names[winnerIdx]}/></div></div>`)}
      ${eliminated.length>0&&html`<div className="w-full max-w-sm mb-4"><p className="text-gray-500 text-center mb-1.5" style=${{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em'}}>Gezogen</p><div className="flex flex-wrap gap-1.5 justify-center bg-gray-50 rounded-xl p-2.5 border border-gray-200">${eliminated.map(function(e,i){return html`<div key=${i} className="tray-ball tray-pop" style=${{background:"radial-gradient(circle at 35% 30%,"+e.color+"88,"+e.color+"55)",animationDelay:(i*0.04)+"s"}}>${truncName(e.name,5)}</div>`})}</div></div>`}
      <div className="flex gap-3 mt-2 flex-wrap items-center justify-center">
        ${phaseVal==='idle'&&html`<div className="flex flex-col items-center gap-3">
          <div className="flex items-center gap-3">
            <span className="text-gray-500 text-xs font-medium">Gewinner:</span>
            <button onClick=${function(){setWinnerCount(function(c){return Math.max(1,c-1)})}} disabled=${winnerCount<=1}
              className="w-8 h-8 rounded-full bg-gray-100 border border-gray-300 hover:bg-gray-200 disabled:opacity-40 text-gray-700 font-bold text-lg transition-all">\u2212</button>
            <span className="text-2xl font-black gradient-text w-8 text-center">${winnerCount}</span>
            <button onClick=${function(){setWinnerCount(function(c){return Math.min(names.length-1,c+1)})}} disabled=${winnerCount>=names.length-1}
              className="w-8 h-8 rounded-full bg-gray-100 border border-gray-300 hover:bg-gray-200 disabled:opacity-40 text-gray-700 font-bold text-lg transition-all">+</button>
          </div>
          <button onClick=${startDraw} className="px-8 py-3 rounded-xl font-bold bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 text-white shadow-lg shadow-violet-500/20 transition-all">Ziehung starten</button>
        </div>`}
        ${phaseVal==='winner'&&html`<span><button onClick=${resetLotto} className="px-6 py-3 rounded-xl font-semibold bg-violet-100 text-violet-700 border border-violet-200 hover:bg-violet-200 transition-all mr-3">Nochmal</button><button onClick=${onDone} className="px-6 py-3 rounded-xl font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-200 transition-all">Zur\u00FCck</button></span>`}
      </div>
    </div>`
  );
}


/* ═══════════════════════════════════════════════════════
   BATTLE TOURNAMENT MODE — 2 DUELS PARALLEL
   ═══════════════════════════════════════════════════════ */
function BattleMode(props){
  var names=props.names;var onDone=props.onDone;var onResult=props.onResult||function(){};
  var _ph=useState('idle');var phase=_ph[0];var setPhase=_ph[1];
  // Now support TWO simultaneous matches
  var _m1=useState(null);var match1=_m1[0];var setMatch1=_m1[1];
  var _m2=useState(null);var match2=_m2[0];var setMatch2=_m2[1];
  var _hp=useState({a1:100,b1:100,a2:100,b2:100});var hp=_hp[0];var setHp=_hp[1];
  var _rl=useState('');var roundLabel=_rl[0];var setRoundLabel=_rl[1];
  var _champ=useState(null);var champion=_champ[0];var setChampion=_champ[1];
  var _cf=useState(false);var showConfetti=_cf[0];var setShowConfetti=_cf[1];
  var _vs=useState({s1:false,s2:false});var showVs=_vs[0];var setShowVs=_vs[1];
  var _sk=useState({a1:false,b1:false,a2:false,b2:false});var shakes=_sk[0];var setShakes=_sk[1];
  var _log=useState([]);var fightLog=_log[0];var setFightLog=_log[1];
  var _bk=useState([]);var bracket=_bk[0];var setBracket=_bk[1];
  var _crit=useState(null);var critFlash=_crit[0];var setCritFlash=_crit[1];
  var _df=useState([]);var dmgFloats=_df[0];var setDmgFloats=_df[1];
  var timers=useRef([]);
  var audioRef=useRef(null);

  function clearT(){timers.current.forEach(clearTimeout);timers.current=[]}
  function later(fn,ms){timers.current.push(setTimeout(fn,ms))}
  useEffect(function(){return function(){clearT();stopAH(audioRef.current);}},[]);
  useEffect(function(){
    function onKey(e){if((e.code==='Space'||e.key===' ')&&phase==='idle'){e.preventDefault();startTournament();}}
    window.addEventListener('keydown',onKey);return function(){window.removeEventListener('keydown',onKey);};
  },[phase]);

  function spawnDmgFloat(dmg,isCrit,slotIdx,isA){
    var id=Date.now()+Math.random();
    var xBase=slotIdx===1?25:75;
    var x=xBase+(isA?-8:8)+(Math.random()*6-3);
    var y=20+Math.random()*15;
    var fl={id:id,txt:(isCrit?'\u{1F4A5} ':'')+'−'+dmg,x:x,y:y,crit:isCrit};
    setDmgFloats(function(p){return p.concat([fl])});
    later(function(){setDmgFloats(function(p){return p.filter(function(f){return f.id!==id;});});},850);
  }

  function getRoundName(c){if(c===2)return'Finale';if(c<=4)return'Halbfinale';if(c<=8)return'Viertelfinale';return'Runde ('+c+' Teilnehmer)'}

  function buildBracket(pool){
    var s=shuffle(pool);var matches=[];
    for(var i=0;i<s.length-1;i+=2)matches.push({a:s[i],b:s[i+1],winner:null,state:'pending'});
    if(s.length%2===1)matches.push({a:s[s.length-1],b:null,winner:s[s.length-1],state:'bye'});
    return matches;
  }

  function simulateFight(slot,matchObj,t,log,onDoneCallback){
    // slot = 1 or 2
    var setMatch=slot===1?setMatch1:setMatch2;
    var hpAKey=slot===1?'a1':'a2';var hpBKey=slot===1?'b1':'b2';
    var vsKey='s'+slot;var skAKey='a'+slot;var skBKey='b'+slot;

    if(matchObj.state==='bye'){
      later(function(){
        setMatch({a:matchObj.a,b:null,state:'bye',winner:matchObj.a});
        log.push(matchObj.a+' hat ein Freilos');
        setFightLog(log.slice());
      },t);
      later(function(){onDoneCallback(matchObj.a)},t+600);
      return t+700;
    }

    // Show VS
    later(function(){
      setMatch({a:matchObj.a,b:matchObj.b,state:'fighting',winner:null});
      setHp(function(prev){var n=Object.assign({},prev);n[hpAKey]=100;n[hpBKey]=100;return n});
      setShowVs(function(prev){var n=Object.assign({},prev);n[vsKey]=true;return n});
    },t);
    t+=400;
    later(function(){setShowVs(function(prev){var n=Object.assign({},prev);n[vsKey]=false;return n})},t);
    t+=150;

    var hits=3+Math.floor(Math.random()*3);
    var winnerIsA=Math.random()>0.5;
    var curA=100;var curB=100;

    var hitT=t;
    for(var h=0;h<hits;h++){
      var gap=380+Math.floor(Math.random()*200);
      (function(hi,isLast,hitTime){
        later(function(){
          if(hi%2===0){
            var isCrit=curB<30&&!isLast&&Math.random()<0.4;
            var baseDmg=isLast?(winnerIsA?curB:15+Math.floor(Math.random()*20)):15+Math.floor(Math.random()*20);
            var dmg=isCrit?baseDmg+15+Math.floor(Math.random()*10):baseDmg;
            curB=Math.max(0,curB-dmg);
            if(isLast&&!winnerIsA)curA=0;
            if(isLast&&winnerIsA)curB=0;
            setHp(function(prev){var n=Object.assign({},prev);n[hpAKey]=curA;n[hpBKey]=curB;return n});
            setShakes(function(prev){var n=Object.assign({},prev);n[skBKey]=true;return n});
            spawnDmgFloat(dmg,isCrit,slot,false);
            if(isCrit){setCritFlash({txt:'\u{1F4A5} KRITISCH! \u2212'+dmg,id:Date.now()});later(function(){setCritFlash(null);},900);}
            later(function(){setShakes(function(prev){var n=Object.assign({},prev);n[skBKey]=false;return n})},350);
          }else{
            var isCrit2=curA<30&&!isLast&&Math.random()<0.4;
            var baseDmg2=isLast?(!winnerIsA?curA:15+Math.floor(Math.random()*15)):15+Math.floor(Math.random()*20);
            var dmg2=isCrit2?baseDmg2+15+Math.floor(Math.random()*10):baseDmg2;
            curA=Math.max(0,curA-dmg2);
            if(isLast&&winnerIsA)curB=0;
            if(isLast&&!winnerIsA)curA=0;
            setHp(function(prev){var n=Object.assign({},prev);n[hpAKey]=curA;n[hpBKey]=curB;return n});
            setShakes(function(prev){var n=Object.assign({},prev);n[skAKey]=true;return n});
            spawnDmgFloat(dmg2,isCrit2,slot,true);
            if(isCrit2){setCritFlash({txt:'\u{1F4A5} KRITISCH! \u2212'+dmg2,id:Date.now()});later(function(){setCritFlash(null);},900);}
            later(function(){setShakes(function(prev){var n=Object.assign({},prev);n[skAKey]=false;return n})},350);
          }
        },hitTime);
      })(h,h===hits-1,hitT);
      hitT+=gap;
    }
    t=hitT+250;

    var matchWinner=winnerIsA?matchObj.a:matchObj.b;
    var matchLoser=winnerIsA?matchObj.b:matchObj.a;
    later(function(){
      setMatch({a:matchObj.a,b:matchObj.b,state:'done',winner:matchWinner});
      log.push(matchWinner+' besiegt '+matchLoser);
      setFightLog(log.slice());
    },t);
    later(function(){onDoneCallback(matchWinner)},t+500);
    return t+600;
  }

  function startTournament(){
    clearT();stopAH(audioRef.current);
    var ah=createAudioCtx();audioRef.current=ah;playBattleMusic(ah);
    setChampion(null);setShowConfetti(false);setFightLog([]);setMatch1(null);setMatch2(null);
    var pool=shuffle(names);
    runRound(pool,[]);
  }

  function runRound(pool,logSoFar){
    var bk=buildBracket(pool);
    setBracket(bk);setRoundLabel(getRoundName(pool.length));setPhase('fighting');

    var log=logSoFar.slice();
    var isFinalRound=pool.length===2;
    if(isFinalRound){
      log.push('\u26A1 FINALE! '+pool[0]+' vs '+pool[1]);
      setFightLog(log.slice());
    }
    var updatedBk=bk.map(function(m){return Object.assign({},m)});
    var roundWinners=[];
    var pairsDone=0;
    var totalPairs=bk.length;
    var t=isFinalRound?800:300;

    // Process matches in pairs of 2
    for(var pi=0;pi<bk.length;pi+=2){
      (function(pairStart,currentT){
        var m1=updatedBk[pairStart];
        var m2=pairStart+1<updatedBk.length?updatedBk[pairStart+1]:null;

        var done1=false;var done2=!m2;var w1=null;var w2=null;

        function checkPairDone(){
          if(done1&&done2){
            if(w1)roundWinners.push(w1);
            if(w2)roundWinners.push(w2);
            updatedBk[pairStart].state='done';updatedBk[pairStart].winner=w1;
            if(m2){updatedBk[pairStart+1].state='done';updatedBk[pairStart+1].winner=w2}
            setBracket(updatedBk.map(function(x){return Object.assign({},x)}));
            pairsDone+=(m2?2:1);
            if(pairsDone>=totalPairs){
              later(function(){
                setMatch1(null);setMatch2(null);
                if(roundWinners.length===1){
                  setChampion(roundWinners[0]);setPhase('winner');setShowConfetti(true);onResult(roundWinners[0]);
                  stopAH(audioRef.current);audioRef.current=null;
                  log.push('\u{1F3C6} '+roundWinners[0]+' ist Champion!');setFightLog(log.slice());
                }else{
                  runRound(roundWinners,log);
                }
              },600);
            }
          }
        }

        var endT1=simulateFight(1,m1,currentT,log,function(winner){w1=winner;done1=true;checkPairDone()});
        if(m2){
          simulateFight(2,m2,currentT+100,log,function(winner){w2=winner;done2=true;checkPairDone()});
        }

      })(pi,t);
      // Stagger pairs: estimate time per pair
      var pairMatchCount=(pi+1<bk.length)?2:1;
      t+=3500; // enough for a fight
    }
  }

  function resetBattle(){clearT();stopAH(audioRef.current);audioRef.current=null;setPhase('idle');setChampion(null);setShowConfetti(false);setFightLog([]);setBracket([]);setMatch1(null);setMatch2(null)}

  function renderMatchArena(matchObj,slotIdx){
    if(!matchObj)return null;
    if(!matchObj.b){
      return html`<div className="flex-1 bg-white border border-gray-200 rounded-2xl p-4 text-center">
        <div className=${"inline-block bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(matchObj.a)]+" rounded-xl px-5 py-2 text-white font-bold mb-1"}>${matchObj.a}</div>
        <p className="text-gray-500 text-xs">Freilos</p>
      </div>`;
    }
    var hpAKey=slotIdx===1?'a1':'a2';var hpBKey=slotIdx===1?'b1':'b2';
    var vsKey='s'+slotIdx;var skA=shakes[slotIdx===1?'a1':'a2'];var skB=shakes[slotIdx===1?'b1':'b2'];
    var hpAVal=hp[hpAKey];var hpBVal=hp[hpBKey];

    return(
      html`<div className="flex-1 bg-white border border-gray-200 rounded-2xl p-4 relative overflow-hidden">
        <div className="flex items-center gap-3">
          <div className=${"flex-1 text-center"+(skA?" shake":"")}>
            <div className=${"bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(matchObj.a)]+" rounded-lg p-3 mb-1.5"+(matchObj.winner===matchObj.a?" ring-2 ring-green-400":"")+(matchObj.winner===matchObj.b?" opacity-30 grayscale":"")}>
              <div className="text-white font-bold text-sm truncate">${matchObj.a}</div>
            </div>
            <div className="h-2.5 bg-gray-200 rounded-full overflow-hidden"><div role="progressbar" aria-valuenow=${hpAVal} aria-valuemin=${0} aria-valuemax=${100} aria-label=${matchObj.a+" Lebenspunkte"} className="h-full rounded-full" style=${{width:hpAVal+'%',background:hpAVal>=60?'#22c55e':hpAVal>=30?'#f59e0b':'#ef4444',transition:'width .3s ease-out'}}/></div>
          </div>
          <div className="w-10 text-center flex-shrink-0">
            ${showVs[vsKey]?html`<div className="vs-pop text-xl font-black text-amber-400">VS</div>`:html`<div className="text-lg">\u2694\uFE0F</div>`}
          </div>
          <div className=${"flex-1 text-center"+(skB?" shake":"")}>
            <div className=${"bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(matchObj.b)]+" rounded-lg p-3 mb-1.5"+(matchObj.winner===matchObj.b?" ring-2 ring-green-400":"")+(matchObj.winner===matchObj.a?" opacity-30 grayscale":"")}>
              <div className="text-white font-bold text-sm truncate">${matchObj.b}</div>
            </div>
            <div className="h-2.5 bg-gray-200 rounded-full overflow-hidden"><div role="progressbar" aria-valuenow=${hpBVal} aria-valuemin=${0} aria-valuemax=${100} aria-label=${matchObj.b+" Lebenspunkte"} className="h-full rounded-full" style=${{width:hpBVal+'%',background:hpBVal>=60?'#22c55e':hpBVal>=30?'#f59e0b':'#ef4444',transition:'width .3s ease-out'}}/></div>
          </div>
        </div>
        ${matchObj.state==='done'&&matchObj.winner&&html`<div className="absolute inset-0 flex items-center justify-center bg-white/80 rounded-2xl fade-in"><div className="bg-green-500/20 border border-green-500/30 rounded-lg px-4 py-2 text-green-400 font-bold text-sm">${matchObj.winner} gewinnt!</div></div>`}
      </div>`
    );
  }

  return(
    html`<div className="flex flex-col items-center w-full max-w-4xl">
      ${showConfetti&&html`<${Confetti}/>`}
      ${critFlash&&html`<div key=${critFlash.id} className="event-banner" style=${{background:'rgba(20,10,10,0.9)',border:'2px solid rgba(239,68,68,0.9)',color:'rgba(239,68,68,1)',fontSize:'22px'}}>${critFlash.txt}</div>`}
      ${dmgFloats.map(function(f){return html`<div key=${f.id} className="br-dmg" style=${{position:'fixed',left:f.x+'%',top:f.y+'%',color:f.crit?'#fbbf24':'#ef4444',fontSize:f.crit?'17px':'13px'}}>${f.txt}</div>`;})}

      <div className="text-center mb-4">
        ${roundLabel&&html`<div role="status" aria-live="polite" className="inline-block px-4 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-600 text-sm font-bold mb-2">${roundLabel}</div>`}
      </div>
      ${(match1||match2)&&html`<div className="w-full flex gap-4 mb-5">
        ${renderMatchArena(match1,1)}
        ${renderMatchArena(match2,2)}
      </div>`}
      ${champion&&html`<div className="winner-enter mb-5"><div className=${"winner-card bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(champion)]+" rounded-2xl px-10 py-6 text-white text-center shadow-2xl border-2 border-amber-400/40"}><div className="text-amber-200 text-sm font-semibold tracking-widest uppercase mb-1">Champion</div><div className="text-4xl font-black tracking-tight">${champion}</div><div className="mt-2 text-2xl">\u{1F389}\u{1F3C6}\u{1F389}</div><${CopyButton} modeName="Battle Tournament" winner=${champion}/></div></div>`}
      ${fightLog.length>0&&html`<div className="w-full max-w-md mb-4"><p className="text-gray-500 text-center mb-1.5" style=${{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em'}}>Kampfprotokoll</p><div className="bg-gray-50 rounded-xl p-3 border border-gray-200 max-h-32 overflow-y-auto space-y-1">${fightLog.map(function(entry,i){
        var isChamp=entry.indexOf('\u{1F3C6}')>=0;var isFinale=entry.indexOf('FINALE')>=0||entry.indexOf('FINAL')>=0;
        return html`<div key=${i} className=${"text-xs font-mono "+(isChamp?'text-amber-600 font-bold':isFinale?'text-yellow-600':entry.indexOf('besiegt')>=0?'text-green-600':'text-gray-500')}>${entry}</div>`
      })}</div></div>`}
      ${bracket.length>1&&!champion&&html`<div className="w-full max-w-lg mb-4"><p className="text-gray-500 text-center mb-1.5" style=${{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em'}}>Bracket</p><div className="grid gap-2" style=${{gridTemplateColumns:"repeat("+Math.min(bracket.length,4)+",1fr)"}}>${bracket.map(function(m,i){var bc=m.state==='fighting'?'border-amber-500/40':m.state==='done'?'border-green-500/20':'border-gray-200';return html`<div key=${i} className=${"bg-gray-50 border rounded-lg p-2 text-center text-xs "+bc}><div className=${"font-semibold truncate "+(m.winner===m.a?"text-green-600":m.state==='done'?"text-gray-400":"text-gray-700")}>${m.a}</div>${m.b?html`<span><div className="text-gray-400 my-0.5" style=${{fontSize:10}}>vs</div><div className=${"font-semibold truncate "+(m.winner===m.b?"text-green-600":m.state==='done'?"text-gray-400":"text-gray-700")}>${m.b}</div></span>`:html`<div className="text-gray-400 mt-0.5 italic" style=${{fontSize:10}}>Freilos</div>`}</div>`})}</div></div>`}
      <div className="flex gap-3 mt-2">
        ${phase==='idle'&&html`<button onClick=${startTournament} className="px-8 py-3 rounded-xl font-bold bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white shadow-lg shadow-amber-500/20 transition-all active:scale-95">Turnier starten</button>`}
        ${phase==='winner'&&html`<span><button onClick=${resetBattle} className="px-6 py-3 rounded-xl font-semibold bg-amber-500/20 text-amber-300 border border-amber-500/30 hover:bg-amber-500/30 transition-all mr-3">Nochmal</button><button onClick=${onDone} className="px-6 py-3 rounded-xl font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-200 transition-all">Zurück</button></span>`}
      </div>
    </div>`
  );
}






/* ═══════════════════════════════════════════════════════
   SPIELPLATZ MODE — Horizontaler Parcours mit Zonenkampf
   ═══════════════════════════════════════════════════════ */
function SpielplatzMode(props){

  var _ph=useState('idle');var phase=_ph[0];var setPhase=_ph[1];
  var _winner=useState(null);var winner=_winner[0];var setWinner=_winner[1];
  var _cf=useState(false);var showConfetti=_cf[0];var setShowConfetti=_cf[1];
  var _cd=useState(null);var countdown=_cd[0];var setCountdown=_cd[1];
  var _zm=useState('');var zoneMsg=_zm[0];var setZoneMsg=_zm[1];
  var _an=useState(0);var aliveN=_an[0];var setAliveN=_an[1];
  var canvasRef=useRef(null);
  var audioRef=useRef(null);
  var animRef=useRef(null);
  var gRef=useRef(null);
  var timers=useRef([]);
  function clearT(){timers.current.forEach(clearTimeout);timers.current=[]}
  function later(fn,ms){timers.current.push(setTimeout(fn,ms))}
  useEffect(function(){return function(){clearT();if(animRef.current)cancelAnimationFrame(animRef.current);stopAH(audioRef.current);};},[]);
  useEffect(function(){
    function onKey(e){if((e.code==='Space'||e.key===' ')&&phase==='idle'){e.preventDefault();startRace();}}
    window.addEventListener('keydown',onKey);return function(){window.removeEventListener('keydown',onKey);};
  },[phase]);

  var SPL_AW=900;
  var SPL_ZONES=[
    {name:'Feuerzone',  emoji:'\u{1F525}',xPct:[0.12,0.30],elimRate:0.30,bgColor:'rgba(239,68,68,0.20)',  borderColor:'rgba(239,68,68,0.75)',  flashColor:'rgba(255,80,30,',  labelColor:'#fca5a5',ringColor:'#ef4444',   ambiColor:['#ef4444','#f97316','#fbbf24']},
    {name:'Wasserzone', emoji:'\u{1F30A}',xPct:[0.34,0.51],elimRate:0.25,bgColor:'rgba(59,130,246,0.20)', borderColor:'rgba(59,130,246,0.75)', flashColor:'rgba(30,100,255,', labelColor:'#93c5fd',ringColor:'#3b82f6',   ambiColor:['#3b82f6','#0ea5e9','#38bdf8']},
    {name:'Sturmzone',  emoji:'\u{1F32A}\uFE0F',xPct:[0.55,0.72],elimRate:0.32,bgColor:'rgba(148,163,184,0.22)',borderColor:'rgba(148,163,184,0.75)',flashColor:'rgba(140,160,180,',labelColor:'#cbd5e1',ringColor:'#94a3b8',ambiColor:['#94a3b8','#cbd5e1','#ffffff']},
    {name:'Minenfeld',  emoji:'\u{1F4A3}',xPct:[0.76,0.91],elimRate:1.00,bgColor:'rgba(5,5,18,0.50)',     borderColor:'rgba(239,68,68,0.65)',  flashColor:'rgba(239,68,68,',  labelColor:'#f87171',ringColor:'#ef4444',   ambiColor:['#fbbf24','#ef4444','#dc2626']},
  ];
  var ZONE_TIMES=[3500,7000,10500,13500];

  function splRR(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function startRace(){
    clearT();if(animRef.current)cancelAnimationFrame(animRef.current);
    stopAH(audioRef.current);
    var ah=createAudioCtx();audioRef.current=ah;
    playObstacleMusic(ah);
    setWinner(null);setShowConfetti(false);setZoneMsg('');setAliveN(names.length);setPhase('countdown');

    var n=names.length;
    var charH=n<=10?34:n<=20?27:20;
    var AH=Math.max(280,n*charH+80);
    if(canvasRef.current){canvasRef.current.height=AH;}
    var finishX=SPL_AW*0.92;
    var startX=60;
    var winIdx=Math.floor(Math.random()*n);

    var chars=names.map(function(name,i){
      var tt=n===1?0.5:i/(n-1);
      var laneY=40+tt*(AH-80);
      var isWin=i===winIdx;
      return {
        id:i,name:name,
        color:BALL_COLORS[i%BALL_COLORS.length],
        x:startX,laneY:laneY,
        wobble:Math.random()*Math.PI*2,
        wobbleSpd:0.045+Math.random()*0.045,
        speed:0.78+Math.random()*0.04,
        alive:true,elimT:0,elimEmoji:'\u{1F4A5}',
        trail:[],
      };
    });

    gRef.current={
      chars:chars,n:n,AH:AH,charH:charH,
      winIdx:winIdx,finishX:finishX,
      done:false,
      activeZone:null,zoneFlashT:0,
      particles:[],
      shockwaves:[],
      raceX:startX,
      mineActive:false,
    };

    var CDOffset=3300;
    setCountdown(3);
    later(function(){setCountdown(2);},900);
    later(function(){setCountdown(1);},1800);
    later(function(){setCountdown('LOS! \u{1F3C3}');},2700);
    later(function(){setCountdown(null);setPhase('racing');splStartLoop();},CDOffset);

    for(var zi=0;zi<SPL_ZONES.length;zi++){
      (function(zIdx){
        var zone=SPL_ZONES[zIdx];
        later(function(){
          var g=gRef.current;if(!g||g.done)return;
          setZoneMsg(zone.emoji+' '+zone.name+' schlägt zu!');
          g.activeZone=zIdx;g.zoneFlashT=0;
          if(zIdx===3) g.mineActive=true;
          // Shockwave ring from zone center
          var zCx=(zone.xPct[0]+zone.xPct[1])/2*SPL_AW;
          var zMaxR=Math.max(g.AH*0.75,(zone.xPct[1]-zone.xPct[0])*SPL_AW*0.9);
          g.shockwaves.push({x:zCx,y:g.AH/2,r:10,maxR:zMaxR,alpha:0.95,color:zone.ringColor,speed:zMaxR/52,t:0});
          // Second delayed ring
          later(function(){
            var g2=gRef.current;if(!g2||g2.done)return;
            g2.shockwaves.push({x:zCx,y:g2.AH/2,r:5,maxR:zMaxR*0.7,alpha:0.7,color:zone.ringColor,speed:zMaxR*0.7/40,t:0});
          },200);
        },CDOffset+ZONE_TIMES[zIdx]);

        later(function(){
          var g=gRef.current;if(!g||g.done)return;
          var alive=g.chars.filter(function(c){return c.alive;});
          var nonWin=alive.filter(function(c){return c.id!==g.winIdx;});
          var toKill;
          if(zIdx===3){toKill=nonWin;}
          else{var kc=Math.max(1,Math.round(nonWin.length*zone.elimRate));toKill=shuffle(nonWin.slice()).slice(0,Math.min(kc,nonWin.length));}
          for(var ki=0;ki<toKill.length;ki++){
            var vc=toKill[ki];
            vc.alive=false;vc.elimT=0;vc.elimEmoji=zone.emoji;
            // Character-colored burst
            for(var pi=0;pi<18;pi++){
              var ang=Math.random()*Math.PI*2;
              var spd=1.8+Math.random()*3.5;
              g.particles.push({x:vc.x,y:vc.laneY,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1.0,life:35+Math.random()*15,maxLife:50,color:vc.color,size:2.5+Math.random()*2.5,gravity:0.09});
            }
            // Zone-color sparks
            for(var si=0;si<10;si++){
              var ang2=Math.random()*Math.PI*2;var spd2=2.5+Math.random()*3;
              var ac=zone.ambiColor[Math.floor(Math.random()*zone.ambiColor.length)];
              g.particles.push({x:vc.x,y:vc.laneY,vx:Math.cos(ang2)*spd2,vy:Math.sin(ang2)*spd2-1.5,life:20+Math.random()*15,maxLife:35,color:ac,size:1.5+Math.random()*2,gravity:0.06});
            }
          }
          var leftAlive=g.chars.filter(function(c){return c.alive;}).length;
          setAliveN(leftAlive);
          (function(killed,left,ze){
            setZoneMsg(ze.emoji+' '+killed+' eliminiert! Noch '+left+' im Rennen');
            later(function(){setZoneMsg('');},2200);
          })(toKill.length,leftAlive,zone);
        },CDOffset+(zIdx===3?15600:ZONE_TIMES[zIdx]+800));
      })(zi);
    }

    later(function(){
      var g=gRef.current;if(!g)return;
      g.done=true;
      var wName=names[g.winIdx];
      var wc=g.chars[g.winIdx];
      // Golden finish burst
      if(wc){
        for(var pi=0;pi<35;pi++){
          var ang=Math.random()*Math.PI*2;var spd=2+Math.random()*5;
          var gc=['#fbbf24','#f59e0b','#fde68a','#fff'];
          g.particles.push({x:g.finishX,y:wc.laneY,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2.5,life:55+Math.random()*25,maxLife:80,color:gc[Math.floor(Math.random()*gc.length)],size:2.5+Math.random()*3,gravity:0.04});
        }
      }
      later(function(){if(animRef.current)cancelAnimationFrame(animRef.current);},900);
      setPhase('winner');setWinner(wName);setShowConfetti(true);setZoneMsg('');onResult(wName);
      stopAH(audioRef.current);audioRef.current=null;
    },CDOffset+16700);
  }

  function splStartLoop(){
    var g=gRef.current;if(!g)return;
    var lastT=performance.now();
    function loop(now){
      var gg=gRef.current;if(!gg)return;
      var dt=Math.min(3,(now-lastT)/16.67);lastT=now;
      splUpdate(gg,dt);splDraw(gg);
      animRef.current=requestAnimationFrame(loop);
    }
    animRef.current=requestAnimationFrame(loop);
  }

  function splUpdate(g,dt){
    // Ambient zone particles
    if(g.activeZone!==null&&g.activeZone<3){
      var az2=SPL_ZONES[g.activeZone];
      var azx1b=az2.xPct[0]*SPL_AW,azx2b=az2.xPct[1]*SPL_AW;
      if(Math.random()<0.5*dt){
        var ac2=az2.ambiColor[Math.floor(Math.random()*az2.ambiColor.length)];
        if(g.activeZone===0){ // fire: embers float UP
          g.particles.push({x:azx1b+Math.random()*(azx2b-azx1b),y:g.AH-Math.random()*25,vx:(Math.random()-0.5)*0.8,vy:-(0.8+Math.random()*2.0),life:22+Math.random()*18,maxLife:40,color:ac2,size:1.5+Math.random()*2.0,gravity:-0.02,ambient:true});
        } else if(g.activeZone===1){ // water: drops drift right
          g.particles.push({x:azx1b+Math.random()*15,y:Math.random()*g.AH,vx:1.0+Math.random()*1.5,vy:(Math.random()-0.5)*0.5,life:18+Math.random()*12,maxLife:30,color:ac2,size:1.5+Math.random()*2.5,gravity:0,ambient:true});
        } else if(g.activeZone===2){ // storm: swirling dust
          g.particles.push({x:azx1b+Math.random()*(azx2b-azx1b),y:Math.random()*g.AH,vx:(Math.random()-0.5)*3.0,vy:(Math.random()-0.5)*3.0,life:12+Math.random()*12,maxLife:24,color:ac2,size:1+Math.random()*2,gravity:0,ambient:true});
        }
      }
    }
    // Subtle persistent fire embers in fire zone always
    var fz0=SPL_ZONES[0];
    if(Math.random()<0.10*dt){
      var fzx1=fz0.xPct[0]*SPL_AW,fzx2=fz0.xPct[1]*SPL_AW;
      g.particles.push({x:fzx1+Math.random()*(fzx2-fzx1),y:g.AH-5,vx:(Math.random()-0.5)*0.5,vy:-(0.4+Math.random()*0.9),life:14+Math.random()*12,maxLife:26,color:Math.random()<0.5?'rgba(239,68,68,0.7)':'rgba(249,115,22,0.6)',size:1+Math.random()*1.5,gravity:-0.01,ambient:true});
    }

    // Update particles
    for(var pi=g.particles.length-1;pi>=0;pi--){
      var p=g.particles[pi];
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      p.vy+=(p.gravity||0)*dt;
      p.life-=dt;
      if(p.life<=0)g.particles.splice(pi,1);
    }

    // Update shockwaves
    for(var si=g.shockwaves.length-1;si>=0;si--){
      var sw=g.shockwaves[si];
      sw.r+=sw.speed*dt;
      sw.t+=dt;
      sw.alpha=Math.max(0,0.95*(1-sw.t/52));
      if(sw.alpha<0.01)g.shockwaves.splice(si,1);
    }

    // Global race progress — ALL alive chars share this x before the minefield
    g.raceX=Math.min(g.finishX,g.raceX+0.80*dt);
    var minePassed=g.mineActive;

    // Update characters + trails
    for(var i=0;i<g.chars.length;i++){
      var c=g.chars[i];
      c.wobble+=c.wobbleSpd*dt;
      var tcy=c.laneY+Math.sin(c.wobble)*2.8;
      if(c.alive){
        if(minePassed){
          // Minenfeld: winner rockets ahead, others crawl
          var mineSpd=c.id===g.winIdx?0.80*2.2:0.80*0.20;
          c.x+=mineSpd*dt;
          if(c.x>g.finishX)c.x=g.finishX;
        } else {
          // Vor dem Minenfeld: exakt synchron
          c.x=g.raceX;
        }
        c.trail.push({x:c.x,y:tcy});
        if(c.trail.length>10)c.trail.shift();
      } else {
        c.elimT+=dt*0.04;
        c.trail=[];
      }
    }

    if(g.activeZone!==null){
      g.zoneFlashT+=dt;
      if(g.zoneFlashT>180)g.activeZone=null;
    }
  }

  function splDraw(g){
    var canvas=canvasRef.current;if(!canvas)return;
    var ctx=canvas.getContext('2d');
    var AH=g.AH;var charH=g.charH;
    ctx.clearRect(0,0,SPL_AW,AH);

    // Track background
    var bgGrd=ctx.createLinearGradient(0,0,SPL_AW,0);
    bgGrd.addColorStop(0,'#08101e');bgGrd.addColorStop(0.5,'#0d1829');bgGrd.addColorStop(1,'#08101e');
    ctx.fillStyle=bgGrd;ctx.fillRect(0,0,SPL_AW,AH);

    // Lane stripes
    for(var li=0;li<g.chars.length;li++){
      ctx.fillStyle=li%2===0?'rgba(255,255,255,0.013)':'rgba(255,255,255,0.030)';
      ctx.fillRect(0,g.chars[li].laneY-charH/2,SPL_AW,charH);
    }

    // Zone backgrounds with soft edge fade
    for(var zi=0;zi<SPL_ZONES.length;zi++){
      var z=SPL_ZONES[zi];
      var zx1=z.xPct[0]*SPL_AW,zx2=z.xPct[1]*SPL_AW;
      ctx.fillStyle=z.bgColor;ctx.fillRect(zx1,0,zx2-zx1,AH);
      // Soft fade at edges
      var gL=ctx.createLinearGradient(zx1,0,zx1+18,0);
      gL.addColorStop(0,'rgba(0,0,0,0)');gL.addColorStop(1,z.bgColor);
      ctx.fillStyle=gL;ctx.fillRect(zx1,0,18,AH);
      var gR=ctx.createLinearGradient(zx2-18,0,zx2,0);
      gR.addColorStop(0,z.bgColor);gR.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gR;ctx.fillRect(zx2-18,0,18,AH);
      // Border glow lines
      ctx.shadowColor=z.ringColor;ctx.shadowBlur=6;
      ctx.strokeStyle=z.borderColor;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(zx1,0);ctx.lineTo(zx1,AH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(zx2,0);ctx.lineTo(zx2,AH);ctx.stroke();
      ctx.shadowBlur=0;
      // Zone label
      ctx.fillStyle=z.labelColor;ctx.font='bold 10px Inter,sans-serif';ctx.textAlign='center';
      ctx.fillText(z.emoji+' '+z.name,(zx1+zx2)/2,15);
    }

    // Active zone flash overlay
    if(g.activeZone!==null){
      var azf=SPL_ZONES[g.activeZone];
      var azfx1=azf.xPct[0]*SPL_AW,azfx2=azf.xPct[1]*SPL_AW;
      var fa=Math.max(0,0.45*(1-g.zoneFlashT/180))*(0.55+0.45*Math.sin(g.zoneFlashT*1.1));
      ctx.globalAlpha=fa;
      ctx.fillStyle=azf.flashColor+'0.9)';
      ctx.fillRect(azfx1,0,azfx2-azfx1,AH);
      ctx.globalAlpha=1.0;
      // Horizontal scanline sweep during flash
      if(g.zoneFlashT<60){
        var scanY=(g.zoneFlashT/60)*AH;
        ctx.globalAlpha=fa*0.6;
        ctx.fillStyle=azf.flashColor+'0.5)';
        ctx.fillRect(azfx1,scanY-6,azfx2-azfx1,12);
        ctx.globalAlpha=1.0;
      }
    }

    // Shockwave rings
    for(var si=0;si<g.shockwaves.length;si++){
      var sw=g.shockwaves[si];
      ctx.globalAlpha=sw.alpha;
      ctx.strokeStyle=sw.color;ctx.lineWidth=3.5;
      ctx.shadowColor=sw.color;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);ctx.stroke();
      if(sw.r>25){
        ctx.lineWidth=1.5;ctx.globalAlpha=sw.alpha*0.45;
        ctx.beginPath();ctx.arc(sw.x,sw.y,sw.r*0.65,0,Math.PI*2);ctx.stroke();
      }
      ctx.shadowBlur=0;ctx.globalAlpha=1.0;
    }

    // START label
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='bold 10px Inter,sans-serif';ctx.textAlign='center';
    ctx.fillText('START',SPL_AW*0.06,15);

    // Finish line with golden glow
    var fx=g.finishX;
    ctx.shadowColor='rgba(251,191,36,0.7)';ctx.shadowBlur=14;
    ctx.strokeStyle='rgba(251,191,36,0.95)';ctx.lineWidth=3;
    ctx.setLineDash([9,5]);
    ctx.beginPath();ctx.moveTo(fx,0);ctx.lineTo(fx,AH);ctx.stroke();
    ctx.setLineDash([]);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(251,191,36,0.95)';ctx.font='bold 10px Inter,sans-serif';ctx.textAlign='center';
    ctx.fillText('\u{1F3C6} ZIEL',fx,15);

    // Character trails
    for(var ci=0;ci<g.chars.length;ci++){
      var c=g.chars[ci];
      if(c.trail.length<2)continue;
      var cw=Math.min(42,charH*1.7);var ch2=Math.max(13,charH*0.72);
      for(var ti=0;ti<c.trail.length-1;ti++){
        var tRatio=ti/c.trail.length;
        ctx.globalAlpha=tRatio*0.30;
        ctx.fillStyle=c.color;
        var tw=cw*(0.45+0.55*tRatio);var th=ch2*(0.45+0.55*tRatio);
        splRR(ctx,c.trail[ti].x-tw/2,c.trail[ti].y-th/2,tw,th,2);
        ctx.fill();
      }
      ctx.globalAlpha=1.0;
    }

    // Characters
    for(var ci=0;ci<g.chars.length;ci++){
      var c=g.chars[ci];
      if(!c.alive&&c.elimT>1.5)continue;
      var cy=c.laneY+(c.alive?Math.sin(c.wobble)*2.8:0);
      var alpha=c.alive?1.0:Math.max(0,1.0-c.elimT*0.67);
      var cw=Math.min(42,charH*1.7);var ch2=Math.max(13,charH*0.72);
      ctx.globalAlpha=alpha;
      // Winner glow — only in minefield (when they're actually ahead)
      var winInMine=c.id===g.winIdx&&c.alive&&g.mineActive;
      if(winInMine){
        var gp=0.6+0.4*Math.sin(Date.now()/280);
        ctx.shadowColor=c.color;ctx.shadowBlur=14*gp;
      }
      ctx.fillStyle=c.color;
      splRR(ctx,c.x-cw/2,cy-ch2/2,cw,ch2,4);
      ctx.fill();
      ctx.shadowBlur=0;
      // Highlight shine
      ctx.fillStyle='rgba(255,255,255,0.22)';
      splRR(ctx,c.x-cw/2+2,cy-ch2/2+2,cw-4,ch2*0.38,2);
      ctx.fill();
      // Name
      ctx.fillStyle='#fff';
      ctx.font='bold '+(charH<=20?8:charH<=27?9:10)+'px Inter,sans-serif';
      ctx.textAlign='center';
      var dn=c.name.length>9?c.name.slice(0,8)+'\u2026':c.name;
      ctx.fillText(dn,c.x,cy+3);
      // Elimination emoji float
      if(!c.alive&&c.elimT<1.0){
        ctx.font='16px sans-serif';
        ctx.globalAlpha=Math.max(0,(1-c.elimT)*alpha);
        ctx.fillText(c.elimEmoji,c.x,cy-ch2/2-7-c.elimT*22);
      }
      ctx.globalAlpha=1.0;ctx.shadowBlur=0;
    }

    // Particles (rendered on top of everything)
    for(var pi=0;pi<g.particles.length;pi++){
      var p=g.particles[pi];
      var palpha=Math.max(0,p.life/p.maxLife);
      ctx.globalAlpha=palpha;
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.4,p.size*palpha),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1.0;
  }

  function resetRace(){
    clearT();if(animRef.current)cancelAnimationFrame(animRef.current);
    stopAH(audioRef.current);audioRef.current=null;gRef.current=null;
    setPhase('idle');setWinner(null);setShowConfetti(false);setCountdown(null);setZoneMsg('');setAliveN(0);
  }

  return(
    html`<div className="flex flex-col items-center w-full max-w-5xl screen-enter">
      ${showConfetti&&html`<${Confetti}/>`}

      <div className="text-center mb-3">
        <h2 className="text-2xl font-black mb-1" style=${{background:'linear-gradient(90deg,#f97316,#ef4444,#8b5cf6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>\u{1F3D7}\uFE0F Spielplatz-Parcours</h2>
        ${zoneMsg&&html`<div role="status" aria-live="polite" className="text-base font-bold text-amber-500 mt-1">${zoneMsg}</div>`}
        ${phase==='racing'&&!zoneMsg&&html`<p className="text-gray-500 text-sm mt-1">${aliveN} von ${names.length} noch im Rennen</p>`}
        ${phase==='idle'&&html`<p className="text-gray-500 text-sm mt-1">${names.length} Teilnehmer \u2014 4 gnadenlose Zonen warten</p>`}
      </div>

      ${countdown!==null&&html`
        <div className="text-7xl font-black gradient-text countdown-pop text-center mb-4" style=${{minWidth:'120px'}}>${countdown}</div>
      `}

      <div className="w-full rounded-2xl overflow-hidden mb-4" style=${{border:'1px solid rgba(255,255,255,0.08)',background:'#08101e',boxShadow:'0 24px 70px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.05)'}}>
        <canvas ref=${canvasRef} width=${SPL_AW} height=${280} style=${{width:'100%',display:'block'}}/>
      </div>

      ${phase==='winner'&&winner&&html`
        <div className="winner-enter mb-4 w-full flex justify-center">
          <div className=${"winner-card bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(winner)]+" rounded-2xl px-10 py-6 text-white text-center shadow-2xl border-2 border-amber-400/40"}>
            <div className="text-amber-200 text-sm font-semibold tracking-widest uppercase mb-1">\u{1F3D7}\uFE0F Spielplatz-Sieger</div>
            <div className="text-4xl font-black tracking-tight">${winner}</div>
            <div className="mt-2 text-2xl">\u{1F389}\u{1F3C6}\u{1F389}</div>
            <${CopyButton} modeName="Spielplatz-Parcours" winner=${winner}/>
          </div>
        </div>
