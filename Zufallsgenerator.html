<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beneschgenerator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } } };
    </script>
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{font-family:'Inter',system-ui,sans-serif;margin:0}
      .gradient-text{background:linear-gradient(90deg,#a78bfa,#60a5fa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
      @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.fade-in-up{animation:fadeInUp .5s ease forwards}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}.fade-in{animation:fadeIn .4s ease forwards}
      .cb-present{accent-color:#8b5cf6;width:18px;height:18px;cursor:pointer}
      @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
      .confetti-piece{position:fixed;top:-20px;z-index:50;pointer-events:none;animation:confettiFall linear forwards}
      @keyframes winnerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}.winner-card{animation:winnerPulse 1.5s ease-in-out infinite}
      @keyframes winnerEnter{0%{opacity:0;transform:scale(.3)}60%{transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}.winner-enter{animation:winnerEnter .6s cubic-bezier(.34,1.56,.64,1) forwards}

      /* LOTTO */
      .drum-ring{border-radius:50%;border:3px solid rgba(139,92,246,.12);background:radial-gradient(circle at 38% 38%,#1e1b4b,#0c0820 75%);box-shadow:inset 0 0 50px rgba(139,92,246,.08),0 0 60px rgba(139,92,246,.06);overflow:hidden;position:relative}
      .lotto-ball{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);user-select:none;text-align:center;line-height:1.1;padding:0 3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:box-shadow .3s,filter .3s}
      .lotto-ball.glow{box-shadow:0 0 24px rgba(251,191,36,.6),0 0 48px rgba(251,191,36,.3)!important;filter:brightness(1.3);z-index:30!important}
      @keyframes ballFloat{0%,100%{transform:translate(0,0)}25%{transform:translate(5px,-4px)}50%{transform:translate(-3px,5px)}75%{transform:translate(4px,2px)}}
      @keyframes ballEject{0%{opacity:1;transform:scale(1)}40%{opacity:1;transform:scale(1.4) translateY(-30px)}100%{opacity:0;transform:scale(.4) translateY(-120px)}}
      .ball-eject{animation:ballEject .5s cubic-bezier(.4,0,.2,1) forwards}
      .tray-ball{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:rgba(255,255,255,.45);opacity:.5;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 2px;text-align:center;line-height:1.1}
      @keyframes trayPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:.5}}.tray-pop{animation:trayPop .35s cubic-bezier(.34,1.56,.64,1) forwards}
      @keyframes lightBlink{0%,100%{opacity:.15}50%{opacity:.9}}

      /* BATTLE */
      @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}.shake{animation:shake .4s ease-in-out}
      @keyframes vsPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}.vs-pop{animation:vsPop .4s cubic-bezier(.34,1.56,.64,1) forwards}

      /* OBSTACLE COURSE */
      .race-grid{display:grid;gap:2px;width:100%}
      .race-cell{position:relative;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all .5s cubic-bezier(.4,0,.2,1)}
      .race-cell .cell-name{position:relative;z-index:3;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);transition:opacity .4s,transform .4s}
      .race-cell.eliminated .cell-name{opacity:.2;transform:scale(.7)}
      .race-cell.eliminated{filter:grayscale(.6) brightness(.5)}

      /* Obstacle overlay that sweeps across the grid */
      .obs-overlay{position:absolute;inset:0;z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:center;border-radius:12px;overflow:hidden}

      /* Fire */
      @keyframes fireFlicker{0%,100%{opacity:.85;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.1)}}
      .obs-fire{background:linear-gradient(0deg,#ef4444 0%,#f97316 40%,#fbbf24 70%,transparent 100%);animation:fireFlicker .3s ease-in-out infinite}
      .obs-fire::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(239,68,68,.6),transparent 70%)}

      /* Water wave */
      @keyframes waveSweep{0%{transform:translateX(-110%)}100%{transform:translateX(110%)}}
      .obs-water{overflow:hidden}
      .obs-water-inner{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(59,130,246,.7) 30%,rgba(14,165,233,.8) 50%,rgba(59,130,246,.7) 70%,transparent);animation:waveSweep 1.2s cubic-bezier(.4,0,.2,1) forwards}

      /* Lightning */
      @keyframes lightningFlash{0%{opacity:0}10%{opacity:1}20%{opacity:.2}30%{opacity:1}50%{opacity:0}100%{opacity:0}}
      .obs-lightning{background:rgba(250,204,21,.15)}
      .obs-lightning::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(250,204,21,.9) 45%,rgba(250,204,21,.9) 48%,transparent 52%,transparent 58%,rgba(250,204,21,.7) 60%,rgba(250,204,21,.7) 63%,transparent 65%);animation:lightningFlash .8s ease forwards}

      /* Ice */
      @keyframes iceSpread{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
      .obs-ice{background:radial-gradient(circle,rgba(147,197,253,.6),rgba(59,130,246,.2) 70%,transparent);animation:iceSpread .5s ease forwards;backdrop-filter:blur(2px)}

      /* Tornado */
      @keyframes tornadoSpin{0%{transform:translateX(-80%) rotate(0deg)}100%{transform:translateX(80%) rotate(720deg)}}
      @keyframes tornadoFunnel{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.7)}}
      .obs-tornado{overflow:hidden}
      .obs-tornado-inner{position:absolute;width:50%;height:140%;top:-20%;background:conic-gradient(from 0deg,rgba(148,163,184,.7),rgba(100,116,139,.3),rgba(148,163,184,.8),rgba(100,116,139,.2),rgba(148,163,184,.7));border-radius:50%;animation:tornadoSpin 1.5s cubic-bezier(.4,0,.2,1) forwards;filter:blur(2px)}
      .obs-tornado::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,transparent 30%,rgba(15,23,42,.3) 100%)}

      /* Minefield */
      @keyframes mineExplode{0%{transform:scale(0);opacity:0}40%{transform:scale(1.5);opacity:1}100%{transform:scale(2);opacity:0}}
      .obs-mine{background:rgba(239,68,68,.1)}
      .mine-boom{position:absolute;border-radius:50%;background:radial-gradient(circle,#fbbf24,#ef4444,transparent);animation:mineExplode .6s ease forwards}

      /* Snowstorm */
      @keyframes snowSwirl{0%{transform:translate(-50%,-50%) rotate(0);opacity:0}20%{opacity:.8}80%{opacity:.8}100%{transform:translate(50%,50%) rotate(180deg);opacity:0}}
      .obs-snow{background:rgba(186,230,253,.1);backdrop-filter:blur(1px)}
      .snowflake{position:absolute;color:#e0f2fe;font-size:14px;animation:snowSwirl 1.2s linear forwards;pointer-events:none}

      /* Slime */
      @keyframes slimeDrip{0%{transform:scaleY(0);transform-origin:top}100%{transform:scaleY(1);transform-origin:top}}
      .obs-slime{background:linear-gradient(180deg,rgba(34,197,94,.5),rgba(22,163,74,.7));animation:slimeDrip .6s ease forwards}

      /* Elimination splat on cell */
      @keyframes cellSplat{0%{transform:scale(0);opacity:1}50%{transform:scale(1.8);opacity:1}100%{transform:scale(2);opacity:0}}
      .cell-splat{position:absolute;z-index:5;font-size:28px;pointer-events:none;animation:cellSplat .7s ease forwards}

      /* GROUP MODES */
      @keyframes namePop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
      .name-pop{animation:namePop .3s cubic-bezier(.34,1.56,.64,1) forwards}
      @keyframes coinPop{0%{transform:translateX(-50%) scale(0);opacity:1}50%{transform:translateX(-50%) translateY(-44px) scale(1.3);opacity:1}100%{transform:translateX(-50%) translateY(-88px) scale(0.6);opacity:0}}
      .mario-coin{position:absolute;font-size:20px;pointer-events:none;animation:coinPop 0.75s ease-out forwards;z-index:20}
    </style>
</head>

<script type="text/babel">
var useState = React.useState;
var useRef = React.useRef;
var useCallback = React.useCallback;
var useEffect = React.useEffect;
var useMemo = React.useMemo;

var STORAGE_KEY = 'randomPicker_lists';
var BALL_COLORS = ['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#6366f1','#14b8a6','#f97316','#e11d48','#a855f7','#0ea5e9','#22c55e','#eab308','#f43f5e'];
var CARD_COLORS = [
  'from-violet-600 to-purple-700','from-blue-600 to-cyan-700','from-emerald-600 to-teal-700',
  'from-amber-600 to-orange-700','from-rose-600 to-pink-700','from-indigo-600 to-blue-700',
  'from-lime-600 to-green-700','from-fuchsia-600 to-purple-700','from-sky-600 to-blue-700',
  'from-red-600 to-rose-700','from-teal-600 to-cyan-700','from-yellow-600 to-amber-700',
];
/* old obstacle constants removed — now using OBS_TYPES array in ObstacleMode */
var GROUP_COLORS=[
  {bg:'from-violet-600 to-purple-700',light:'#8b5cf6'},
  {bg:'from-blue-600 to-cyan-700',light:'#3b82f6'},
  {bg:'from-emerald-600 to-teal-700',light:'#10b981'},
  {bg:'from-amber-600 to-orange-700',light:'#f59e0b'},
  {bg:'from-rose-600 to-pink-700',light:'#ef4444'},
  {bg:'from-indigo-500 to-blue-600',light:'#6366f1'},
  {bg:'from-lime-600 to-green-700',light:'#84cc16'},
  {bg:'from-fuchsia-600 to-purple-700',light:'#d946ef'},
  {bg:'from-sky-600 to-blue-700',light:'#0ea5e9'},
  {bg:'from-red-600 to-rose-700',light:'#e11d48'},
];

function loadLists(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){return[]}}
function saveLists(l){localStorage.setItem(STORAGE_KEY,JSON.stringify(l))}
function shuffle(arr){var b=arr.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=b[i];b[i]=b[j];b[j]=tmp}return b}
function nameToColorIdx(name){var h=0;for(var i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);return Math.abs(h)%CARD_COLORS.length}
function truncName(name,max){return name.length>max?name.slice(0,max-1)+'..':name}

/* ═══ Shared Audio Helpers ═══ */
function createAudioCtx(){
  try{
    var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;
    var ctx=new AC();ctx.resume();
    var master=ctx.createGain();master.gain.value=0.45;master.connect(ctx.destination);
    return{ctx:ctx,master:master};
  }catch(e){return null;}
}
function aT(ctx,dest,freq,t,dur,vol,type){
  if(!freq||!ctx||!dest)return;
  var o=ctx.createOscillator();o.type=type||'sine';o.frequency.value=freq;
  var g=ctx.createGain();g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(dest);o.start(t);o.stop(t+dur+0.05);
}
function aC(ctx,dest,t,freqs,vol,dur,type){freqs.forEach(function(f,fi){aT(ctx,dest,f,t+fi*0.02,dur,vol,type);});}
function stopAH(ah){
  if(!ah||!ah.ctx)return;
  try{
    ah.master.gain.setValueAtTime(ah.master.gain.value,ah.ctx.currentTime);
    ah.master.gain.linearRampToValueAtTime(0,ah.ctx.currentTime+0.6);
    setTimeout(function(){try{ah.ctx.close();}catch(e){}},700);
  }catch(e){}
}

function playLottoMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=0.5;
  for(var i=0;i<50;i++){
    var t=now+i*b;
    // Ticking clock bass
    aT(ctx,m,82.41,t,0.08,0.4); // E2
    if(i%2===1)aT(ctx,m,110,t,0.06,0.25); // A2 off-beat
    // Rising tension every 4 beats
    if(i%4===0){var rise=Math.min(1,i/40);aT(ctx,m,220+rise*220,t,0.3,0.12+rise*0.1,'triangle');}
    // Suspense chord every 8 beats
    if(i%8===0&&i>0){aC(ctx,m,t,[164.81,196,246.94],0.1,0.8,'triangle');} // Em
    // Dramatic build
    if(i>30){aT(ctx,m,55,t+0.25,0.1,0.2+((i-30)/20)*0.3);}
  }
}

function playBattleMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/140;
  for(var i=0;i<120;i++){
    var t=now+i*b*0.5;
    // Heavy kick drum
    if(i%4===0){aT(ctx,m,50,t,0.15,0.6);aT(ctx,m,35,t+0.01,0.1,0.4);}
    // Snare on 2 and 4
    if(i%4===2){
      var buf=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate);var d=buf.getChannelData(0);
      for(var si=0;si<d.length;si++)d[si]=(Math.random()*2-1)*0.3;
      var src=ctx.createBufferSource();src.buffer=buf;var ng=ctx.createGain();
      ng.gain.setValueAtTime(0.35,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      src.connect(ng);ng.connect(m);src.start(t);
    }
    // Power chord stabs Em (E-B-E)
    if(i%16===0){aC(ctx,m,t,[82.41,123.47,164.81],0.2,0.5,'sawtooth');}
    if(i%16===8){aC(ctx,m,t,[98,146.83,196],0.15,0.4,'sawtooth');} // G power
    // Aggressive bass line
    if(i%8===4){aT(ctx,m,55,t,0.2,0.35,'sawtooth');}
    if(i%8===6){aT(ctx,m,73.42,t,0.15,0.3,'sawtooth');}
  }
}

function playObstacleMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/150;
  for(var i=0;i<100;i++){
    var t=now+i*b*0.5;
    // Fast pulse bass
    if(i%2===0){aT(ctx,m,65.41,t,0.1,0.35);} // C2
    if(i%2===1){aT(ctx,m,73.42,t,0.08,0.25);} // D2
    // Staccato action hits
    if(i%8===0){aC(ctx,m,t,[261.63,329.63,392],0.12,0.2,'square');} // C major
    if(i%8===4){aC(ctx,m,t,[220,277.18,329.63],0.1,0.2,'square');} // Am
    // Rising danger arpeggios every 16 beats
    if(i%16===0&&i>0){
      for(var a=0;a<4;a++){aT(ctx,m,[523.25,659.25,783.99,1046.5][a],t+a*0.08,0.15,0.08,'triangle');}
    }
    // Snare rush on 4th beat
    if(i%4===3){aT(ctx,m,200,t,0.05,0.2,'square');}
  }
}

function playMarioMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/140;
  // Mario-style bouncy chiptune melody
  var melody=[659.25,659.25,0,659.25,0,523.25,659.25,0,783.99,0,0,0,392,0,0,0,
    523.25,0,0,392,0,0,329.63,0,0,440,0,493.88,0,466.16,440,0,
    392,659.25,783.99,880,0,698.46,783.99,0,659.25,0,523.25,587.33,493.88,0,0,0];
  for(var i=0;i<melody.length;i++){
    var t=now+i*b*0.25;
    if(melody[i]>0){aT(ctx,m,melody[i],t,0.12,0.18,'square');}
    // Bass on beats
    if(i%4===0){aT(ctx,m,i%8<4?130.81:98,t,0.15,0.25,'triangle');}
  }
  // Loop second part with different notes
  var bass2=[130.81,0,164.81,0,196,0,164.81,0];
  for(var j=0;j<48;j++){
    var t2=now+melody.length*b*0.25+j*b*0.5;
    if(j%2===0){aT(ctx,m,392+Math.sin(j*0.5)*80,t2,0.1,0.12,'square');}
    aT(ctx,m,bass2[j%bass2.length]||130.81,t2,0.15,0.2,'triangle');
    if(j%4===0){aT(ctx,m,65.41,t2,0.08,0.3);}
  }
}

function playMazeMusic(ah){
  if(!ah)return;var ctx=ah.ctx;var m=ah.master;var now=ctx.currentTime;var b=60/80;
  // Gentle ambient arpeggios
  var notes=[261.63,329.63,392,523.25,392,329.63]; // C major arp
  var notes2=[220,277.18,329.63,440,329.63,277.18]; // Am arp
  for(var i=0;i<60;i++){
    var t=now+i*b*0.25;
    var ns=i<30?notes:notes2;
    aT(ctx,m,ns[i%ns.length],t,0.5,0.1,'triangle');
    // Soft pad every 6 notes
    if(i%6===0){aC(ctx,m,t,[261.63,329.63,392],0.06,1.5,'sine');}
    // Gentle bass
    if(i%6===0){aT(ctx,m,i<30?65.41:55,t,0.8,0.15,'sine');}
  }
}

/* ═══ Confetti ═══ */
function Confetti(){
  var colors=['#fbbf24','#f59e0b','#8b5cf6','#ec4899','#10b981','#3b82f6','#ef4444','#f97316'];
  var pieces=useMemo(function(){return Array.from({length:80},function(_,i){return{id:i,left:Math.random()*100,color:colors[i%colors.length],delay:Math.random()*2,dur:2+Math.random()*2.5,size:6+Math.random()*10,rad:Math.random()>.5?'50%':'2px'}});},[]);
  return React.createElement(React.Fragment,null,pieces.map(function(p){return React.createElement('div',{key:p.id,className:'confetti-piece',style:{left:p.left+'%',backgroundColor:p.color,width:p.size,height:p.size,borderRadius:p.rad,animationDelay:p.delay+'s',animationDuration:p.dur+'s'}})}));
}


/* ═══════════════════════════════════════════════════════
   LOTTO MODE
   ═══════════════════════════════════════════════════════ */
function LottoMode(props){
  var names=props.names; var onDone=props.onDone;
  var _ph=useState('idle');var phaseVal=_ph[0];var setPhase=_ph[1];
  var _bs=useState(function(){return names.map(function(){return 'in'})});var ballStates=_bs[0];var setBallStates=_bs[1];
  var _gi=useState(-1);var glowIdx=_gi[0];var setGlowIdx=_gi[1];
  var _el=useState([]);var eliminated=_el[0];var setEliminated=_el[1];
  var _wi=useState(-1);var winnerIdx=_wi[0];var setWinnerIdx=_wi[1];
  var _st=useState('Bereit zur Ziehung');var statusText=_st[0];var setStatusText=_st[1];
  var _rn=useState(0);var roundN=_rn[0];var setRoundN=_rn[1];
  var _cf=useState(false);var showConfetti=_cf[0];var setShowConfetti=_cf[1];
  var timers=useRef([]);
  var audioRef=useRef(null);
  function clearT(){timers.current.forEach(clearTimeout);timers.current=[]}
  function later(fn,ms){timers.current.push(setTimeout(fn,ms))}
  useEffect(function(){return function(){clearT();stopAH(audioRef.current);audioRef.current=null;}},[]);

  var drumSize=300;
  var ballSize=names.length>20?40:names.length>12?46:52;
  var fontSize=names.length>20?8:names.length>12?9:11;

  var ballPositions=useMemo(function(){
    var cx=drumSize/2;var cy=drumSize/2;var positions=[];
    if(names.length<=1)return[{x:cx-ballSize/2,y:cy-ballSize/2}];
    var placed=0;var ring=0;var rings=[];
    while(placed<names.length){var r=ring===0?0:42+ring*(ballSize+4);var cap=ring===0?1:Math.min(Math.floor(2*Math.PI*r/(ballSize+4)),names.length-placed);rings.push({r:r,cap:cap});placed+=cap;ring++}
    var idx=0;
    for(var ri=0;ri<rings.length;ri++){for(var i=0;i<rings[ri].cap&&idx<names.length;i++){var a=(2*Math.PI*i)/rings[ri].cap-Math.PI/2;var rr=rings[ri].r;positions.push({x:cx+(rr===0?0:rr*Math.cos(a))-ballSize/2,y:cy+(rr===0?0:rr*Math.sin(a))-ballSize/2});idx++}}
    return positions;
  },[names.length,ballSize]);

  function startDraw(){
    if(phaseVal==='running')return;clearT();stopAH(audioRef.current);
    var ah=createAudioCtx();audioRef.current=ah;playLottoMusic(ah);
    var states=names.map(function(){return 'in'});
    setBallStates(states.slice());setEliminated([]);setWinnerIdx(-1);setGlowIdx(-1);setShowConfetti(false);setPhase('running');setRoundN(0);
    var total=names.length;var elimCount=total-1;
    var perRound=Math.min(Math.max(700,12000/elimCount),2200);
    var remaining=[];for(var k=0;k<total;k++)remaining.push(k);
    var cumElim=[];var t=600;
    for(var step=0;step<elimCount;step++){
      (function(s,rem){
        var scanCount=Math.min(rem.length,Math.max(3,Math.floor(rem.length/2)));
        var scanGap=Math.min(90,perRound*0.3/scanCount);
        for(var sc=0;sc<scanCount;sc++){(function(scIdx){later(function(){var ri=Math.floor(Math.random()*rem.length);setGlowIdx(rem[ri])},t+scIdx*scanGap)})(sc)}
        var scanEnd=scanCount*scanGap;
        var rIdx=Math.floor(Math.random()*rem.length);var victim=rem[rIdx];
        later(function(){setGlowIdx(victim);setRoundN(s+1);setStatusText(names[victim]+' wird gezogen...')},t+scanEnd+100);
        later(function(){setGlowIdx(-1);states[victim]='eject';setBallStates(states.slice());setStatusText(names[victim]+' ist raus!')},t+scanEnd+100+perRound*0.3);
        later(function(){states[victim]='out';setBallStates(states.slice());cumElim.push({name:names[victim],color:BALL_COLORS[victim%BALL_COLORS.length]});setEliminated(cumElim.slice())},t+scanEnd+100+perRound*0.3+500);
        rem.splice(rIdx,1);t+=perRound;
      })(step,remaining);
    }
    var finalWinner=remaining[0];
    later(function(){setGlowIdx(-1);setWinnerIdx(finalWinner);setPhase('winner');setShowConfetti(true);setStatusText(names[finalWinner]+' gewinnt!');stopAH(audioRef.current);audioRef.current=null;},t+500);
  }

  function resetLotto(){clearT();stopAH(audioRef.current);audioRef.current=null;setPhase('idle');setBallStates(names.map(function(){return 'in'}));setEliminated([]);setWinnerIdx(-1);setGlowIdx(-1);setShowConfetti(false);setRoundN(0);setStatusText('Bereit zur Ziehung')}

  var lights=useMemo(function(){var arr=[];for(var i=0;i<24;i++){var a=(360/24)*i*Math.PI/180;var r=drumSize/2+14;arr.push({id:i,x:drumSize/2+r*Math.cos(a),y:drumSize/2+r*Math.sin(a),color:i%3===0?'#fbbf24':i%3===1?'#8b5cf6':'#3b82f6',delay:i*0.07})}return arr},[]);
  var remainingCount=ballStates.filter(function(s){return s==='in'}).length;

  var posIdx=0;var ballEls=[];
  for(var i=0;i<names.length;i++){
    var st=ballStates[i];if(st==='out')continue;
    var pos=ballPositions[posIdx]||{x:drumSize/2-ballSize/2,y:drumSize/2-ballSize/2};posIdx++;
    var color=BALL_COLORS[i%BALL_COLORS.length];var isGlow=glowIdx===i;var isEject=st==='eject';
    var label=truncName(names[i],7);var animDur=(2.5+(i%5)*0.4)+'s';
    ballEls.push(<div key={i} className={"lotto-ball"+(isGlow?" glow":"")+(isEject?" ball-eject":"")} style={{left:pos.x,top:pos.y,width:ballSize,height:ballSize,fontSize:fontSize,background:"radial-gradient(circle at 35% 30%,"+color+"dd,"+color+")",boxShadow:isGlow?undefined:"inset 0 -3px 6px rgba(0,0,0,.3),inset 0 2px 4px rgba(255,255,255,.15),0 2px 8px rgba(0,0,0,.3)",animation:(!isGlow&&!isEject&&st==='in')?("ballFloat "+animDur+" ease-in-out infinite"):undefined,zIndex:isGlow?30:5}}>{label}</div>);
  }

  return(
    <div className="flex flex-col items-center w-full max-w-3xl">
      {showConfetti&&<Confetti/>}

        {lights.map(function(l){return <div key={l.id} className="absolute rounded-full" style={{left:l.x+15,top:l.y+15,width:5,height:5,backgroundColor:l.color,transform:'translate(-50%,-50%)',opacity:phaseVal==='running'?undefined:0.15,animation:phaseVal==='running'?("lightBlink .5s ease "+l.delay+"s infinite"):"none"}}/>})}
        <div className="drum-ring" style={{position:'absolute',left:15,top:15,width:drumSize,height:drumSize}}>{ballEls}</div>
      </div>
      {winnerIdx>=0&&<div className="winner-enter mb-5"><div className="winner-card rounded-2xl px-10 py-6 text-white text-center shadow-2xl border-2 border-amber-400/40" style={{background:"linear-gradient(135deg,"+BALL_COLORS[winnerIdx%BALL_COLORS.length]+"dd,"+BALL_COLORS[winnerIdx%BALL_COLORS.length]+")"}}><div className="text-amber-200 text-sm font-semibold tracking-widest uppercase mb-1">Gewinner</div><div className="text-4xl font-black tracking-tight">{names[winnerIdx]}</div><div className="mt-2 text-2xl">&#x1F389;&#x1F3C6;&#x1F389;</div></div></div>}
      {eliminated.length>0&&<div className="w-full max-w-sm mb-4"><p className="text-gray-600 text-center mb-1.5" style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em'}}>Gezogen</p><div className="flex flex-wrap gap-1.5 justify-center bg-gray-900/40 rounded-xl p-2.5 border border-gray-800/50">{eliminated.map(function(e,i){return <div key={i} className="tray-ball tray-pop" style={{background:"radial-gradient(circle at 35% 30%,"+e.color+"88,"+e.color+"55)",animationDelay:(i*0.04)+"s"}}>{truncName(e.name,5)}</div>})}</div></div>}
      <div className="flex gap-3 mt-2">
        {phaseVal==='idle'&&<button onClick={startDraw} className="px-8 py-3 rounded-xl font-bold bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 text-white shadow-lg shadow-violet-500/20 transition-all">Ziehung starten</button>}
        {phaseVal==='winner'&&<span><button onClick={resetLotto} className="px-6 py-3 rounded-xl font-semibold bg-violet-600/20 text-violet-300 border border-violet-500/30 hover:bg-violet-600/30 transition-all mr-3">Nochmal</button><button onClick={onDone} className="px-6 py-3 rounded-xl font-semibold bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700 transition-all">Zurück</button></span>}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   BATTLE TOURNAMENT MODE — 2 DUELS PARALLEL
   ═══════════════════════════════════════════════════════ */
function BattleMode(props){
  var names=props.names;var onDone=props.onDone;
  var _ph=useState('idle');var phase=_ph[0];var setPhase=_ph[1];
  // Now support TWO simultaneous matches
  var _m1=useState(null);var match1=_m1[0];var setMatch1=_m1[1];
  var _m2=useState(null);var match2=_m2[0];var setMatch2=_m2[1];
  var _hp=useState({a1:100,b1:100,a2:100,b2:100});var hp=_hp[0];var setHp=_hp[1];
  var _rl=useState('');var roundLabel=_rl[0];var setRoundLabel=_rl[1];
  var _champ=useState(null);var champion=_champ[0];var setChampion=_champ[1];
  var _cf=useState(false);var showConfetti=_cf[0];var setShowConfetti=_cf[1];
  var _vs=useState({s1:false,s2:false});var showVs=_vs[0];var setShowVs=_vs[1];
  var _sk=useState({a1:false,b1:false,a2:false,b2:false});var shakes=_sk[0];var setShakes=_sk[1];
  var _log=useState([]);var fightLog=_log[0];var setFightLog=_log[1];
  var _bk=useState([]);var bracket=_bk[0];var setBracket=_bk[1];
  var timers=useRef([]);
  var audioRef=useRef(null);

  function clearT(){timers.current.forEach(clearTimeout);timers.current=[]}
  function later(fn,ms){timers.current.push(setTimeout(fn,ms))}
  useEffect(function(){return function(){clearT();stopAH(audioRef.current);}},[]);

  function getRoundName(c){if(c===2)return'Finale';if(c<=4)return'Halbfinale';if(c<=8)return'Viertelfinale';return'Runde ('+c+' Teilnehmer)'}

  function buildBracket(pool){
    var s=shuffle(pool);var matches=[];
    for(var i=0;i<s.length-1;i+=2)matches.push({a:s[i],b:s[i+1],winner:null,state:'pending'});
    if(s.length%2===1)matches.push({a:s[s.length-1],b:null,winner:s[s.length-1],state:'bye'});
    return matches;
  }

  function simulateFight(slot,matchObj,t,log,onDoneCallback){
    // slot = 1 or 2
    var setMatch=slot===1?setMatch1:setMatch2;
    var hpAKey=slot===1?'a1':'a2';var hpBKey=slot===1?'b1':'b2';
    var vsKey='s'+slot;var skAKey='a'+slot;var skBKey='b'+slot;

    if(matchObj.state==='bye'){
      later(function(){
        setMatch({a:matchObj.a,b:null,state:'bye',winner:matchObj.a});
        log.push(matchObj.a+' hat ein Freilos');
        setFightLog(log.slice());
      },t);
      later(function(){onDoneCallback(matchObj.a)},t+600);
      return t+700;
    }

    // Show VS
    later(function(){
      setMatch({a:matchObj.a,b:matchObj.b,state:'fighting',winner:null});
      setHp(function(prev){var n=Object.assign({},prev);n[hpAKey]=100;n[hpBKey]=100;return n});
      setShowVs(function(prev){var n=Object.assign({},prev);n[vsKey]=true;return n});
    },t);
    t+=400;
    later(function(){setShowVs(function(prev){var n=Object.assign({},prev);n[vsKey]=false;return n})},t);
    t+=150;

    var hits=3+Math.floor(Math.random()*3);
    var winnerIsA=Math.random()>0.5;
    var curA=100;var curB=100;

    for(var h=0;h<hits;h++){
      (function(hi,isLast){
        later(function(){
          if(hi%2===0){
            var dmg=isLast?(winnerIsA?curB:15+Math.floor(Math.random()*20)):15+Math.floor(Math.random()*20);
            curB=Math.max(0,curB-dmg);
            if(isLast&&!winnerIsA)curA=0;
            if(isLast&&winnerIsA)curB=0;
            setHp(function(prev){var n=Object.assign({},prev);n[hpAKey]=curA;n[hpBKey]=curB;return n});
            setShakes(function(prev){var n=Object.assign({},prev);n[skBKey]=true;return n});
            setTimeout(function(){setShakes(function(prev){var n=Object.assign({},prev);n[skBKey]=false;return n})},350);
          }else{
            var dmg2=isLast?(!winnerIsA?curA:15+Math.floor(Math.random()*15)):15+Math.floor(Math.random()*20);
            curA=Math.max(0,curA-dmg2);
            if(isLast&&winnerIsA)curB=0;
            if(isLast&&!winnerIsA)curA=0;
            setHp(function(prev){var n=Object.assign({},prev);n[hpAKey]=curA;n[hpBKey]=curB;return n});
            setShakes(function(prev){var n=Object.assign({},prev);n[skAKey]=true;return n});
            setTimeout(function(){setShakes(function(prev){var n=Object.assign({},prev);n[skAKey]=false;return n})},350);
          }
        },t+hi*380);
      })(h,h===hits-1);
    }
    t+=hits*380+250;

    var matchWinner=winnerIsA?matchObj.a:matchObj.b;
    var matchLoser=winnerIsA?matchObj.b:matchObj.a;
    later(function(){
      setMatch({a:matchObj.a,b:matchObj.b,state:'done',winner:matchWinner});
      log.push(matchWinner+' besiegt '+matchLoser);
      setFightLog(log.slice());
    },t);
    later(function(){onDoneCallback(matchWinner)},t+500);
    return t+600;
  }

  function startTournament(){
    clearT();stopAH(audioRef.current);
    var ah=createAudioCtx();audioRef.current=ah;playBattleMusic(ah);
    setChampion(null);setShowConfetti(false);setFightLog([]);setMatch1(null);setMatch2(null);
    var pool=shuffle(names);
    runRound(pool,[]);
  }

  function runRound(pool,logSoFar){
    var bk=buildBracket(pool);
    setBracket(bk);setRoundLabel(getRoundName(pool.length));setPhase('fighting');

    var log=logSoFar.slice();
    var updatedBk=bk.map(function(m){return Object.assign({},m)});
    var roundWinners=[];
    var pairsDone=0;
    var totalPairs=bk.length;
    var t=300;

    // Process matches in pairs of 2
    for(var pi=0;pi<bk.length;pi+=2){
      (function(pairStart,currentT){
        var m1=updatedBk[pairStart];
        var m2=pairStart+1<updatedBk.length?updatedBk[pairStart+1]:null;

        var done1=false;var done2=!m2;var w1=null;var w2=null;

        function checkPairDone(){
          if(done1&&done2){
            if(w1)roundWinners.push(w1);
            if(w2)roundWinners.push(w2);
            updatedBk[pairStart].state='done';updatedBk[pairStart].winner=w1;
            if(m2){updatedBk[pairStart+1].state='done';updatedBk[pairStart+1].winner=w2}
            setBracket(updatedBk.map(function(x){return Object.assign({},x)}));
            pairsDone+=(m2?2:1);
            if(pairsDone>=totalPairs){
              later(function(){
                setMatch1(null);setMatch2(null);
                if(roundWinners.length===1){
                  setChampion(roundWinners[0]);setPhase('winner');setShowConfetti(true);
                  stopAH(audioRef.current);audioRef.current=null;
                  log.push('&#x1F3C6; '+roundWinners[0]+' ist Champion!');setFightLog(log.slice());
                }else{
                  runRound(roundWinners,log);
                }
              },600);
            }
          }
        }

        var endT1=simulateFight(1,m1,currentT,log,function(winner){w1=winner;done1=true;checkPairDone()});
        if(m2){
          simulateFight(2,m2,currentT+100,log,function(winner){w2=winner;done2=true;checkPairDone()});
        }

      })(pi,t);
      // Stagger pairs: estimate time per pair
      var pairMatchCount=(pi+1<bk.length)?2:1;
      t+=3500; // enough for a fight
    }
  }

  function resetBattle(){clearT();stopAH(audioRef.current);audioRef.current=null;setPhase('idle');setChampion(null);setShowConfetti(false);setFightLog([]);setBracket([]);setMatch1(null);setMatch2(null)}

  function renderMatchArena(matchObj,slotIdx){
    if(!matchObj)return null;
    if(!matchObj.b){
      return <div className="flex-1 bg-gray-900/40 border border-gray-800 rounded-2xl p-4 text-center">
        <div className={"inline-block bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(matchObj.a)]+" rounded-xl px-5 py-2 text-white font-bold mb-1"}>{matchObj.a}</div>
        <p className="text-gray-500 text-xs">Freilos</p>
      </div>;
    }
    var hpAKey=slotIdx===1?'a1':'a2';var hpBKey=slotIdx===1?'b1':'b2';
    var vsKey='s'+slotIdx;var skA=shakes[slotIdx===1?'a1':'a2'];var skB=shakes[slotIdx===1?'b1':'b2'];
    var hpAVal=hp[hpAKey];var hpBVal=hp[hpBKey];

    return(
      <div className="flex-1 bg-gray-900/60 border border-gray-800 rounded-2xl p-4 relative overflow-hidden">
        <div className="flex items-center gap-3">
          <div className={"flex-1 text-center"+(skA?" shake":"")}>
            <div className={"bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(matchObj.a)]+" rounded-lg p-3 mb-1.5"+(matchObj.winner===matchObj.a?" ring-2 ring-green-400":"")+(matchObj.winner===matchObj.b?" opacity-30 grayscale":"")}>
              <div className="text-white font-bold text-sm truncate">{matchObj.a}</div>
            </div>
            <div className="h-2.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:hpAVal+'%',background:hpAVal>50?'#22c55e':hpAVal>25?'#f59e0b':'#ef4444',transition:'width .3s ease-out'}}/></div>
          </div>
          <div className="w-10 text-center flex-shrink-0">
            {showVs[vsKey]?<div className="vs-pop text-xl font-black text-amber-400">VS</div>:<div className="text-lg">&#x2694;&#xFE0F;</div>}
          </div>
          <div className={"flex-1 text-center"+(skB?" shake":"")}>
            <div className={"bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(matchObj.b)]+" rounded-lg p-3 mb-1.5"+(matchObj.winner===matchObj.b?" ring-2 ring-green-400":"")+(matchObj.winner===matchObj.a?" opacity-30 grayscale":"")}>
              <div className="text-white font-bold text-sm truncate">{matchObj.b}</div>
            </div>
            <div className="h-2.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:hpBVal+'%',background:hpBVal>50?'#22c55e':hpBVal>25?'#f59e0b':'#ef4444',transition:'width .3s ease-out'}}/></div>
          </div>
        </div>
        {matchObj.state==='done'&&matchObj.winner&&<div className="absolute inset-0 flex items-center justify-center bg-gray-950/50 rounded-2xl fade-in"><div className="bg-green-500/20 border border-green-500/30 rounded-lg px-4 py-2 text-green-400 font-bold text-sm">{matchObj.winner} gewinnt!</div></div>}
      </div>
    );
  }

  return(
    <div className="flex flex-col items-center w-full max-w-4xl">
      {showConfetti&&<Confetti/>}
      <div className="text-center mb-4">
        {roundLabel&&<div className="inline-block px-4 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-400 text-sm font-bold mb-2">{roundLabel}</div>}
      </div>
      {/* Two arenas side by side */}
      {(match1||match2)&&<div className="w-full flex gap-4 mb-5">
        {renderMatchArena(match1,1)}
        {renderMatchArena(match2,2)}
      </div>}
      {champion&&<div className="winner-enter mb-5"><div className={"winner-card bg-gradient-to-br "+CARD_COLORS[nameToColorIdx(champion)]+" rounded-2xl px-10 py-6 text-white text-center shadow-2xl border-2 border-amber-400/40"}><div className="text-amber-200 text-sm font-semibold tracking-widest uppercase mb-1">Champion</div><div className="text-4xl font-black tracking-tight">{champion}</div><div className="mt-2 text-2xl">&#x1F389;&#x1F3C6;&#x1F389;</div></div></div>}
      {fightLog.length>0&&<div className="w-full max-w-md mb-4"><p className="text-gray-600 text-center mb-1.5" style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em'}}>Kampfprotokoll</p><div className="bg-gray-900/40 rounded-xl p-3 border border-gray-800/50 max-h-32 overflow-y-auto space-y-1">{fightLog.map(function(entry,i){return <div key={i} className="text-xs text-gray-400 font-mono" dangerouslySetInnerHTML={{__html:entry}}/>})}</div></div>}
      {bracket.length>1&&!champion&&<div className="w-full max-w-lg mb-4"><p className="text-gray-600 text-center mb-1.5" style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em'}}>Bracket</p><div className="grid gap-2" style={{gridTemplateColumns:"repeat("+Math.min(bracket.length,4)+",1fr)"}}>{bracket.map(function(m,i){var bc=m.state==='fighting'?'border-amber-500/40':m.state==='done'?'border-green-500/20':'border-gray-800';return <div key={i} className={"bg-gray-900/60 border rounded-lg p-2 text-center text-xs "+bc}><div className={"font-semibold truncate "+(m.winner===m.a?"text-green-400":m.state==='done'?"text-gray-600":"text-white")}>{m.a}</div>{m.b?<span><div className="text-gray-600 my-0.5" style={{fontSize:10}}>vs</div><div className={"font-semibold truncate "+(m.winner===m.b?"text-green-400":m.state==='done'?"text-gray-600":"text-white")}>{m.b}</div></span>:<div className="text-gray-600 mt-0.5 italic" style={{fontSize:10}}>Freilos</div>}</div>})}</div></div>}
      <div className="flex gap-3 mt-2">
        {phase==='idle'&&<button onClick={startTournament} className="px-8 py-3 rounded-xl font-bold bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white shadow-lg shadow-amber-500/20 transition-all">Turnier starten</button>}
        {phase==='winner'&&<span><button onClick={resetBattle} className="px-6 py-3 rounded-xl font-semibold bg-amber-500/20 text-amber-300 border border-amber-500/30 hover:bg-amber-500/30 transition-all mr-3">Nochmal</button><button onClick={onDone} className="px-6 py-3 rounded-xl font-semibold bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700 transition-all">Zurück</button></span>}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   OBSTACLE COURSE MODE — Grid layout, visual obstacles
   ═══════════════════════════════════════════════════════ */
var OBS_TYPES = [
  {name:'Feuergraben', type:'fire',   emoji:'\u{1F525}'},
  {name:'Wasserwand',  type:'water',  emoji:'\u{1F30A}'},
  {name:'Blitzfeld',   type:'lightning',emoji:'\u26A1'},
  {name:'Eisrutsche',  type:'ice',    emoji:'\u{1F9CA}'},
  {name:'Tornado',     type:'tornado',emoji:'\u{1F32A}\uFE0F'},

  {name:'Schneesturm', type:'snow',   emoji:'\u2744\uFE0F'},
